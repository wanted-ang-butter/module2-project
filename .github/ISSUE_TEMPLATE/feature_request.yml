name: "✨ Feature Request Template"
description: "새로운 기능 추가 또는 API 개발 요청 시 생성하는 이슈입니다."
title: "[Feature] "
labels: ["feature"]
assignees: []
body:
  - type: textarea
    id: description
    attributes:
      label: "📌 기능 설명 (Description)"
      description: "추가하려는 기능의 핵심 목적과 배경을 설명해주세요."
      placeholder: "예) 사용자가 특정 city에 속한 village 목록을 조회할 수 있는 기능이 필요합니다."
    validations:
      required: true

  - type: textarea
    id: feature-details
    attributes:
      label: "✨ 상세 기능 내용 (Details)"
      description: "어떤 로직이나 API가 구현되어야 하는지 구체적인 요구사항을 작성해주세요."
      placeholder: |
        - [GET] /api/v1/cities/{cityId}/villages 엔드포인트 추가
        - VillageResponse DTO 생성 및 연관관계 매핑 고려
    validations:
      required: true

  - type: textarea
    id: todo
    attributes:
      label: "📋 작업 내용 (To-Do)"
      description: "기능 구현을 위해 진행해야 할 세부 작업 목록입니다."
      value: |
        - [ ] API 설계 및 DTO 작성
        - [ ] 비즈니스 로직(Service) 구현
        - [ ] DB 테이블/엔티티 설계 및 반영
        - [ ] 단위 테스트(JUnit) 작성
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: "📎 참고 사항 (References)"
      description: "기획서, 화면 설계서, 참고할 문서나 이전 관련 이슈 번호를 적어주세요."
    validations:
      required: false