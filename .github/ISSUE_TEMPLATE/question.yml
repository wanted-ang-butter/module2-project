name: "🙋‍♂️ Question Template"
description: "팀원들에게 코드, 아키텍처, 비즈니스 로직 등에 대해 질문할 때 사용합니다."
title: "[Question] "
labels: ["question", "help wanted"]
assignees: []
body:
  - type: textarea
    id: question
    attributes:
      label: "🙋‍♂️ 질문 내용"
      description: "무엇이 궁금한지 명확하고 구체적으로 작성해주세요."
      placeholder: "예) City와 Village 엔티티 매핑 시 양방향 연관관계를 반드시 맺어야 할까요?"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: "🤔 궁금해진 배경 (Context)"
      description: "어떤 작업을 하거나 어떤 로직을 설계하다가 이 질문이 생겼는지 상황을 설명해주세요."
      placeholder: "예) Village 데이터를 저장하는 로직을 개발하던 중, 부모인 City의 상태도 함께 업데이트해야 하는지 고민이 생겼습니다."
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: "🛠 지금까지 고민해본 것 (What I've tried)"
      description: "궁금증 해소를 위해 개인적으로 찾아본 공식 문서, 블로그 내용, 혹은 본인의 생각을 적어주세요. 답변자가 큰 도움을 받을 수 있습니다."
      placeholder: "예) JPA 공식 문서에서는 N+1 문제와 설계의 복잡성 때문에 가급적 단방향 연관관계를 권장한다고 확인했습니다. 하지만 우리 비즈니스 요구사항에서는 양방향이 더 편할 것 같아 고민입니다."
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: "📎 관련 코드 및 참고 자료"
      description: "질문과 관련된 코드 블록이나 참고할 만한 링크(URL)를 첨부해주세요."
      render: java
    validations:
      required: false