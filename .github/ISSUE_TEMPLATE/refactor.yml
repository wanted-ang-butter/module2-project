name: "🛠️ Refactor Template"
description: "코드 구조 개선, 기술 부채 해결 및 리팩토링 진행 시 생성하는 이슈입니다."
title: "[Refactor] "
labels: ["refactor"]
assignees: []
body:
  - type: textarea
    id: target
    attributes:
      label: "🔧 리팩토링 대상 및 내용"
      description: "어떤 도메인, 클래스, 혹은 메서드의 코드 구조를 개선하려는지 구체적으로 작성해주세요."
      placeholder: "예) CityService 내 Village 데이터 처리 로직 분리 및 최적화"
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: "📌 리팩토링 목적 및 배경 (AS-IS vs TO-BE)"
      description: "왜 이 리팩토링이 필요한지 현재(AS-IS)의 문제점과 기대 효과(TO-BE)를 설명해주세요."
      placeholder: "예) 기존 로직은 메서드가 너무 커서 결합도가 높음. 유지보수성과 가독성을 높이기 위해 책임 분리가 필요함."
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: "📋 세부 작업 내용 (To-Do)"
      description: "진행할 구체적인 리팩토링 작업 항목을 체크리스트로 작성해주세요."
      value: |
        - [ ] 작업 내용 1
        - [ ] 작업 내용 2

        ---

        💻 수정 전 코드
        ```java
        // 기존 코드 작성
        ```

        ---

        ✨ 수정 후 코드
        ```java
        // 리팩토링 후 코드 작성
        ```
    validations:
      required: true

  - type: checkboxes
    id: dod
    attributes:
      label: "✅ 필수 점검 사항 (Definition of Done)"
      description: "리팩토링 완료를 위해 반드시 점검해야 할 항목입니다. (GitHub에서 제공하는 실제 체크박스 UI가 적용됩니다.)"
      options:
        - label: "기존 비즈니스 로직의 동작 방식 및 결과에 영향을 주지 않음을 확인했습니다."
          required: true
        - label: "단위 테스트(Unit Test)를 작성하였고, 전체 테스트를 정상적으로 통과했습니다."
          required: true
        - label: "불필요한 중복 코드를 제거하고 전반적인 가독성을 향상시켰습니다."
          required: false
        - label: "변경된 내부 구조에 맞게 API 명세서 등 관련 문서를 최신화했습니다."
          required: false

  - type: textarea
    id: references
    attributes:
      label: "📎 참고 사항 및 관련 이슈"
      description: "추가로 참고할 기술 문서나 연관된 기존 기능/버그 이슈 번호를 태그해주세요."
      placeholder: "예) Related to #15, 참조 블로그/공식 문서 링크 등"
    validations:
      required: false