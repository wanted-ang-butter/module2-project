name: "🚨🐛 Bug Report Template 🐛🚨"
description: "버그 및 에러 발생 시 폼(Form) 형태로 손쉽게 작성하는 이슈입니다."
title: "[Bug] "
labels: ["bug"]
assignees: []
body:
  - type: textarea
    id: bug-description
    attributes:
      label: "🐛 버그 설명"
      description: "어떤 문제가 발생했는지 명확하고 간결하게 작성해주세요."
      placeholder: "예) 특정 city에 속한 village 목록을 조회하는 API 호출 시 500 Internal Server Error가 발생합니다."
    validations:
      required: true

  - type: textarea
    id: reproduce-steps
    attributes:
      label: "🔄 재현 방법"
      description: "버그가 발생하는 과정을 구체적인 API 호출이나 동작 순서로 작성해주세요."
      value: |
        1. 
        2. 
        3.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: "✅ 예상 결과"
      description: "정상 동작 시 기대되는 결과를 작성해주세요."
      placeholder: "예) HTTP 상태 코드 200과 함께 정상적인 JSON 응답이 반환되어야 합니다."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "📎 에러 로그 / 스택 트레이스"
      description: "백엔드 문제 파악을 위해 Spring Boot(Tomcat) 로그나 예외 스택 트레이스를 첨부해주세요."
      render: java
    validations:
      required: false

  - type: dropdown
    id: environment
    attributes:
      label: "🖥 실행 환경"
      description: "버그가 발생한 환경을 선택해주세요."
      options:
        - "Local (로컬 개발 환경)"
        - "Dev (개발/테스트 서버)"
        - "Prod (운영 서버)"
    validations:
      required: true