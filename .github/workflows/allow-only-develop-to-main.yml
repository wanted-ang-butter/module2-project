name: Allow only develop PRs into main

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - edited

jobs:
  validate-source-branch:
    name: validate-source-branch
    runs-on: ubuntu-latest

    steps:
      - name: Fail if PR source is not develop
        run: |
          echo "base_ref=${{ github.base_ref }}"
          echo "head_ref=${{ github.head_ref }}"

          if [ "${{ github.base_ref }}" = "main" ] && [ "${{ github.head_ref }}" != "develop" ]; then
            echo "Only pull requests from 'develop' can be merged into 'main'."
            exit 1
          fi

          echo "Policy passed: develop -> main"
