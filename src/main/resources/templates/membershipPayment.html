<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>멤버십 결제</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50">

<!-- Header -->
<div class="bg-white border-b border-gray-200">
  <div class="max-w-4xl mx-auto px-6 py-6">
    <a href="pricing.html" class="inline-flex items-center gap-2 text-gray-600 hover:text-blue-600 mb-4">
      ← 이전으로
    </a>
    <h1 class="text-3xl font-black text-gray-900">멤버십 결제</h1>
  </div>
</div>

<div class="max-w-4xl mx-auto px-6 py-12 grid grid-cols-1 lg:grid-cols-2 gap-8">

  <!-- LEFT: PLAN -->
  <div>
    <h2 class="text-xl font-black text-gray-900 mb-6">선택한 플랜</h2>

    <div class="bg-white border-2 border-gray-200 rounded-2xl p-6 shadow-lg">

      <!-- 추천 -->
      <div id="badge" class="hidden mb-4">
          <span class="px-4 py-2 bg-gradient-to-r from-blue-600 to-green-600 text-white rounded-full text-sm font-bold">
            ⭐ 추천
          </span>
      </div>

      <h3 id="planName" class="text-2xl font-black text-gray-900 mb-2"></h3>

      <div id="discount" class="hidden mb-4">
        <span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-sm font-bold"></span>
      </div>

      <div class="mb-6">
        <span id="price" class="text-4xl font-black text-blue-600"></span>
        <span id="period" class="text-lg text-gray-500 font-bold"></span>
      </div>

      <!-- benefits -->
      <div class="border-t pt-6">
        <h4 class="text-sm font-bold text-gray-700 mb-4">포함 혜택</h4>
        <ul id="benefits" class="space-y-2 text-sm text-gray-700"></ul>
      </div>

    </div>
  </div>

  <!-- RIGHT: PAYMENT -->
  <div>
    <h2 class="text-xl font-black text-gray-900 mb-6">결제 정보</h2>

    <div class="bg-white border-2 border-gray-200 rounded-2xl p-6 shadow-lg">

      <div class="mb-6">
        <div class="flex justify-between py-3 border-b">
          <span>선택 플랜</span>
          <span id="summaryName" class="font-bold"></span>
        </div>

        <div class="flex justify-between py-3 border-b">
          <span>이용 기간</span>
          <span id="summaryPeriod" class="font-bold"></span>
        </div>

        <div class="flex justify-between py-4">
          <span class="font-black">최종 결제 금액</span>
          <span id="summaryPrice" class="text-xl font-black text-blue-600"></span>
        </div>
      </div>

      <div class="mb-6 p-4 border bg-blue-50 rounded-xl">
        💳 신용/체크카드
      </div>

      <button onclick="pay()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold">
        결제하기
      </button>

      <p class="text-xs text-gray-500 text-center mt-4">
        언제든 해지 가능
      </p>

    </div>
  </div>

</div>

<!-- SCRIPT -->
<script>
  const plans = {
    monthly: {
      name: "1개월 이용권",
      price: 9900,
      period: "월",
      benefits: ["매월 코스 3개 수강", "실시간 강의 선예매"]
    },
    yearly: {
      name: "12개월 이용권",
      price: 99000,
      period: "년",
      discount: "약 17% 할인",
      benefits: ["매월 코스 3개 수강", "실시간 강의 선예매", "장기 할인"]
    }
  };

  // URL ?plan=yearly
  const params = new URLSearchParams(location.search);
  const planId = params.get("plan") || "monthly";
  const plan = plans[planId];

  // UI 세팅
  document.getElementById("planName").innerText = plan.name;
  document.getElementById("price").innerText = plan.price.toLocaleString() + " 크레딧";
  document.getElementById("period").innerText = " / " + plan.period;

  document.getElementById("summaryName").innerText = plan.name;
  document.getElementById("summaryPeriod").innerText = planId === "yearly" ? "12개월" : "1개월";
  document.getElementById("summaryPrice").innerText = plan.price.toLocaleString();

  // 혜택
  const ul = document.getElementById("benefits");
  plan.benefits.forEach(b => {
    const li = document.createElement("li");
    li.innerText = "✔ " + b;
    ul.appendChild(li);
  });

  // 할인
  if (plan.discount) {
    document.getElementById("discount").classList.remove("hidden");
    document.querySelector("#discount span").innerText = plan.discount;
  }

  // yearly 추천 뱃지
  if (planId === "yearly") {
    document.getElementById("badge").classList.remove("hidden");
  }

  function pay() {
    alert(plan.name + " 결제 완료!");
    location.href = "subscriber.html";
  }
</script>

</body>
</html>
