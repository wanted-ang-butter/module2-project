<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>대시보드 | Nae-Il</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        .grid-bg { background-image: linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px); background-size: 40px 40px; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .notice-dropdown, .profile-dropdown { display: none; }
        .notice-dropdown.open, .profile-dropdown.open { display: block; }
    </style>
</head>
<body class="bg-white">

<header class="border-b border-gray-200 bg-white/80 backdrop-blur-sm sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-4">
        <div class="flex items-center justify-between">
            <a th:href="@{/}" class="flex items-center gap-3 group">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-green-600 rounded-xl flex items-center justify-center shadow-lg group-hover:shadow-xl transition-shadow">
                    <i class="fa-solid fa-terminal text-white text-sm"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-gray-900 tracking-tight">내일 <span class="text-gray-500 font-normal">Nae-il</span></h1>
                    <p class="text-[10px] font-semibold text-gray-500 tracking-wide">내일의 일, My Work</p>
                </div>
            </a>

            <nav class="flex items-center gap-1 flex-nowrap">
                <a th:href="@{/course}" class="flex items-center gap-1.5 px-2.5 py-2 rounded-lg text-gray-600 hover:bg-gray-50 transition-all whitespace-nowrap">
                    <i class="fa-solid fa-book-open w-4 h-4"></i><span class="text-xs font-medium">전체 강의</span>
                </a>
            </nav>

            <div class="flex items-center gap-4">
                <a th:href="@{/auth/logout}" class="flex items-center gap-2 px-4 py-2 rounded-xl hover:bg-red-50 transition-all group">
                    <i class="fa-solid fa-right-from-bracket text-gray-600 group-hover:text-red-600 text-sm"></i>
                    <span class="font-medium text-gray-700 group-hover:text-red-600 text-sm">로그아웃</span>
                </a>
                <div class="text-right" th:if="${user}">
                    <p class="text-sm font-medium text-gray-900" th:text="${user.nickname}">사용자</p>
                    <p class="text-xs font-mono text-gray-500" th:text="${user.role}">ROLE</p>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="max-w-7xl mx-auto px-6 py-12">
    <div class="relative mb-16 overflow-hidden">
        <div class="absolute inset-0 grid-bg opacity-40"></div>
        <div class="relative bg-gradient-to-br from-blue-50 via-white to-green-50 rounded-3xl p-12 border border-gray-200 shadow-lg">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                <div class="flex-1">
                    <h1 class="text-4xl md:text-5xl font-black text-gray-900 mb-4 leading-tight">
                        안녕하세요,<br />
                        <span class="bg-gradient-to-r from-blue-600 to-green-600 bg-clip-text text-transparent"
                              th:text="${user != null ? user.nickname : '개발자'}">개발자</span>님
                    </h1>
                </div>
            </div>
        </div>
    </div>

    <section class="mb-16">
        <h2 class="text-2xl font-bold text-gray-900 mb-6">추천 강의</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" th:if="${recommendedCourses != null}">
            <div th:each="course : ${recommendedCourses}" class="bg-white border-2 border-gray-200 rounded-xl overflow-hidden hover:shadow-xl transition-all duration-300">
                <a th:href="@{/course/{id}(id=${course.id})}" class="block">
                    <img th:src="${course.thumbnail}" class="w-full aspect-video object-cover" />
                    <div class="p-5">
                        <span class="inline-block px-2.5 py-1 text-xs font-bold rounded-full bg-blue-50 text-blue-700 mb-3"
                              th:text="${course.category.name}">카테고리</span>
                        <h3 class="text-lg font-black text-gray-900 mb-2 line-clamp-2" th:text="${course.title}">강의 제목</h3>
                        <p class="text-sm text-gray-600 mb-4 font-bold" th:text="${course.instructor.nickname}">강사명</p>
                        <div class="flex items-center justify-between pt-3 border-t">
                            <span class="font-bold text-gray-900">★ 4.5</span>
                            <span class="text-base font-bold text-gray-900">
                                <span th:text="${#numbers.formatInteger(course.price, 1, 'COMMA')}">10,000</span> 크레딧
                            </span>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </section>

    <section class="mb-16">
        <div class="flex items-center gap-2 overflow-x-auto pb-2 scrollbar-hide">
            <button th:each="cat : ${categories}"
                    th:data-category="${cat.name}"
                    onclick="selectCategory(this, this.getAttribute('data-category'))"
                    class="category-pill px-4 py-2 rounded-full font-medium text-sm transition-all whitespace-nowrap bg-white border border-gray-300 text-gray-700">
                [[${cat.name}]]
            </button>
        </div>
    </section>

</div>

<script>
    // 기존 스크립트 기능 유지
    function toggleNoticeDropdown() { document.getElementById('noticeDropdown').classList.toggle('open'); }
    function toggleProfileDropdown() { document.getElementById('profileDropdown').classList.toggle('open'); }

    // 보안 문제 해결을 위한 카테고리 선택 함수 보완
    function selectCategory(btn, categoryName) {
        document.querySelectorAll('.category-pill').forEach(el => {
            el.classList.remove('bg-[#111827]', 'text-white');
            el.classList.add('bg-white', 'border', 'border-gray-300', 'text-gray-700');
        });
        btn.classList.remove('bg-white', 'border', 'border-gray-300', 'text-gray-700');
        btn.classList.add('bg-[#111827]', 'text-white');

        // 여기에 카테고리 필터링 로직(페이지 이동 등)을 추가할 수 있습니다.
        console.log("Selected Category:", categoryName);
    }
</script>
</body>
</html>
