<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원가입</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gray-50 flex items-center justify-center">

<div class="w-full max-w-2xl bg-white p-8 rounded-2xl shadow-xl">
  <h1 class="text-2xl font-bold mb-6">회원가입</h1>

  <form id="signupForm" class="space-y-4">

    <input id="username" placeholder="아이디" class="w-full border p-3 rounded-xl" />
    <input id="password" type="password" placeholder="비밀번호" class="w-full border p-3 rounded-xl" />
    <input id="passwordConfirm" type="password" placeholder="비밀번호 확인" class="w-full border p-3 rounded-xl" />

    <input id="name" placeholder="이름" class="w-full border p-3 rounded-xl" />
    <input id="nickname" placeholder="닉네임" class="w-full border p-3 rounded-xl" />

    <input id="email" placeholder="이메일" class="w-full border p-3 rounded-xl" />
    <input id="phone" placeholder="전화번호" class="w-full border p-3 rounded-xl" />

    <input id="birthDate" type="date" class="w-full border p-3 rounded-xl" />

    <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl">
      가입하기
    </button>
  </form>
</div>

<script>
  const form = document.getElementById("signupForm");

  function validateUsername(username) {
    if (username.length < 4) return "아이디는 4자 이상";
    if (!/^[a-zA-Z0-9_]+$/.test(username)) return "영문, 숫자, _만 가능";
    return null;
  }

  function validateEmail(email) {
    if (!/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(email)) return "이메일 형식 오류";
    return null;
  }

  function validatePhone(phone) {
    if (!/^01[0-9][0-9]{7,8}$/.test(phone.replace(/-/g,""))) return "전화번호 형식 오류";
    return null;
  }

  form.addEventListener("submit", function(e){
    e.preventDefault();

    const data = {
      username: username.value,
      password: password.value,
      passwordConfirm: passwordConfirm.value,
      name: name.value,
      nickname: nickname.value,
      email: email.value,
      phone: phone.value,
      birthDate: birthDate.value
    };

    // 빈값 체크
    for (let key in data) {
      if (!data[key]) {
        alert("항목을 모두 입력해주세요");
        return;
      }
    }

    // 유효성 검사
    if (validateUsername(data.username) ||
            validateEmail(data.email) ||
            validatePhone(data.phone)) {
      alert("입력 정보 확인");
      return;
    }

    // 비밀번호 확인
    if (data.password !== data.passwordConfirm) {
      alert("비밀번호 불일치");
      return;
    }

    // 저장
    localStorage.setItem("userData", JSON.stringify(data));

    alert("회원가입 완료");

    setTimeout(()=>{
      location.href = "login.html";
    },1000);
  });
</script>

</body>
</html>
