<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>공지사항</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">

<div class="max-w-7xl mx-auto px-6 py-12">

  <!-- Header -->
  <div class="mb-8 flex items-center justify-between">

    <a href="#" class="flex items-center gap-2 px-4 py-2 border rounded-xl hover:bg-gray-50">
      ← <span>뒤로가기</span>
    </a>

    <a href="#" class="px-6 py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700">
      + 작성하기
    </a>

  </div>

  <!-- Title -->
  <div class="mb-12">
    <h1 class="text-4xl font-black mb-2">공지사항</h1>
    <p class="text-gray-600">플랫폼의 최신 소식과 공지사항을 확인하세요</p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

    <!-- 리스트 -->
    <div class="space-y-4">

      <h2 class="text-xl font-black mb-4">
        공지 목록 (2)
      </h2>

      <!-- Item -->
      <div class="p-6 border-2 border-gray-200 rounded-2xl bg-white hover:shadow-lg cursor-pointer transition">
        <h3 class="font-bold mb-2">공지 제목입니다</h3>

        <div class="text-sm text-gray-600 flex gap-4">
          <span>관리자</span>
          <span>2026-04-01</span>
          <span>👁 123</span>
        </div>
      </div>

      <div class="p-6 border-2 border-gray-200 rounded-2xl bg-white hover:shadow-lg cursor-pointer transition">
        <h3 class="font-bold mb-2">두번째 공지</h3>

        <div class="text-sm text-gray-600 flex gap-4">
          <span>관리자</span>
          <span>2026-04-02</span>
          <span>👁 55</span>
        </div>
      </div>

    </div>

    <!-- 상세 -->
    <div class="bg-white border-2 border-gray-200 rounded-2xl p-8 shadow-sm">

      <h2 class="text-2xl font-black mb-4">
        공지 제목입니다
      </h2>

      <div class="text-sm text-gray-600 mb-4 border-b pb-4">
        관리자 · 2026-04-01 · 👁 123
      </div>

      <p class="text-gray-700 mb-8 leading-relaxed">
        공지 내용이 들어가는 영역입니다.
      </p>

      <div class="flex gap-3 pt-6 border-t">

        <a href="#" class="flex-1 text-center px-4 py-3 border border-gray-200 text-blue-600 rounded-xl hover:bg-blue-50">
          수정하기
        </a>

        <button class="flex-1 px-4 py-3 border border-gray-200 text-red-600 rounded-xl hover:bg-red-50">
          삭제하기
        </button>

      </div>

    </div>

  </div>

</div>

</body>
</html>
