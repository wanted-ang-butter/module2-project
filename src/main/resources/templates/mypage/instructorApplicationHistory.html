<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>강사 신청 | Nae-Il</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .notice-dropdown { display: none; }
    .notice-dropdown.open { display: block; }
    .profile-dropdown { display: none; }
    .profile-dropdown.open { display: block; }
  </style>
</head>
<body class="bg-gray-50">

<div th:replace="fragments/userHeader :: userHeader"></div>

<div class="max-w-7xl mx-auto px-6 py-12">
  <div class="grid grid-cols-12 gap-8">

    <!-- Left Sidebar -->
    <div class="col-span-3">
      <div class="bg-white border-2 border-gray-200 rounded-2xl p-6 sticky top-24">
        <h2 class="text-xl font-black text-gray-900 mb-6">설정</h2>
        <nav class="space-y-2">
          <a th:href="@{/my-courses}" href="/my-courses"
             class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 hover:bg-gray-50 font-medium transition-all">
            <i class="fa-solid fa-video w-5 h-5"></i>
            <span class="text-sm">내 강의</span>
          </a>
          <a th:href="@{/user/me}" href="/user/me"
             class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 hover:bg-gray-50 font-medium transition-all">
            <i class="fa-solid fa-gear w-5 h-5"></i>
            <span class="text-sm">계정 설정</span>
          </a>
          <a th:href="@{/payment/history}" href="/payment/history"
             class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 hover:bg-gray-50 font-medium transition-all">
            <i class="fa-solid fa-user w-5 h-5"></i>
            <span class="text-sm">결제 내역</span>
          </a>
          <a th:href="@{/user/me/instructor-application/history}" href="/user/me/instructor-application/history"
             class="flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-50 text-blue-600 font-bold transition-all">
            <i class="fa-solid fa-chalkboard-user w-5 h-5"></i>
            <span class="text-sm">강사 신청</span>
          </a>
        </nav>
      </div>
    </div>

    <!-- Main Content -->
    <div class="col-span-9">
      <div class="bg-white border-2 border-gray-200 rounded-2xl p-8">
        <div class="flex items-center justify-between mb-8">
          <div>
            <h2 class="text-3xl font-black text-gray-900 mb-2">강사 신청 이력</h2>
            <p class="text-gray-600 font-medium">강사 신청 내역을 확인하고 관리하세요</p>
          </div>
          <a th:href="@{/user/me/apply-instructor}" href="/user/me/apply-instructor"
             class="inline-flex items-center gap-2 px-6 py-3 bg-gradient-to-r from-green-600 to-green-700 text-white rounded-xl hover:shadow-xl hover:shadow-green-200 transition-all font-bold">
            <i class="fa-solid fa-circle-plus w-5 h-5"></i>
            <span>강사 신청하기</span>
          </a>
        </div>

        <!-- 승인 대기 알림 -->
        <div th:if="${hasPending}" class="mb-6 p-5 bg-yellow-50 border-2 border-yellow-200 rounded-xl">
          <div class="flex items-center gap-3">
            <i class="fa-solid fa-clock text-yellow-600 text-xl"></i>
            <div>
              <p class="text-sm font-black text-yellow-900">승인 대기 중</p>
              <p class="text-sm text-yellow-700 font-medium">현재 신청하신 내용을 검토 중입니다. 검토가 완료되면 알려드리겠습니다.</p>
            </div>
          </div>
        </div>

        <!-- 신청 이력 없음 -->
        <div th:if="${applications == null or #lists.isEmpty(applications)}" class="text-center py-16">
          <i class="fa-solid fa-file-lines text-gray-300 text-6xl mb-4 block"></i>
          <h3 class="text-xl font-black text-gray-900 mb-2">신청 이력이 없습니다</h3>
          <p class="text-gray-600 mb-6 font-medium">강사로 활동하고 싶으시다면 신청을 시작해보세요</p>
          <a th:href="@{/user/me/apply-instructor}" href="/user/me/apply-instructor"
             class="inline-flex items-center gap-2 px-6 py-3 bg-gradient-to-r from-green-600 to-green-700 text-white rounded-xl hover:shadow-xl hover:shadow-green-200 transition-all font-bold">
            <i class="fa-solid fa-circle-plus w-5 h-5"></i>
            <span>강사 신청하기</span>
          </a>
        </div>

        <!-- 신청 이력 목록 -->
        <div th:unless="${applications == null or #lists.isEmpty(applications)}" class="space-y-4">
          <div th:each="app : ${applications}"
               th:classappend="${app.status.name() == 'PENDING'} ? 'border-yellow-200 bg-yellow-50' : (${app.status.name() == 'APPROVED'} ? 'border-green-200 bg-green-50' : 'border-red-200 bg-red-50')"
               class="p-6 border-2 rounded-xl">
            <div class="flex items-start justify-between">
              <div class="flex-1">
                <div class="flex items-center gap-3 mb-3">
                  <!-- 승인 대기 -->
                  <div th:if="${app.status.name() == 'PENDING'}"
                       class="flex items-center gap-2 px-3 py-1 rounded-lg bg-yellow-50 border border-yellow-200">
                    <i class="fa-solid fa-clock w-4 h-4 text-yellow-600"></i>
                    <span class="text-sm font-bold text-yellow-600">승인 대기중</span>
                  </div>
                  <!-- 승인 완료 -->
                  <div th:if="${app.status.name() == 'APPROVED'}"
                       class="flex items-center gap-2 px-3 py-1 rounded-lg bg-green-50 border border-green-200">
                    <i class="fa-solid fa-circle-check w-4 h-4 text-green-600"></i>
                    <span class="text-sm font-bold text-green-600">승인 완료</span>
                  </div>
                  <!-- 반려 -->
                  <div th:if="${app.status.name() == 'REJECTED'}"
                       class="flex items-center gap-2 px-3 py-1 rounded-lg bg-red-50 border border-red-200">
                    <i class="fa-solid fa-circle-xmark w-4 h-4 text-red-600"></i>
                    <span class="text-sm font-bold text-red-600">반려됨</span>
                  </div>
                </div>
                <h3 class="text-xl font-black text-gray-900 mb-2" th:text="${app.title}">신청 제목</h3>
                <p class="text-sm text-gray-600 font-medium">
                  신청일: <span th:text="${app.createdAt}">2026-04-14</span>
                </p>
              </div>
              <!-- 신청 철회 버튼 (대기 중일 때만) -->
              <form th:if="${app.status.name() == 'PENDING'}"
                    th:action="@{/user/me/instructor-application/{id}/cancel(id=${app.id})}"
                    method="POST" class="ml-4">
                <button type="submit"
                        onclick="return confirm('신청을 철회하시겠습니까?')"
                        class="inline-flex items-center gap-2 px-4 py-2 border-2 border-red-300 text-red-600 rounded-xl hover:bg-red-50 transition-all font-bold">
                  <i class="fa-solid fa-trash w-4 h-4"></i>
                  <span>신청 철회</span>
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Footer -->
<footer class="border-t border-gray-200 bg-white mt-16">
  <div class="max-w-7xl mx-auto px-6 py-8">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-2">
        <i class="fa-solid fa-terminal text-blue-600"></i>
        <span class="text-sm font-bold text-gray-600">© 2026 Nae-Il. 코딩으로 만드는 내일</span>
      </div>
      <div class="flex items-center gap-6 text-sm text-gray-600">
        <a href="#" class="hover:text-blue-600 transition-colors">이용약관</a>
        <a href="#" class="hover:text-blue-600 transition-colors">개인정보처리방침</a>
        <a href="#" class="hover:text-blue-600 transition-colors">고객센터</a>
      </div>
    </div>
  </div>
</footer>

<script>
  function toggleNoticeDropdown() {
    const el = document.getElementById('noticeDropdown');
    if (el) el.classList.toggle('open');
  }
  function toggleProfileDropdown() {
    const el = document.getElementById('profileDropdown');
    if (el) el.classList.toggle('open');
  }
  document.addEventListener('click', function(e) {
    const noticeWrapper = document.getElementById('noticeDropdownWrapper');
    const profileWrapper = document.getElementById('profileDropdownWrapper');
    if (noticeWrapper && !noticeWrapper.contains(e.target)) {
      const el = document.getElementById('noticeDropdown');
      if (el) el.classList.remove('open');
    }
    if (profileWrapper && !profileWrapper.contains(e.target)) {
      const el = document.getElementById('profileDropdown');
      if (el) el.classList.remove('open');
    }
  });
</script>
</body>
</html>
