<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>강사 신청 | Nae-Il</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        .notice-dropdown { display: none; }
        .notice-dropdown.open { display: block; }
        .profile-dropdown { display: none; }
        .profile-dropdown.open { display: block; }
    </style>
</head>
<body class="bg-gray-50">

<div th:replace="fragments/userHeader :: userHeader"></div>

<div class="max-w-7xl mx-auto px-6 py-12">
    <div class="grid grid-cols-12 gap-8">

        <!-- Left Sidebar -->
        <div class="col-span-3">
            <div class="bg-white border-2 border-gray-200 rounded-2xl p-6 sticky top-24">
                <nav class="space-y-2">
                    <a th:href="@{/my-courses}" href="/my-courses"
                       class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 hover:bg-gray-50 font-medium transition-all">
                        <i class="fa-solid fa-video w-5 h-5"></i>
                        <span class="text-sm">내 강의</span>
                    </a>
                    <a th:href="@{/user/me}" href="/user/me"
                       class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 hover:bg-gray-50 font-medium transition-all">
                        <i class="fa-solid fa-gear w-5 h-5"></i>
                        <span class="text-sm">계정 설정</span>
                    </a>
                    <a th:href="@{/payment/history}" href="/payment/history"
                       class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 hover:bg-gray-50 font-medium transition-all">
                        <i class="fa-solid fa-user w-5 h-5"></i>
                        <span class="text-sm">결제 내역</span>
                    </a>
                    <a th:href="@{/user/me/apply-instructor}" href="/user/me/apply-instructor"
                       class="flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-50 text-blue-600 font-bold transition-all">
                        <i class="fa-solid fa-pen-to-square w-5 h-5"></i>
                        <span class="text-sm">강사 신청</span>
                    </a>
                    <a th:href="@{/user/me/instructor-application/history}" href="/user/me/instructor-application/history"
                       class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 hover:bg-gray-50 font-medium transition-all">
                        <i class="fa-solid fa-chalkboard-user w-5 h-5"></i>
                        <span class="text-sm">강사 신청 내역</span>
                    </a>
                </nav>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-span-9">
            <div class="bg-white border-2 border-gray-200 rounded-2xl p-8">
                <div class="mb-8">
                    <h2 class="text-3xl font-black text-gray-900 mb-2">강사 신청</h2>
                    <p class="text-gray-600 font-medium">강사로 활동하기 위한 정보를 입력해주세요</p>
                </div>

                <!-- 에러/성공 메시지 -->
                <div th:if="${errorMessage}" class="mb-6 p-4 bg-red-50 border-2 border-red-200 rounded-xl">
                    <p class="text-sm font-bold text-red-600" th:text="${errorMessage}"></p>
                </div>
                <div th:if="${successMessage}" class="mb-6 p-4 bg-green-50 border-2 border-green-200 rounded-xl">
                    <p class="text-sm font-bold text-green-600" th:text="${successMessage}"></p>
                </div>

                <form th:action="@{/user/me/apply-instructor}" method="POST" enctype="multipart/form-data" class="space-y-6">

                    <!-- 제목 -->
                    <div>
                        <label class="block text-sm font-bold text-gray-900 mb-2">제목 <span class="text-red-500">*</span></label>
                        <input type="text" name="title" placeholder="신청 제목을 입력하세요"
                               class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-600 focus:outline-none transition-colors font-medium"/>
                    </div>

                    <!-- 분야 (카테고리 선택) -->
                    <div>
                        <label class="block text-sm font-bold text-gray-900 mb-2">분야 <span class="text-red-500">*</span></label>
                        <select name="categoryId"
                                class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-600 focus:outline-none transition-colors font-medium bg-white">
                            <option value="">분야를 선택하세요</option>
                            <option th:each="category : ${categories}"
                                    th:value="${category.id}"
                                    th:text="${category.name}">카테고리</option>
                        </select>
                    </div>

                    <!-- 소개 -->
                    <div>
                        <label class="block text-sm font-bold text-gray-900 mb-2">소개 <span class="text-red-500">*</span></label>
                        <textarea name="introduction" rows="4" placeholder="본인 소개를 입력하세요"
                                  class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-600 focus:outline-none transition-colors font-medium resize-none"></textarea>
                    </div>

                    <!-- 경력 -->
                    <div>
                        <label class="block text-sm font-bold text-gray-900 mb-2">경력 <span class="text-red-500">*</span></label>
                        <textarea name="career" rows="4" placeholder="예: 5년 이상 개발 경력, 관련 프로젝트 경험 등"
                                  class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-600 focus:outline-none transition-colors font-medium resize-none"></textarea>
                    </div>

                    <!-- 계좌번호 -->
                    <div>
                        <label class="block text-sm font-bold text-gray-900 mb-2">계좌번호 <span class="text-red-500">*</span></label>
                        <input type="text" name="accountNumber" placeholder="예: 은행명 000-0000-0000"
                               class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-600 focus:outline-none transition-colors font-medium"/>
                    </div>

                    <!-- 증빙 자료 -->
                    <div>
                        <label class="block text-sm font-bold text-gray-900 mb-2">증빙 자료 <span class="text-red-500">*</span></label>
                        <div id="proofFileList" class="space-y-2 mb-2"></div>
                        <div class="border-2 border-dashed border-gray-300 rounded-xl p-6 text-center hover:border-blue-500 hover:bg-blue-50 transition-colors cursor-pointer"
                             onclick="document.getElementById('proofFilesInput').click()">
                            <i class="fa-solid fa-upload text-gray-400 text-3xl mb-3 block"></i>
                            <p class="text-sm font-medium text-gray-600">파일을 선택하거나 드래그하여 업로드</p>
                            <p class="text-xs text-gray-400 mt-1">PDF, DOC, DOCX, JPG, PNG (최대 10MB, 최대 10개)</p>
                            <input type="file" id="proofFilesInput"
                                   accept=".pdf,.doc,.docx,.jpg,.jpeg,.png"
                                   multiple
                                   class="hidden" onchange="addProofFiles(this)"/>
                        </div>
                        <!-- 실제 전송용 hidden input들이 JS로 동적 추가됨 -->
                        <div id="proofFilesContainer"></div>
                    </div>

                    <!-- 얼굴 사진 -->
                    <div>
                        <label class="block text-sm font-bold text-gray-900 mb-2">얼굴 사진 <span class="text-red-500">*</span></label>
                        <div id="faceImgPreview" class="mb-2"></div>
                        <div id="faceImgUploadArea" class="border-2 border-dashed border-gray-300 rounded-xl p-6 text-center hover:border-blue-500 hover:bg-blue-50 transition-colors cursor-pointer"
                             onclick="document.getElementById('faceImgInput').click()">
                            <i class="fa-solid fa-image text-gray-400 text-3xl mb-3 block"></i>
                            <p class="text-sm font-medium text-gray-600">얼굴 사진을 업로드하세요</p>
                            <p class="text-xs text-gray-400 mt-1">JPG, PNG (최대 5MB)</p>
                            <input type="file" id="faceImgInput" name="faceImg"
                                   accept=".jpg,.jpeg,.png"
                                   class="hidden" onchange="addFaceImg(this)"/>
                        </div>
                    </div>

                    <!-- 버튼 -->
                    <div class="flex gap-4 pt-4">
                        <button type="submit"
                                class="flex-1 px-6 py-4 bg-gradient-to-r from-blue-600 to-green-600 text-white rounded-xl font-bold hover:shadow-xl hover:shadow-blue-200 transition-all">
                            제출하기
                        </button>
                        <a th:href="@{/user/me/instructor-application/history}" href="/user/me/instructor-application/history"
                           class="px-8 py-4 border-2 border-gray-300 rounded-xl hover:border-blue-600 hover:text-blue-600 transition-all font-bold">
                            취소
                        </a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="border-t border-gray-200 bg-white mt-16">
    <div class="max-w-7xl mx-auto px-6 py-8">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-terminal text-blue-600"></i>
                <span class="text-sm font-bold text-gray-600">© 2026 Nae-Il. 코딩으로 만드는 내일</span>
            </div>
            <div class="flex items-center gap-6 text-sm text-gray-600">
                <a href="#" class="hover:text-blue-600 transition-colors">이용약관</a>
                <a href="#" class="hover:text-blue-600 transition-colors">개인정보처리방침</a>
                <a href="#" class="hover:text-blue-600 transition-colors">고객센터</a>
            </div>
        </div>
    </div>
</footer>

<script>
    let proofFiles = [];
    function toggleNoticeDropdown() {
        const el = document.getElementById('noticeDropdown');
        if (el) el.classList.toggle('open');
    }
    function toggleProfileDropdown() {
        const el = document.getElementById('profileDropdown');
        if (el) el.classList.toggle('open');
    }
    document.addEventListener('click', function(e) {
        const noticeWrapper = document.getElementById('noticeDropdownWrapper');
        const profileWrapper = document.getElementById('profileDropdownWrapper');
        if (noticeWrapper && !noticeWrapper.contains(e.target)) {
            document.getElementById('noticeDropdown').classList.remove('open');
        }
        if (profileWrapper && !profileWrapper.contains(e.target)) {
            document.getElementById('profileDropdown').classList.remove('open');
        }
    });

    // ===== 증빙 자료 관리 =====
    // let proofFiles = []; // 선택된 파일 배열

    function addProofFiles(input) {
        const newFiles = Array.from(input.files);

        // 전체 체크를 forEach 밖에서 먼저 해요
        const availableSlots = 10 - proofFiles.length;
        if (availableSlots <= 0) {
            alert('증빙 자료는 최대 10개까지 업로드 가능합니다.');
            input.value = '';
            return;
        }

        let addedCount = 0;
        newFiles.forEach(file => {
            if (addedCount >= availableSlots) return; // 슬롯 초과 시 그냥 건너뜀
            if (file.size > 10 * 1024 * 1024) {
                alert(`${file.name}: 파일 크기는 10MB 이하여야 합니다.`);
                return;
            }
            proofFiles.push(file);
            addedCount++;
        });

        // 10개 초과분이 잘렸을 때 한 번만 알림
        if (newFiles.length > availableSlots) {
            alert(`증빙 자료는 최대 10개까지 업로드 가능합니다. ${availableSlots}개만 추가되었습니다.`);
        }

        input.value = '';
        renderProofFiles();
        syncProofFilesToForm();
    }

    function removeProofFile(index) {
        proofFiles.splice(index, 1);
        renderProofFiles();
        syncProofFilesToForm();
    }

    function renderProofFiles() {
        const list = document.getElementById('proofFileList');
        list.innerHTML = '';
        proofFiles.forEach((file, index) => {
            const item = document.createElement('div');
            item.className = 'flex items-center justify-between p-4 border-2 border-green-200 bg-green-50 rounded-xl';
            item.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-file-lines text-green-600"></i>
                    </div>
                    <div>
                        <p class="text-sm font-bold text-gray-900">${file.name}</p>
                        <p class="text-xs text-gray-500">${(file.size / 1024).toFixed(2)} KB</p>
                    </div>
                </div>
                <button type="button" onclick="removeProofFile(${index})"
                        class="p-2 hover:bg-red-100 rounded-lg transition-colors">
                    <i class="fa-solid fa-xmark text-red-600"></i>
                </button>
            `;
            list.appendChild(item);
        });
    }

    function syncProofFilesToForm() {
        // 기존 hidden input 제거
        const container = document.getElementById('proofFilesContainer');
        container.innerHTML = '';

        // DataTransfer로 FileList 생성해서 hidden input에 연결
        const dt = new DataTransfer();
        proofFiles.forEach(file => dt.items.add(file));

        const input = document.createElement('input');
        input.type = 'file';
        input.name = 'proofFiles';
        input.multiple = true;
        input.style.display = 'none';
        input.files = dt.files;
        container.appendChild(input);
    }

    // ===== 얼굴 사진 관리 =====
    function addFaceImg(input) {
        const file = input.files[0];
        if (!file) return;

        // 5MB 체크
        if (file.size > 5 * 1024 * 1024) {
            alert('파일 크기는 5MB 이하여야 합니다.');
            input.value = '';
            return;
        }

        const preview = document.getElementById('faceImgPreview');
        const uploadArea = document.getElementById('faceImgUploadArea');

        preview.innerHTML = `
            <div class="flex items-center justify-between p-4 border-2 border-blue-200 bg-blue-50 rounded-xl">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-image text-blue-600"></i>
                    </div>
                    <div>
                        <p class="text-sm font-bold text-gray-900">${file.name}</p>
                        <p class="text-xs text-gray-500">${(file.size / 1024).toFixed(2)} KB</p>
                    </div>
                </div>
                <button type="button" onclick="removeFaceImg()"
                        class="p-2 hover:bg-red-100 rounded-lg transition-colors">
                    <i class="fa-solid fa-xmark text-red-600"></i>
                </button>
            </div>
        `;
        uploadArea.classList.add('hidden'); // 업로드 영역 숨기기
    }

    function removeFaceImg() {
        const preview = document.getElementById('faceImgPreview');
        const uploadArea = document.getElementById('faceImgUploadArea');
        const input = document.getElementById('faceImgInput');

        preview.innerHTML = '';
        uploadArea.classList.remove('hidden'); // 업로드 영역 다시 보이기
        input.value = ''; // input 초기화
    }
</script>
</body>
</html>
