<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>검색 결과 | Nae-Il</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .notice-dropdown { display: none; }
    .notice-dropdown.open { display: block; }
  </style>
</head>
<body class="min-h-screen bg-white">

<!-- Top Navigation -->
<nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-lg border-b border-gray-100 shadow-sm">
  <div class="max-w-7xl mx-auto px-6 py-4">
    <div class="flex items-center justify-between">
      <!-- Logo -->
      <a th:href="@{/}" href="/" class="flex items-center gap-3 group">
        <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-green-500 rounded-lg flex items-center justify-center shadow-lg group-hover:shadow-xl transition-shadow">
          <i class="fa-solid fa-terminal text-white text-sm"></i>
        </div>
        <div>
          <h1 class="font-mono tracking-tight">
            <span class="bg-gradient-to-r from-blue-600 to-green-600 bg-clip-text text-transparent">Nae-Il</span>
          </h1>
          <div class="text-[10px] text-gray-500 font-mono -mt-1">내일</div>
        </div>
      </a>

      <!-- Navigation Menu -->
      <div class="flex items-center gap-4">
        <a th:href="@{/courses}" href="/courses"
           class="flex items-center gap-2 px-3 py-2 border-2 border-gray-200 rounded-xl hover:border-blue-600 hover:bg-blue-50 transition-all group">
          <i class="fa-solid fa-book-open text-gray-600 group-hover:text-blue-600 text-sm"></i>
          <span class="font-medium text-gray-700 group-hover:text-blue-600 text-sm">전체 강의</span>
        </a>
        <a th:href="@{/my-courses}" href="/my-courses"
           class="flex items-center gap-2 px-3 py-2 border-2 border-gray-200 rounded-xl hover:border-blue-600 hover:bg-blue-50 transition-all group">
          <i class="fa-solid fa-video text-gray-600 group-hover:text-blue-600 text-sm"></i>
          <span class="font-medium text-gray-700 group-hover:text-blue-600 text-sm">내 강의</span>
        </a>
        <a th:href="@{/community/qna}" href="/community/qna"
           class="flex items-center gap-2 px-3 py-2 border-2 border-gray-200 rounded-xl hover:border-blue-600 hover:bg-blue-50 transition-all group">
          <i class="fa-solid fa-comment text-gray-600 group-hover:text-blue-600 text-sm"></i>
          <span class="font-medium text-gray-700 group-hover:text-blue-600 text-sm">커뮤니티</span>
        </a>
        <a th:href="@{/cart}" href="/cart"
           class="flex items-center gap-2 px-3 py-2 border-2 border-gray-200 rounded-xl hover:border-blue-600 hover:bg-blue-50 transition-all group">
          <i class="fa-solid fa-cart-shopping text-gray-600 group-hover:text-blue-600 text-sm"></i>
          <span class="font-medium text-gray-700 group-hover:text-blue-600 text-sm">장바구니</span>
        </a>
        <a th:href="@{/credit}" href="/credit"
           class="flex items-center gap-2 px-3 py-2 border-2 border-gray-200 rounded-xl hover:border-blue-600 hover:bg-blue-50 transition-all group">
          <i class="fa-solid fa-wallet text-gray-600 group-hover:text-blue-600 text-sm"></i>
          <span class="font-medium text-gray-700 group-hover:text-blue-600 text-sm">크레딧</span>
        </a>

        <!-- Notice Dropdown -->
        <div class="relative" id="noticeDropdownWrapper">
          <button onclick="toggleNoticeDropdown()"
                  class="w-10 h-10 rounded-lg bg-gradient-to-br from-orange-500 to-red-500 flex items-center justify-center shadow-md hover:shadow-lg transition-shadow cursor-pointer">
            <i class="fa-solid fa-bullhorn text-white text-sm"></i>
          </button>
          <div id="noticeDropdown" class="notice-dropdown absolute right-0 mt-2 w-48 bg-white border-2 border-gray-200 rounded-xl shadow-xl z-50">
            <div class="py-2">
              <a th:href="@{/notice}" href="/notice"
                 class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors">
                <i class="fa-solid fa-bullhorn text-gray-600"></i>
                <span class="text-sm font-medium text-gray-900">공지사항</span>
              </a>
            </div>
          </div>
        </div>

        <a th:href="@{/login}" href="/login"
           class="px-4 py-2 text-gray-700 font-medium hover:text-blue-600 transition-colors text-sm">로그인</a>
        <a th:href="@{/signup}" href="/signup"
           class="px-4 py-2 bg-gradient-to-r from-blue-600 to-green-600 text-white rounded-lg hover:shadow-lg transition-all font-medium text-sm">
          회원가입
        </a>
      </div>
    </div>
  </div>
</nav>

<!-- Main Content -->
<div class="max-w-7xl mx-auto px-6 py-12">

  <!-- Header -->
  <div class="mb-12">
    <h1 class="text-4xl font-black text-gray-900 mb-2">
      '<span th:text="${keyword}">검색어</span>' 검색 결과
    </h1>
    <p class="text-lg text-gray-600 font-medium">
      총 <span th:text="${#lists.size(searchResults)}">0</span>개의 강의
    </p>
  </div>

  <!-- Results Grid -->
  <div th:if="${not #lists.isEmpty(searchResults)}"
       class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div th:each="course : ${searchResults}">
      <a th:href="@{/course/{id}(id=${course.courseId})}" href="#" class="block h-full">
        <div class="group bg-white border-2 border-gray-200 rounded-xl overflow-hidden hover:shadow-xl hover:border-blue-300 hover:-translate-y-1 transition-all duration-300 cursor-pointer h-full">

          <!-- Thumbnail -->
          <div class="relative aspect-video overflow-hidden bg-gray-100">
            <img th:src="${course.thumbnail}" th:alt="${course.title}"
                 src="#" alt="강의 썸네일"
                 class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />
          </div>

          <!-- Content -->
          <div class="p-5">
            <!-- Category -->
            <div class="mb-3">
                <span class="inline-block px-2.5 py-1 text-xs font-bold rounded-full bg-blue-50 text-blue-700 border border-blue-200"
                      th:text="${course.category}">카테고리</span>
            </div>

            <!-- Title -->
            <h3 class="text-lg font-black text-gray-900 mb-2 line-clamp-2 group-hover:text-blue-600 transition-colors"
                th:text="${course.title}">강의 제목</h3>

            <!-- Description -->
            <p class="text-sm text-gray-500 mb-3 line-clamp-2 font-medium"
               th:text="${course.description}">강의 설명</p>

            <!-- Instructor -->
            <p class="text-sm text-gray-600 mb-4 font-bold" th:text="${course.instructorName}">강사명</p>

            <!-- Bottom Row -->
            <div class="flex items-center justify-between pt-3 border-t border-gray-200">
              <div class="flex items-center gap-3 text-sm">
                <div class="flex items-center gap-1">
                  <i class="fa-solid fa-star text-yellow-400 text-xs"></i>
                  <span class="font-bold text-gray-900"
                        th:text="${course.rating}">4.5</span>
                </div>
                <div class="flex items-center gap-1">
                  <i class="fa-solid fa-users text-gray-400 text-xs"></i>
                  <span class="text-gray-600"
                        th:text="${#numbers.formatInteger(course.studentCount, 1, 'COMMA')}">1,234</span>
                </div>
              </div>
              <div class="text-right">
                  <span class="text-base font-bold text-gray-900">
                    <span th:text="${#numbers.formatInteger(course.price, 1, 'COMMA')}">10,000</span> 크레딧
                  </span>
              </div>
            </div>
          </div>

        </div>
      </a>
    </div>
  </div>

  <!-- Empty State -->
  <div th:if="${#lists.isEmpty(searchResults)}" class="text-center py-20">
    <div class="w-20 h-20 bg-gray-100 rounded-2xl flex items-center justify-center mx-auto mb-6">
      <i class="fa-solid fa-magnifying-glass text-gray-400 text-3xl"></i>
    </div>
    <h2 class="text-2xl font-black text-gray-900 mb-2">
      '<span th:text="${keyword}">검색어</span>'에 해당하는 강의가 없습니다
    </h2>
    <p class="text-gray-600 font-medium">다른 키워드로 검색해보세요</p>
  </div>

</div>

<script>
  function toggleNoticeDropdown() {
    const dropdown = document.getElementById('noticeDropdown');
    dropdown.classList.toggle('open');
  }
  document.addEventListener('click', function(e) {
    const wrapper = document.getElementById('noticeDropdownWrapper');
    if (!wrapper.contains(e.target)) {
      document.getElementById('noticeDropdown').classList.remove('open');
    }
  });
</script>
</body>
</html>
