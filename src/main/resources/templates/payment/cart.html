<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nae-Il | 장바구니</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    .grid-bg {
      background-image:
              linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
              linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
  </style>
</head>

<body class="min-h-screen bg-slate-50 text-slate-900">

<div class="fixed inset-0 grid-bg opacity-30 pointer-events-none"></div>

<div th:replace="fragments/userHeader :: userHeader"></div>

<main class="max-w-[1400px] mx-auto px-8 py-10">

  <div class="mb-8">
    <a href="javascript:history.back()"
       class="flex items-center gap-2 text-slate-500 hover:text-slate-700 mb-4">
      ← 이전으로
    </a>

    <h1 class="text-5xl font-black mb-2">장바구니</h1>

    <p class="text-xl text-slate-600 font-semibold">
      총 <span class="text-blue-600" th:text="${#lists.size(cartPage.cartItems)}">0</span>개의 강의가 담겨있습니다
    </p>
  </div>

  <div class="grid grid-cols-1 xl:grid-cols-[1fr_360px] gap-10">

    <div>
      <div th:if="${#lists.isEmpty(cartPage.cartItems)}"
           class="bg-white p-10 rounded-xl text-center border">
        장바구니가 비어있습니다.
      </div>

      <div th:unless="${#lists.isEmpty(cartPage.cartItems)}" class="space-y-6">

        <div th:each="item : ${cartPage.cartItems}"
             class="cart-card bg-white border-2 border-blue-500 p-6 rounded-xl flex items-center gap-5"
             th:attr="data-price=${item.price},data-cart-id=${item.cartItemId}">

          <input type="checkbox" class="cart-checkbox w-6 h-6" th:value="${item.cartItemId}" checked>

          <img th:src="${item.thumbnail}" class="w-32 h-20 rounded-lg object-cover">

          <div class="flex-1">
            <p class="font-bold text-xl" th:text="${item.courseTitle}"></p>
            <p class="text-slate-500" th:text="${item.instructorName}"></p>
            <p class="text-blue-600 font-bold text-xl">
              <span th:text="${#numbers.formatInteger(item.price,3,'COMMA')}"></span> 크레딧
            </p>
          </div>

          <form th:action="@{/cart/delete/{id}(id=${item.cartItemId})}" method="post">
            <input type="hidden" name="_method" value="delete"/>
            <button type="submit" onclick="return confirm('삭제하시겠습니까?')">
              🗑
            </button>
          </form>
        </div>

      </div>
    </div>

    <!-- 결제 -->
    <aside class="sticky top-24">
      <div class="bg-white p-6 rounded-2xl border shadow-sm">

        <h2 class="text-2xl font-black mb-6">결제 정보</h2>

        <div class="space-y-4 text-lg">

          <div class="flex justify-between">
            <span class="text-gray-600">선택한 강의</span>
            <span id="selectedCount" class="font-bold">0</span>
          </div>

          <!-- 구독자일 때만 노출 -->
          <div th:if="${isSubscriber}" class="rounded-2xl bg-yellow-50 border border-yellow-200 p-4">
            <div class="inline-flex items-center px-3 py-1 rounded-full bg-yellow-400 text-slate-900 font-extrabold text-sm mb-3">
              👑 구독자 혜택
            </div>
            <p class="text-slate-700 font-semibold">
              무료 구매 횟수:
              <span class="text-green-600 font-extrabold" th:text="${remainingFreeCount}">3</span>회 남음
            </p>
          </div>

          <div class="flex justify-between">
            <span class="text-gray-600">필요 크레딧</span>
            <span id="totalRequiredCredit" class="font-bold">0</span>
          </div>

          <div th:if="${isSubscriber and discountAmount > 0}" class="flex justify-between">
            <span class="text-green-600 font-semibold">총 할인 금액</span>
            <span class="font-bold text-green-600">
              -<span th:text="${#numbers.formatInteger(discountAmount, 3, 'COMMA')}">0</span>
            </span>
          </div>

          <div class="flex justify-between">
            <span class="text-gray-600">보유 크레딧</span>
            <span id="currentCreditText"
                  th:data-credit="${cartPage.creditBalance}"
                  th:text="${#numbers.formatInteger(cartPage.creditBalance, 3, 'COMMA')}">
            </span>
          </div>

          <div class="flex justify-between text-xl font-black">
            <span>잔액</span>
            <span id="remainingCredit">0</span>
          </div>
        </div>

        <div id="creditWarningBox"
             class="hidden mt-6 p-5 rounded-2xl border-2 border-red-200 bg-red-50">

          <div class="flex items-start gap-3">
            <i class="fa-solid fa-circle-exclamation text-red-600 text-xl mt-1"></i>

            <div>
              <p class="text-red-700 font-extrabold text-lg">
                크레딧이 부족합니다
              </p>

              <a href="/credit/charge"
                 class="text-red-600 font-bold underline mt-1 inline-block hover:text-red-700 transition">
                크레딧 충전하기 →
              </a>
            </div>
          </div>
        </div>

        <!-- 결제 페이지 이동 -->
        <form id="checkoutForm" th:action="@{/payments/courses}" method="get">
          <div id="selectedCartItemInputs"></div>

          <button id="checkoutBtn"
                  type="submit"
                  class="w-full mt-6 py-4 rounded-xl bg-blue-600 text-white text-lg font-black hover:bg-blue-700 transition">
            결제하기
          </button>
        </form>

      </div>
    </aside>

  </div>
</main>

<div id="cartPageData"
     th:attr="data-credit=${cartPage.creditBalance}"
     class="hidden"></div>

<script>
  const currentCredit = Number(document.getElementById('cartPageData').dataset.credit || 0);

  const checkboxes = document.querySelectorAll('.cart-checkbox');
  const selectedCountEl = document.getElementById('selectedCount');
  const totalRequiredCreditEl = document.getElementById('totalRequiredCredit');
  const remainingCreditEl = document.getElementById('remainingCredit');
  const currentCreditText = document.getElementById('currentCreditText');
  const creditWarningBox = document.getElementById('creditWarningBox');
  const checkoutBtn = document.getElementById('checkoutBtn');
  const selectedCartItemInputs = document.getElementById('selectedCartItemInputs');

  function updateSummary() {
    let count = 0;
    let total = 0;
    let ids = [];

    checkboxes.forEach(cb => {
      if (cb.checked) {
        const card = cb.closest('.cart-card');
        total += Number(card.dataset.price);
        ids.push(card.dataset.cartId);
        count++;
      }
    });

    const remaining = currentCredit - total;

    selectedCountEl.textContent = count;
    totalRequiredCreditEl.textContent = total.toLocaleString();
    currentCreditText.textContent = currentCredit.toLocaleString();

    selectedCartItemInputs.innerHTML = '';
    ids.forEach(id => {
      const input = document.createElement('input');
      input.type = 'hidden';
      input.name = 'selectedCartItemIds';
      input.value = id;
      selectedCartItemInputs.appendChild(input);
    });

    if (remaining >= 0) {
      remainingCreditEl.textContent = remaining.toLocaleString();
      remainingCreditEl.classList.remove('text-red-600');
      remainingCreditEl.classList.add('text-slate-900');

      creditWarningBox.classList.add('hidden');

      if (count === 0) {
        checkoutBtn.disabled = true;
        checkoutBtn.textContent = '선택된 강의 없음';
        checkoutBtn.classList.remove('bg-blue-600', 'hover:bg-blue-700', 'text-white');
        checkoutBtn.classList.add('bg-slate-200', 'text-slate-500', 'cursor-not-allowed');
      } else {
        checkoutBtn.disabled = false;
        checkoutBtn.textContent = total === 0 ? '무료로 수강 신청하기' : '결제하기';
        checkoutBtn.classList.remove('bg-slate-200', 'text-slate-500', 'cursor-not-allowed');
        checkoutBtn.classList.add('bg-blue-600', 'hover:bg-blue-700', 'text-white');
      }
    } else {
      remainingCreditEl.textContent = '-' + Math.abs(remaining).toLocaleString();
      remainingCreditEl.classList.remove('text-slate-900');
      remainingCreditEl.classList.add('text-red-600');

      creditWarningBox.classList.remove('hidden');

      checkoutBtn.disabled = true;
      checkoutBtn.textContent = '크레딧 부족';
      checkoutBtn.classList.remove('bg-blue-600', 'hover:bg-blue-700', 'text-white');
      checkoutBtn.classList.add('bg-slate-200', 'text-slate-500', 'cursor-not-allowed');
    }
  }

  checkboxes.forEach(cb => cb.addEventListener('change', updateSummary));
  updateSummary();
</script>

</body>
</html>
