<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>장바구니</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#f8f9fb] text-slate-900">

<div class="max-w-7xl mx-auto px-8 py-10">

  <div class="mb-8">
    <a href="javascript:history.back()"
       class="inline-flex items-center gap-2 text-slate-500 text-sm mb-5 hover:text-slate-700">
      <span>←</span>
      <span>이전으로</span>
    </a>

    <h1 class="text-5xl font-black tracking-tight mb-3">장바구니</h1>
    <p class="text-2xl font-semibold text-slate-600">
      총 <span class="text-blue-600" th:text="${#lists.size(cartPage.cartItems)}">0</span>개의 강의가 담겨있습니다
    </p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-[1fr_380px] gap-10 items-start">

    <div>
      <div th:if="${#lists.isEmpty(cartPage.cartItems)}"
           class="bg-white rounded-[28px] border border-slate-200 p-10 text-center text-slate-500 text-xl font-semibold">
        장바구니에 담긴 강의가 없습니다.
      </div>

      <div th:unless="${#lists.isEmpty(cartPage.cartItems)}" class="space-y-6">

        <div th:each="item : ${cartPage.cartItems}"
             class="cart-card bg-white rounded-[28px] border border-blue-500 p-7 transition"
             th:attr="data-price=${item.price},data-cart-id=${item.cartItemId}">

          <div class="flex items-center gap-6">

            <div>
              <input type="checkbox"
                     class="cart-checkbox w-7 h-7 rounded border-slate-300 accent-blue-600"
                     th:value="${item.cartItemId}"
                     checked>
            </div>

            <img th:src="${item.thumbnail}"
                 alt="강의 썸네일"
                 class="w-44 h-28 rounded-2xl object-cover shrink-0"/>

            <div class="flex-1 min-w-0">
              <p class="text-4xl font-black leading-snug mb-2"
                 th:text="${item.courseTitle}">
                강의명
              </p>

              <p class="text-2xl text-slate-500 font-semibold mb-3"
                 th:text="${item.instructorName}">
                강사명
              </p>

              <p class="text-4xl font-black text-blue-600">
                <span th:text="${#numbers.formatInteger(item.price, 3, 'COMMA')}">0</span> 크레딧
              </p>
            </div>

            <!-- 삭제 -->
            <form th:action="@{/cart/{cartItemId}(cartItemId=${item.cartItemId})}" method="post">
              <input type="hidden" name="_method" value="delete"/>
              <button type="submit"
                      onclick="return confirm('정말 삭제하시겠습니까?')"
                      class="w-14 h-14 rounded-2xl border border-slate-300 text-slate-400 text-2xl hover:bg-slate-50">
                🗑
              </button>
            </form>

          </div>
        </div>
      </div>
    </div>

    <aside class="sticky top-8">
      <div class="bg-white rounded-[28px] border border-slate-200 shadow-sm p-8">
        <h2 class="text-3xl font-black mb-8">결제 정보</h2>

        <div class="space-y-6 text-xl">
          <div class="flex justify-between items-center">
            <span class="text-slate-500 font-semibold">선택한 강의</span>
            <span class="font-black text-3xl">
              <span id="selectedCount">0</span>개
            </span>
          </div>

          <div class="border-t border-slate-200"></div>

          <div class="flex justify-between items-center">
            <span class="text-slate-500 font-semibold">필요 크레딧</span>
            <span id="totalRequiredCredit" class="font-black text-3xl">0</span>
          </div>

          <div class="border-t border-slate-200"></div>

          <div class="flex justify-between items-center">
            <span class="text-slate-500 font-semibold">보유 크레딧</span>
            <span id="currentCredit"
                  class="font-black text-3xl"
                  th:text="${#numbers.formatInteger(cartPage.creditBalance, 3, 'COMMA')}">
              0
            </span>
          </div>

          <div class="border-t border-slate-200"></div>

          <div class="flex justify-between items-center">
            <span class="font-black text-slate-800">결제 후 잔액</span>
            <span id="remainingCredit"
                  class="font-black text-4xl text-blue-600">
              0
            </span>
          </div>
        </div>

        <div id="creditWarningBox"
             class="hidden mt-8 rounded-2xl border border-red-200 bg-red-50 p-5">
          <div class="flex items-start gap-3">
            <div class="text-red-500 text-xl mt-0.5">❗</div>
            <div>
              <p class="text-red-600 font-bold text-lg">크레딧이 부족합니다</p>
              <a th:href="@{/credit/charge}"
                 class="inline-block mt-2 text-red-600 font-bold underline underline-offset-4">
                크레딧 충전하기 →
              </a>
            </div>
          </div>
        </div>

        <form id="checkoutForm" th:action="@{/cart/checkout}" method="post">
          <div id="selectedCartItemInputs"></div>

          <button id="checkoutBtn"
                  type="submit"
                  class="mt-8 w-full h-16 rounded-2xl text-2xl font-black shadow-sm transition bg-blue-600 text-white hover:bg-blue-700">
            선택 상품 결제하기
          </button>
        </form>
      </div>
    </aside>

  </div>
</div>

<script th:inline="javascript">
  const currentCredit = Number([[${cartPage.creditBalance}]]);
  const selectedCartItemIdsFromServer = [[${cartPage.selectedCartItemIds}]];
</script>

<script>
  const checkboxes = document.querySelectorAll('.cart-checkbox');
  const selectedCountEl = document.getElementById('selectedCount');
  const totalRequiredCreditEl = document.getElementById('totalRequiredCredit');
  const remainingCreditEl = document.getElementById('remainingCredit');
  const creditWarningBox = document.getElementById('creditWarningBox');
  const checkoutBtn = document.getElementById('checkoutBtn');
  const selectedCartItemInputs = document.getElementById('selectedCartItemInputs');
  const checkoutForm = document.getElementById('checkoutForm');

  function formatNumber(value) {
    return Number(value).toLocaleString('ko-KR');
  }

  function updateCardStyle(checkbox) {
    const card = checkbox.closest('.cart-card');
    if (!card) return;

    if (checkbox.checked) {
      card.classList.remove('border-slate-200');
      card.classList.add('border-blue-500');
    } else {
      card.classList.remove('border-blue-500');
      card.classList.add('border-slate-200');
    }
  }

  function initializeCheckboxSelection() {
    if (Array.isArray(selectedCartItemIdsFromServer) && selectedCartItemIdsFromServer.length > 0) {
      checkboxes.forEach((checkbox) => {
        const cartItemId = Number(checkbox.value);
        checkbox.checked = selectedCartItemIdsFromServer.includes(cartItemId);
      });
    }
  }

  function updateSummary() {
    let selectedCount = 0;
    let totalRequiredCredit = 0;
    const selectedIds = [];

    checkboxes.forEach((checkbox) => {
      updateCardStyle(checkbox);

      if (checkbox.checked) {
        const card = checkbox.closest('.cart-card');
        const price = Number(card.dataset.price);
        const cartId = card.dataset.cartId;

        selectedCount++;
        totalRequiredCredit += price;
        selectedIds.push(cartId);
      }
    });

    const remainingCredit = currentCredit - totalRequiredCredit;
    const canPurchase = selectedCount > 0 && remainingCredit >= 0;

    selectedCountEl.textContent = selectedCount;
    totalRequiredCreditEl.textContent = formatNumber(totalRequiredCredit);

    if (remainingCredit >= 0) {
      remainingCreditEl.textContent = formatNumber(remainingCredit);
      remainingCreditEl.className = 'font-black text-4xl text-blue-600';
    } else {
      remainingCreditEl.textContent = '-' + formatNumber(Math.abs(remainingCredit));
      remainingCreditEl.className = 'font-black text-4xl text-red-500';
    }

    if (selectedCount === 0) {
      creditWarningBox.classList.add('hidden');
      checkoutBtn.disabled = true;
      checkoutBtn.textContent = '선택된 강의 없음';
      checkoutBtn.className = 'mt-8 w-full h-16 rounded-2xl text-2xl font-black shadow-sm transition bg-slate-200 text-slate-500 cursor-not-allowed';
    } else if (!canPurchase) {
      creditWarningBox.classList.remove('hidden');
      checkoutBtn.disabled = true;
      checkoutBtn.textContent = '크레딧 부족';
      checkoutBtn.className = 'mt-8 w-full h-16 rounded-2xl text-2xl font-black shadow-sm transition bg-slate-200 text-slate-500 cursor-not-allowed';
    } else {
      creditWarningBox.classList.add('hidden');
      checkoutBtn.disabled = false;
      checkoutBtn.textContent = '선택 상품 결제하기';
      checkoutBtn.className = 'mt-8 w-full h-16 rounded-2xl text-2xl font-black shadow-sm transition bg-blue-600 text-white hover:bg-blue-700';
    }

    selectedCartItemInputs.innerHTML = '';
    selectedIds.forEach((cartId) => {
      const input = document.createElement('input');
      input.type = 'hidden';
      input.name = 'selectedCartItemIds';
      input.value = cartId;
      selectedCartItemInputs.appendChild(input);
    });
  }

  checkboxes.forEach((checkbox) => {
    checkbox.addEventListener('change', updateSummary);
  });

  checkoutForm.addEventListener('submit', function (e) {
    if (checkoutBtn.disabled) {
      e.preventDefault();
    }
  });

  initializeCheckboxSelection();
  updateSummary();
</script>

</body>
</html>
