<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Q&A Detail</title>
  <style>
    body { font-family: Arial; background:#f5f5f5; }
    .container { max-width:1000px; margin:40px auto; }
    .card { background:white; padding:20px; border-radius:12px; margin-bottom:20px; }
    .btn { padding:8px 12px; cursor:pointer; border-radius:6px; }
    .btn-blue { background:blue; color:white; }
    .btn-red { background:red; color:white; }
    textarea { width:100%; height:100px; }
  </style>
</head>
<body>

<div class="container">

  <button onclick="goBack()">← 목록으로</button>

  <div class="card">
    <h2 id="title"></h2>
    <p id="author"></p>
    <p id="date"></p>

    <div>
      <span id="status"></span>
      <button onclick="toggleStatus()">상태 변경</button>
    </div>

    <p id="content"></p>

    <button onclick="togglePrivacy()">공개/비공개</button>
    <button onclick="deletePost()" class="btn-red">삭제</button>
  </div>

  <div class="card">
    <h3>답변 (<span id="answerCount"></span>)</h3>
    <div id="answerList"></div>
  </div>

  <div class="card">
    <h3>답변 작성</h3>
    <textarea id="answerInput"></textarea>
    <button onclick="addAnswer()" class="btn-blue">등록</button>
  </div>

</div>

<script>
  const currentUser = "나";
  const postId = "1"; // 테스트용

  let post = null;
  let answers = [];

  // ===== 데이터 로드 =====
  function loadData() {
    const storedPosts = JSON.parse(localStorage.getItem("nae-il-qna-posts") || "[]");
    post = storedPosts.find(p => p.id === postId) || {
      id: "1",
      title: "샘플 질문입니다",
      content: "내용입니다",
      author: { name: "나" },
      date: "2026-04-15",
      isResolved: false,
      isPrivate: false
    };

    const storedAnswers = JSON.parse(localStorage.getItem(`qna-answers-${postId}`) || "[]");
    answers = storedAnswers;
  }

  // ===== 렌더 =====
  function render() {
    document.getElementById("title").innerText = post.title;
    document.getElementById("author").innerText = post.author.name;
    document.getElementById("date").innerText = post.date;
    document.getElementById("content").innerText = post.content;

    document.getElementById("status").innerText =
            post.isResolved ? "해결됨" : "미해결";

    document.getElementById("answerCount").innerText = answers.length;

    const list = document.getElementById("answerList");
    list.innerHTML = "";

    answers.forEach(a => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
      <p><b>${a.author.name}</b> (${a.date})</p>
      <p>${a.content}</p>
      <button onclick="deleteAnswer('${a.id}')">삭제</button>
    `;

      list.appendChild(div);
    });
  }

  // ===== 기능 =====

  function addAnswer() {
    const input = document.getElementById("answerInput");
    if (!input.value.trim()) return;

    const newAnswer = {
      id: "a-" + Date.now(),
      author: { name: currentUser },
      content: input.value,
      date: new Date().toISOString().split("T")[0]
    };

    answers.push(newAnswer);
    saveAnswers();
    input.value = "";
    render();
  }

  function deleteAnswer(id) {
    if (!confirm("삭제?")) return;

    answers = answers.filter(a => a.id !== id);
    saveAnswers();
    render();
  }

  function toggleStatus() {
    post.isResolved = !post.isResolved;
    savePost();
    render();
  }

  function togglePrivacy() {
    post.isPrivate = !post.isPrivate;
    savePost();
    render();
  }

  function deletePost() {
    if (!confirm("게시글 삭제?")) return;

    let posts = JSON.parse(localStorage.getItem("nae-il-qna-posts") || "[]");
    posts = posts.filter(p => p.id !== postId);
    localStorage.setItem("nae-il-qna-posts", JSON.stringify(posts));

    alert("삭제됨");
    location.href = "/";
  }

  function saveAnswers() {
    localStorage.setItem(`qna-answers-${postId}`, JSON.stringify(answers));
  }

  function savePost() {
    let posts = JSON.parse(localStorage.getItem("nae-il-qna-posts") || "[]");
    const index = posts.findIndex(p => p.id === postId);

    if (index !== -1) {
      posts[index] = post;
      localStorage.setItem("nae-il-qna-posts", JSON.stringify(posts));
    }
  }

  function goBack() {
    history.back();
  }

  // ===== 실행 =====
  loadData();
  render();
</script>

</body>
</html>
