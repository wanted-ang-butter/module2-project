<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>강의 상세</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

<div class="bg-gray-50 min-h-screen">

  <!-- Back Button -->
  <div class="bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-6 py-4">
      <a href="/courses" class="inline-flex items-center gap-2 text-gray-600 hover:text-blue-600">
        ←
        <span class="text-sm font-medium">전체 강의로 돌아가기</span>
      </a>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-12">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

      <!-- Main -->
      <div class="lg:col-span-2 space-y-8">

        <div class="bg-white border-2 border-gray-200 rounded-2xl p-8">

          <div class="flex gap-3 mb-4">
            <span class="px-3 py-1.5 text-sm font-bold rounded-lg bg-green-100 text-green-700">
              입문
            </span>
            <span class="px-3 py-1.5 text-sm font-bold rounded-lg text-gray-700">
              카테고리
            </span>
          </div>

          <h1 class="text-4xl font-black text-gray-900 mb-4">
            강의 제목
          </h1>

          <div class="flex items-center gap-4 mb-6">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center">
              <span class="text-white text-sm font-bold">&lt;&gt;</span>
            </div>

            <div>
              <p class="font-bold text-gray-900">강사명</p>
              <div class="flex items-center gap-3 text-sm mt-1">
                <span>⭐ 4.5</span>
                <span>👥 1,234</span>
              </div>
            </div>
          </div>

          <p class="text-lg text-gray-700">
            강의 설명이 들어가는 영역입니다.
          </p>

        </div>

      </div>

      <!-- Sidebar -->
      <div>
        <div class="bg-white border-2 rounded-2xl p-6 shadow-lg">

          <p class="text-sm">강의 가격</p>
          <p class="text-5xl font-black">49,000</p>
          <p>크레딧</p>

          <button class="w-full py-4 bg-blue-600 text-white rounded-xl mt-4">
            바로 결제
          </button>

          <button class="w-full py-4 bg-white text-blue-600 rounded-blue-600 mt-4">
            장바구니 담기
          </button>


        </div>
      </div>

    </div>
  </div>

</div>

</body>
</html>
