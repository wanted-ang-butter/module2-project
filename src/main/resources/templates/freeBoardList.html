<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>자유게시판</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">

<div class="max-w-7xl mx-auto px-6 py-12">

  <!-- Back Button -->
  <a href="#" class="inline-flex items-center gap-2 text-gray-600 hover:text-blue-600 mb-6 font-medium">
    ← <span class="text-sm">이전으로</span>
  </a>

  <div class="grid grid-cols-12 gap-8">

    <!-- Sidebar -->
    <div class="col-span-12 lg:col-span-3">
      <div class="bg-white border-2 border-gray-200 rounded-2xl p-6 sticky top-24">
        <h2 class="text-xl font-black mb-6">커뮤니티</h2>

        <nav class="space-y-2">
          <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 hover:bg-gray-50">
            💬 <span class="text-sm">Q&A</span>
          </a>

          <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-50 text-blue-600 font-bold">
            📄 <span class="text-sm">자유게시판</span>
          </a>
        </nav>
      </div>
    </div>

    <!-- Main -->
    <div class="col-span-12 lg:col-span-9">

      <!-- Header -->
      <div class="flex items-center justify-between mb-8">
        <h1 class="text-4xl font-black">자유게시판</h1>

        <a href="#" class="px-6 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700">
          + 글쓰기
        </a>
      </div>

      <!-- Post List -->
      <div class="space-y-4">

        <!-- Post 1 -->
        <a href="#" class="block bg-white border-2 border-gray-200 rounded-2xl p-6 hover:shadow-lg transition">
          <h3 class="text-xl font-bold mb-3">게시글 제목입니다</h3>

          <div class="flex items-center gap-4 text-sm text-gray-600">
            <span>작성자</span>
            <span>2026-04-01</span>
            <span>👁 123</span>
            <span>❤️ 10</span>
          </div>
        </a>

        <!-- Post 2 -->
        <a href="#" class="block bg-white border-2 border-gray-200 rounded-2xl p-6 hover:shadow-lg transition">
          <h3 class="text-xl font-bold mb-3">두번째 게시글</h3>

          <div class="flex items-center gap-4 text-sm text-gray-600">
            <span>홍길동</span>
            <span>2026-04-02</span>
            <span>👁 88</span>
            <span>❤️ 5</span>
          </div>
        </a>

        <!-- 끝 메시지 -->
        <div class="text-center py-8">
          <p class="text-gray-500">모든 게시글을 불러왔습니다</p>
        </div>

      </div>

    </div>

  </div>

</div>

</body>
</html>
