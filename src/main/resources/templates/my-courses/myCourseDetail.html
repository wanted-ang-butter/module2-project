<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nae-Il | 내 강의 상세</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>

<body class="min-h-screen bg-slate-50 text-slate-900">

<div th:replace="fragments/userHeader :: userHeader"></div>

<main class="max-w-[1400px] mx-auto px-8 py-10">

    <div class="mb-8">
        <a th:href="@{/my-courses}"
           class="flex items-center gap-2 text-slate-500 hover:text-slate-700 mb-4">
            ← 내 강의로 돌아가기
        </a>

        <h1 class="text-4xl font-black mb-2" th:text="${courseDetail.title}">강의 제목</h1>

        <p class="text-lg text-slate-600 font-semibold">
            강사: <span th:text="${courseDetail.instructorName}">강사명</span>
        </p>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-[1fr_360px] gap-10">

        <!-- 왼쪽 -->
        <div class="space-y-6">

            <div class="bg-white border rounded-2xl p-6">
                <div class="w-full aspect-video rounded-xl bg-slate-100 overflow-hidden mb-4">
                    <img th:if="${courseDetail.thumbnail != null and courseDetail.thumbnail != ''}"
                         th:src="@{/images/{file}(file=${courseDetail.thumbnail})}"
                         th:alt="${courseDetail.title}"
                         class="w-full h-full object-cover">

                    <div th:unless="${courseDetail.thumbnail != null and courseDetail.thumbnail != ''}"
                         class="w-full h-full flex items-center justify-center text-slate-400">
                        이미지 없음
                    </div>
                </div>

                <div class="space-y-3">
                    <div>
                        <p class="text-sm text-slate-500">진행률</p>
                        <p class="text-2xl font-black text-blue-600">
                            <span th:text="${courseDetail.coursesRate}">0</span>%
                        </p>
                    </div>

                    <div>
                        <p class="text-sm text-slate-500">학습 현황</p>
                        <p class="font-bold">
                            <span th:text="${courseDetail.completedCount}">0</span>
                            /
                            <span th:text="${courseDetail.totalCount}">0</span>
                            강의 완료
                        </p>
                    </div>

                    <div>
                        <p class="text-sm text-slate-500 mb-1">강의 설명</p>
                        <p class="text-slate-700" th:text="${courseDetail.description}">강의 설명</p>
                    </div>
                </div>
            </div>

            <div class="bg-white border rounded-2xl p-6">
                <h2 class="text-2xl font-black mb-4">강의 시청</h2>

                <div class="aspect-video rounded-xl bg-slate-900 flex items-center justify-center text-white">
                    Video Player Placeholder
                </div>
            </div>
        </div>

        <!-- 오른쪽 -->
        <aside class="sticky top-24">
            <div class="bg-white p-6 rounded-2xl border shadow-sm">
                <h2 class="text-2xl font-black mb-6">강의 목차</h2>

                <div th:if="${#lists.isEmpty(courseDetail.sessions)}"
                     class="bg-slate-50 p-6 rounded-xl text-center border text-slate-400">
                    등록된 목차가 없습니다.
                </div>

                <div th:unless="${#lists.isEmpty(courseDetail.sessions)}" class="space-y-4">
                    <div th:each="session : ${courseDetail.sessions}"
                         class="border rounded-xl p-4">
                        <p class="font-bold text-lg" th:text="${session.title}">세션 제목</p>
                        <p class="text-slate-500 text-sm" th:text="${session.playTime}">0</p>
                    </div>
                </div>
            </div>
        </aside>

    </div>
</main>

</body>
</html>
