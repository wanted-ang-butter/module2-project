<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 찾기 | Nae-Il</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        .grid-bg {
            background-image: linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-green-50 flex items-center justify-center p-6">

<div class="absolute inset-0 grid-bg opacity-30"></div>

<div class="relative w-full max-w-md">

    <!-- Logo -->
    <a th:href="@{/}" href="/" class="flex items-center justify-center gap-3 mb-8">
        <div class="w-12 h-12 bg-gradient-to-br from-blue-600 to-green-600 rounded-xl flex items-center justify-center shadow-lg">
            <i class="fa-solid fa-terminal text-white"></i>
        </div>
        <div>
            <h1 class="text-2xl font-black text-gray-900 tracking-tight">
                내일 <span class="text-gray-500 font-bold">Nae-il</span>
            </h1>
            <p class="text-[10px] font-bold text-gray-500 tracking-wide">내일의 일, My Work</p>
        </div>
    </a>

    <div class="bg-white border-2 border-gray-200 rounded-2xl p-8 shadow-xl">
        <h2 class="text-3xl font-black text-gray-900 mb-2">비밀번호 찾기</h2>
        <p class="text-gray-600 mb-8 font-medium">아이디와 전화번호를 입력하세요</p>

        <!-- 결과 표시 -->
        <div th:if="${result}" class="space-y-6">
            <div class="bg-green-50 border-2 border-green-200 rounded-xl p-6 text-center">
                <i class="fa-solid fa-key text-green-600 text-5xl mb-4 block"></i>
                <p class="text-sm font-bold text-gray-700 mb-2">임시 비밀번호가 발급되었습니다</p>
                <div class="bg-white border-2 border-gray-200 rounded-lg p-4 my-4">
                    <p class="text-2xl font-black text-gray-900 font-mono tracking-wider"
                       th:text="${result.tempPassword}">임시비밀번호</p>
                </div>
                <p class="text-xs text-red-600 font-bold mb-2">⚠️ 임시 비밀번호를 복사해주세요</p>
                <p class="text-xs text-gray-600 font-medium">로그인 후 반드시 비밀번호를 변경해주세요</p>
            </div>
            <a th:href="@{/auth/login}" href="/auth/login"
               class="block w-full py-4 bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-xl font-black text-lg hover:shadow-xl hover:shadow-blue-200 transition-all text-center">
                로그인하러 가기
            </a>
            <a th:href="@{/auth/find-password}" href="/auth/find-password"
               class="block w-full py-3 text-sm text-gray-600 hover:text-blue-600 font-medium transition-colors text-center">
                다시 찾기
            </a>
        </div>

        <!-- 입력 폼 -->
        <div th:unless="${result}">

            <!-- 에러 메시지 -->
            <div th:if="${errorMessage}" class="mb-6 p-4 bg-red-50 border-2 border-red-200 rounded-xl">
                <p class="text-sm font-bold text-red-600" th:text="${errorMessage}">오류 메시지</p>
            </div>

            <form th:action="@{/auth/find-password}" method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">아이디</label>
                    <div class="relative">
                        <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" name="username" placeholder="아이디를 입력하세요"
                               class="w-full pl-12 pr-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-600 focus:outline-none transition-colors font-medium"
                               required/>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">전화번호</label>
                    <div class="relative">
                        <i class="fa-solid fa-phone absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="tel" name="phone" placeholder="010-1234-5678"
                               class="w-full pl-12 pr-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-600 focus:outline-none transition-colors font-medium"
                               required/>
                    </div>
                </div>

                <button type="submit"
                        class="w-full py-4 bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-xl font-black text-lg hover:shadow-xl hover:shadow-blue-200 transition-all">
                    임시 비밀번호 발급
                </button>

                <div class="text-center">
                    <a th:href="@{/auth/login}" href="/auth/login"
                       class="text-sm text-gray-600 hover:text-blue-600 font-medium transition-colors">
                        로그인으로 돌아가기
                    </a>
                </div>
            </form>
        </div>

    </div>
</div>

</body>
</html>
