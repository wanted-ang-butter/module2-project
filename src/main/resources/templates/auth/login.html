<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nae-Il | 로그인</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        .grid-bg {
            background-image: linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-green-50 flex items-center justify-center p-6">

<div class="absolute inset-0 grid-bg opacity-30"></div>

<div class="relative w-full max-w-md">

    <!-- Logo -->
    <a th:href="@{/}" href="/" class="flex items-center justify-center gap-3 mb-8">
        <div class="w-12 h-12 bg-gradient-to-br from-blue-600 to-green-600 rounded-xl flex items-center justify-center shadow-lg">
            <i class="fa-solid fa-terminal text-white"></i>
        </div>
        <div>
            <h1 class="text-2xl font-black text-gray-900 tracking-tight">
                내일 <span class="text-gray-500 font-bold">Nae-il</span>
            </h1>
            <p class="text-[10px] font-bold text-gray-500 tracking-wide">Developer Learning Platform</p>
        </div>
    </a>

    <!-- 에러 메시지 -->
    <div th:if="${param.error}" class="mb-4 p-4 bg-red-50 border-2 border-red-200 rounded-xl">
        <p class="text-sm font-bold text-red-600">아이디 또는 비밀번호가 올바르지 않습니다.</p>
    </div>

    <!-- 비밀번호 변경 성공 메시지 -->
    <div th:if="${message}" class="mb-4 p-4 bg-green-50 border-2 border-green-200 rounded-xl">
        <p class="text-sm font-bold text-green-600" th:text="${message}"></p>
    </div>

    <!-- Login Form -->
    <div class="bg-white border-2 border-gray-200 rounded-2xl p-8 shadow-xl mb-6">
        <h2 class="text-3xl font-black text-gray-900 mb-2">로그인</h2>
        <p class="text-gray-600 mb-8 font-medium">계정에 로그인하여 학습을 시작하세요</p>

        <form th:action="@{/auth/login}" method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">아이디</label>
                <div class="relative">
                    <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" name="user" placeholder="아이디를 입력하세요"
                           autofocus
                           autocomplete="username"
                           class="w-full pl-12 pr-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-600 focus:outline-none transition-colors font-medium"/>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">비밀번호</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="password" name="pass" placeholder="••••••••"
                           autocomplete="current-password"
                           class="w-full pl-12 pr-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-600 focus:outline-none transition-colors font-medium"/>
                </div>
            </div>

            <div class="flex items-center gap-2">
                <input type="checkbox" id="rememberIdCheck" class="w-4 h-4"/>
                <label for="rememberIdCheck" class="text-sm font-medium text-gray-600">이 컴퓨터에서 ID 기억하기</label>
            </div>

            <button type="submit"
                    class="w-full py-4 bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-xl font-black text-lg hover:shadow-xl hover:shadow-blue-200 transition-all">
                로그인
            </button>
        </form>

        <div class="mt-6 text-center space-y-3">
            <p class="text-sm text-gray-600">
                아직 계정이 없으신가요?
                <a th:href="@{/auth/signup}" href="/auth/signup" class="text-blue-600 hover:text-blue-700 font-bold">회원가입</a>
            </p>
            <div class="flex items-center justify-center gap-4 text-sm">
                <a th:href="@{/auth/find-id}" href="/auth/find-id"
                   class="text-gray-600 hover:text-blue-600 font-medium transition-colors">아이디 찾기</a>
                <span class="text-gray-300">|</span>
                <a th:href="@{/auth/find-password}" href="/auth/find-password"
                   class="text-gray-600 hover:text-blue-600 font-medium transition-colors">비밀번호 찾기</a>
            </div>
        </div>
    </div>
</div>
<script>
    // 아이디 기억하기
    const usernameInput = document.querySelector('input[name="user"]');
    const rememberIdCheck = document.getElementById('rememberIdCheck');
    const savedId = localStorage.getItem('savedUsername');

    // 저장된 아이디 있으면 불러오기
    if (savedId) {
        usernameInput.value = savedId;
        rememberIdCheck.checked = true;
    }

    // 폼 제출 시 처리
    document.querySelector('form').addEventListener('submit', function() {
        if (rememberIdCheck.checked) {
            localStorage.setItem('savedUsername', usernameInput.value);
        } else {
            localStorage.removeItem('savedUsername');
        }
    });
</script>
</body>
</html>
