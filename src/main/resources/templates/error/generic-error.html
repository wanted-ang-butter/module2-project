<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오류 발생 | 내일 Nae-il</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

<div class="max-w-xl w-full mx-auto px-6 py-12 text-center">

    <div class="flex items-center justify-center gap-2 mb-12">
        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-blue-200">N</div>
        <span class="text-2xl font-black text-gray-900 tracking-tight">내일 <span class="text-gray-400 font-medium text-lg">Nae-il</span></span>
    </div>

    <div class="mb-8 flex justify-center">
        <div class="p-5 bg-red-50 rounded-full">
            <i data-lucide="alert-circle" class="w-16 h-16 text-red-500"></i>
        </div>
    </div>

    <h1 class="text-7xl font-black text-gray-900 mb-4"
        th:text="${status != null ? status : '500'}">500</h1>

    <div class="space-y-2 mb-10">
        <p class="text-2xl font-black text-gray-800" th:text="${errorMessage}">요청을 처리하는 중 문제가 발생했습니다.</p>
        <p class="text-gray-500 font-medium">관리자에게 문의하거나 잠시 후 다시 시도해 주세요.</p>
    </div>

    <a th:href="@{/dashboard}"
       class="inline-flex items-center gap-2 px-8 py-4 bg-gray-900 text-white rounded-2xl font-bold hover:bg-blue-600 hover:shadow-xl transition-all duration-300 group">
        <i data-lucide="home" class="w-5 h-5 group-hover:-translate-y-0.5 transition-transform"></i>
        <span>홈으로 돌아가기</span>
    </a>

    <p class="mt-16 text-sm font-medium text-gray-400">© 2026 Nae-il. All rights reserved.</p>
</div>

<script>
    // 아이콘 렌더링
    lucide.createIcons();
</script>
</body>
</html>
