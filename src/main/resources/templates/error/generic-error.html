
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오류 발생 | 내일 Nae-il</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f0f4ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── 배경 레이어 ── */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                    radial-gradient(ellipse 80% 60% at 10% 0%, rgba(99,102,241,.15) 0%, transparent 70%),
                    radial-gradient(ellipse 60% 80% at 90% 100%, rgba(59,130,246,.12) 0%, transparent 65%),
                    radial-gradient(ellipse 50% 50% at 50% 50%, rgba(248,250,255,1) 0%, #e8eeff 100%);
        }

        /* 배경 도형 */
        .bg-shape {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.25;
            z-index: 0;
            animation: float 8s ease-in-out infinite;
        }
        .bg-shape-1 {
            width: 500px; height: 500px;
            background: #6366f1;
            top: -180px; left: -120px;
            animation-delay: 0s;
        }
        .bg-shape-2 {
            width: 400px; height: 400px;
            background: #3b82f6;
            bottom: -150px; right: -100px;
            animation-delay: -3s;
        }
        .bg-shape-3 {
            width: 250px; height: 250px;
            background: #a5b4fc;
            top: 40%; right: 15%;
            animation-delay: -5s;
        }

        /* 도트 패턴 */
        .dot-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: radial-gradient(circle, rgba(99,102,241,.18) 1px, transparent 1px);
            background-size: 32px 32px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50%       { transform: translateY(-20px) scale(1.04); }
        }

        /* ── 카드 ── */
        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            padding: 60px 56px 52px;
            background: rgba(255,255,255,0.72);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.9);
            border-radius: 28px;
            box-shadow:
                    0 4px 6px rgba(0,0,0,.04),
                    0 20px 60px rgba(99,102,241,.12),
                    0 1px 0 rgba(255,255,255,1) inset;
            text-align: center;
            animation: cardIn .6s cubic-bezier(.22,1,.36,1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(28px) scale(.97); }
            to   { opacity: 1; transform: translateY(0)     scale(1);   }
        }

        /* ── 로고 + 뱃지 그룹 ── */
        .logo-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
            animation: cardIn .6s .08s cubic-bezier(.22,1,.36,1) both;
        }

        /* ── 로고 ── */
        .logo-wrap {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #6366f1, #3b82f6);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            font-weight: 800; font-size: 17px;
            box-shadow: 0 4px 12px rgba(99,102,241,.35);
            flex-shrink: 0;
        }
        .logo-text {
            font-size: 17px;
            font-weight: 800;
            color: #1e293b;
            letter-spacing: -.3px;
        }
        .logo-text span {
            font-weight: 400;
            color: #94a3b8;
            font-size: 14px;
            margin-left: 2px;
        }

        /* ── 에러 뱃지 ── */
        .error-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            background: rgba(239,68,68,.08);
            border: 1px solid rgba(239,68,68,.18);
            border-radius: 999px;
        }
        .error-badge svg {
            color: #ef4444;
            flex-shrink: 0;
        }
        .error-badge-text {
            font-size: 12px;
            font-weight: 700;
            color: #ef4444;
            letter-spacing: .5px;
            text-transform: uppercase;
        }

        /* ── 상태 코드 ── */
        .status-code {
            font-size: 96px;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -4px;
            background: linear-gradient(135deg, #1e293b 0%, #475569 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            animation: cardIn .5s .2s cubic-bezier(.22,1,.36,1) both;
        }

        /* ── 메시지 ── */
        .error-title {
            font-size: 19px;
            font-weight: 700;
            color: #1e293b;
            line-height: 1.5;
            margin-bottom: 8px;
            word-break: keep-all;
            animation: cardIn .5s .25s cubic-bezier(.22,1,.36,1) both;
        }
        .error-sub {
            font-size: 15px;
            color: #94a3b8;
            font-weight: 500;
            line-height: 1.6;
            margin-bottom: 32px;
            word-break: keep-all;
            animation: cardIn .5s .3s cubic-bezier(.22,1,.36,1) both;
        }

        /* ── 구분선 ── */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(99,102,241,.15), transparent);
            margin-bottom: 28px;
        }

        /* ── 버튼 ── */
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 13px 28px;
            background: linear-gradient(135deg, #1e293b, #334155);
            color: #fff;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            border: none;
            cursor: pointer;
            box-shadow:
                    0 2px 8px rgba(0,0,0,.15),
                    0 0 0 1px rgba(255,255,255,.05) inset;
            transition: all .25s cubic-bezier(.22,1,.36,1);
            animation: cardIn .5s .35s cubic-bezier(.22,1,.36,1) both;
        }
        .btn-home:hover {
            background: linear-gradient(135deg, #6366f1, #3b82f6);
            box-shadow: 0 8px 24px rgba(99,102,241,.35);
            transform: translateY(-2px);
        }
        .btn-home svg {
            transition: transform .25s;
        }
        .btn-home:hover svg {
            transform: translateY(-1px);
        }

        /* ── 푸터 ── */
        .footer-text {
            margin-top: 28px;
            font-size: 12px;
            color: #cbd5e1;
            font-weight: 500;
            animation: cardIn .5s .4s cubic-bezier(.22,1,.36,1) both;
        }
    </style>
</head>
<body>

<!-- 배경 -->
<div class="bg-layer"></div>
<div class="bg-shape bg-shape-1"></div>
<div class="bg-shape bg-shape-2"></div>
<div class="bg-shape bg-shape-3"></div>
<div class="dot-grid"></div>

<!-- 카드 -->
<div class="card" style="margin: 24px;">

    <!-- 로고 + 뱃지 그룹 -->
    <div class="logo-group">
        <div class="logo-wrap">
            <div class="logo-icon">N</div>
            <p class="logo-text">내일 <span>Nae-il</span></p>
        </div>
        <div class="error-badge">
            <i data-lucide="alert-circle" style="width:13px;height:13px;"></i>
            <span class="error-badge-text">System Error</span>
        </div>
    </div>

    <!-- 상태 코드 -->
    <div class="status-code" th:text="${status != null ? status : '500'}">500</div>

    <!-- 메시지 -->
    <p class="error-title" th:text="${errorMessage != null ? errorMessage : '시스템 오류가 발생했습니다.'}">
        시스템 오류가 발생했습니다.
    </p>
    <p class="error-sub">관리자에게 문의하거나 잠시 후 다시 시도해 주세요.</p>

    <div class="divider"></div>

    <!-- 버튼 -->
    <a th:href="@{/dashboard}" href="/dashboard" class="btn-home">
        <i data-lucide="home" style="width:16px;height:16px;"></i>
        <span>홈으로 돌아가기</span>
    </a>

    <!-- 푸터 -->
    <p class="footer-text">© 2026 Nae-il. All rights reserved.</p>
</div>

<script>
    lucide.createIcons();
</script>
</body>
</html>
