<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>강의 관리 상세 | Nae-Il</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>body { background-color: #f8fafc; }</style>
</head>
<body>

<div th:replace="~{fragments/instructorHeader :: instructorHeader}"></div>

<div class="max-w-4xl mx-auto px-6 py-10">

    <!-- 브레드크럼 -->
    <a th:href="@{/instructor/course-management}"
       class="inline-flex items-center gap-2 text-gray-500 hover:text-blue-600 text-sm font-semibold mb-3">
        <i class="fa-solid fa-chevron-left text-xs"></i> 내 강의 관리로
    </a>
    <div class="flex items-center gap-2 mb-2">
        <span class="px-3 py-1 bg-green-50 text-green-600 border border-green-200 rounded-full text-xs font-bold">
            ✓ 내가 등록한 강의
        </span>
    </div>
    <h1 class="text-3xl font-black text-gray-900 mb-8">강의 관리 상세</h1>

    <!-- 강의 기본 정보 카드 -->
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6 mb-6">
        <div class="flex gap-6">
            <img th:src="${course.thumbnail}"
                 th:alt="${course.title}"
                 class="w-52 h-32 object-cover rounded-xl border border-gray-100 flex-shrink-0"/>
            <div class="flex-1">
                <div class="flex items-center gap-2 mb-3">
                    <span class="px-3 py-1 bg-blue-50 text-blue-700 border border-blue-200 rounded-full text-xs font-bold"
                          th:text="${course.category}">카테고리</span>
                </div>
                <h2 class="text-2xl font-black text-gray-900 mb-2" th:text="${course.title}">강의 제목</h2>
                <p class="text-sm text-gray-500 leading-relaxed mb-4" th:text="${course.description}">설명</p>

                <!-- 통계 박스 3개 -->
                <div class="grid grid-cols-3 gap-3">
                    <div class="border border-gray-200 rounded-xl p-3 text-center">
                        <p class="text-xs text-gray-400 mb-1">가격</p>
                        <p class="font-black text-gray-900"
                           th:text="${course.price == 0 ? '무료' : #numbers.formatInteger(course.price, 1, 'COMMA') + ' 크레딧'}">0원</p>
                    </div>
                    <div class="border border-gray-200 rounded-xl p-3 text-center">
                        <p class="text-xs text-gray-400 mb-1">강의 수</p>
                        <p class="font-black text-gray-900"><span th:text="${course.sectionCount}">0</span>개</p>
                    </div>
                    <div class="border border-gray-200 rounded-xl p-3 text-center">
                        <p class="text-xs text-gray-400 mb-1">수강생</p>
                        <p class="font-black text-blue-600"><span th:text="${course.studentCount}">0</span>명</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 탭 -->
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
        <div class="grid grid-cols-2">
            <button onclick="switchTab('lecture')" id="tab-lecture"
                    class="py-4 text-sm font-bold transition-colors bg-blue-600 text-white">
                강의 조회
            </button>
            <button onclick="switchTab('student')" id="tab-student"
                    class="py-4 text-sm font-bold transition-colors bg-white text-gray-500 border-l border-gray-200">
                수강생 조회
            </button>
        </div>

        <!-- 강의 조회 탭 내용 -->
        <div id="content-lecture" class="p-6">
            <h3 class="flex items-center gap-2 text-lg font-black text-gray-900 mb-4">
                <i class="fa-regular fa-rectangle-list text-blue-500"></i> 주차별 수업 구성
            </h3>

            <div th:if="${course.sections == null or #lists.isEmpty(course.sections)}"
                 class="text-center text-gray-400 py-10">등록된 강의가 없습니다.</div>

            <div th:if="${course.sections != null and not #lists.isEmpty(course.sections)}" class="space-y-3 mb-8">
                <div th:each="section, stat : ${course.sections}"
                     class="flex items-center gap-4 p-4 rounded-xl border border-gray-100 hover:bg-gray-50 transition">
                    <span class="flex-shrink-0 w-12 h-12 flex items-center justify-center bg-blue-50 text-blue-600 rounded-xl text-sm font-black border border-blue-100">
                        <span th:text="${stat.index + 1} + '주'">1주</span>
                    </span>
                    <div class="flex-1">
                        <p class="font-semibold text-gray-900" th:text="${section.title}">섹션 제목</p>
                        <p class="text-xs text-gray-400 mt-0.5">
                            <i class="fa-regular fa-clock mr-1"></i><span th:text="${section.playTime}">00:00</span>
                            <span th:if="${section.free}" class="ml-2 px-2 py-0.5 bg-green-50 text-green-600 text-xs font-bold rounded-full border border-green-200">무료</span>
                        </p>
                    </div>
                </div>
            </div>

            <!-- 업로드된 동영상 -->
            <div th:if="${course.sections != null and not #lists.isEmpty(course.sections)}">
                <h3 class="flex items-center gap-2 text-lg font-black text-gray-900 mb-4">
                    <i class="fa-regular fa-file-video text-blue-500"></i> 업로드된 동영상
                </h3>
                <div class="space-y-2">
                    <div th:each="section : ${course.sections}" th:if="${section.videoUrl != null}">
                        <a th:href="${section.videoUrl}" target="_blank"
                           class="flex items-center gap-3 px-4 py-3 bg-gray-50 hover:bg-blue-50 border border-gray-200 rounded-xl text-sm text-gray-700 hover:text-blue-600 transition">
                            <i class="fa-regular fa-file-video text-blue-400"></i>
                            <span th:text="${section.videoUrl}">파일명</span>
                        </a>
                    </div>
                    <div th:if="${#lists.isEmpty(course.sections.?[videoUrl != null])}"
                         class="text-sm text-gray-400 py-4 text-center">업로드된 동영상이 없습니다.</div>
                </div>
            </div>
        </div>

        <!-- 수강생 조회 탭 내용 -->
        <div id="content-student" class="p-6 hidden">
            <div class="flex items-center justify-between mb-6">
                <h3 class="flex items-center gap-2 text-lg font-black text-gray-900">
                    <i class="fa-regular fa-user text-blue-500"></i> 수강생 목록
                </h3>
                <span class="px-3 py-1 border border-gray-200 rounded-full text-sm text-gray-600 font-semibold">
                    총 <span th:text="${students != null ? #lists.size(students) : 0}">0</span>명
                </span>
            </div>

            <div th:if="${students == null or #lists.isEmpty(students)}"
                 class="text-center text-gray-400 py-16">
                <i class="fa-regular fa-user text-4xl mb-3 block"></i>
                아직 수강 중인 학생이 없습니다.
            </div>

            <div th:if="${students != null and not #lists.isEmpty(students)}" class="space-y-4">
                <div th:each="student : ${students}"
                     class="flex items-center justify-between gap-6 p-5 border border-gray-100 rounded-2xl hover:bg-gray-50 transition">

                    <div class="flex items-center gap-4 min-w-0">
                        <img th:if="${student.profileImg != null and !#strings.isEmpty(student.profileImg)}"
                             th:src="${student.profileImg}"
                             alt="student profile"
                             class="w-14 h-14 rounded-full object-cover border border-gray-200"/>

                        <div th:if="${student.profileImg == null or #strings.isEmpty(student.profileImg)}"
                             class="w-14 h-14 rounded-full bg-gray-100 border border-gray-200 flex items-center justify-center text-gray-400">
                            <i class="fa-regular fa-user"></i>
                        </div>

                        <div class="min-w-0">
                            <p class="text-base font-black text-gray-900" th:text="${student.name}">홍길동</p>
                            <p class="text-sm text-gray-500" th:text="${student.nickname}">닉네임</p>
                            <p class="text-sm text-gray-500 truncate" th:text="${student.email}">email@example.com</p>
                            <p class="text-xs text-gray-400"
                               th:text="${student.phone != null ? student.phone : '-'}">010-0000-0000</p>
                        </div>
                    </div>

                    <div class="w-64 flex-shrink-0">
                        <div class="flex items-center justify-between mb-2">
                            <span class="px-2 py-1 text-xs font-bold rounded-full bg-blue-50 text-blue-600 border border-blue-200"
                                  th:text="${student.enrollmentStatusLabel}">수강 중</span>
                            <span class="text-sm font-bold text-gray-700"
                                  th:text="${student.progressRateLabel}">0%</span>
                        </div>

                        <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
                            <div class="h-full bg-blue-500 rounded-full"
                                 th:style="'width:' + ${student.progressRate} + '%'"></div>
                        </div>

                        <p class="mt-2 text-xs text-gray-400">
                            수강 시작일
                            <span th:text="${student.enrolledDateLabel}">2026-04-21</span>
                        </p>
                    </div>

                </div>
            </div>
        </div>
    </div>

</div>

<script th:inline="javascript">
    function switchTab(tab) {
        const tabs = ['lecture', 'student'];
        tabs.forEach(t => {
            document.getElementById('tab-' + t).className =
                t === tab
                    ? 'py-4 text-sm font-bold transition-colors bg-blue-600 text-white'
                    : 'py-4 text-sm font-bold transition-colors bg-white text-gray-500 border-l border-gray-200';
            const content = document.getElementById('content-' + t);
            content.classList.toggle('hidden', t !== tab);
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        const initialTab = /*[[${activeTab}]]*/ 'lecture';
        if (initialTab === 'student') {
            switchTab('student');
        }
    });
</script>
</body>
</html>
