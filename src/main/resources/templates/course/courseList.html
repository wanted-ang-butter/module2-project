<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내일 Nae-il | 전체 강의</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>

<header class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
        <div class="flex items-center gap-8">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">N</div>
                <span class="text-xl font-black text-gray-900">내일 <span class="text-gray-400 font-medium text-sm">Nae-il</span></span>
            </div>
            <nav class="hidden md:flex items-center gap-6 text-sm font-bold text-gray-600">
                <a href="#" class="text-blue-600 border-b-2 border-blue-600 pb-1">전체 강의</a>
                <a href="#" class="hover:text-gray-900">실시간 강의</a>
                <a href="#" class="hover:text-gray-900">내 강의</a>
                <a href="#" class="hover:text-gray-900">커뮤니티</a>
            </nav>
        </div>
        <div class="flex items-center gap-4">
            <button class="p-2 text-gray-400 hover:text-gray-600"><i data-lucide="search"></i></button>
            <div class="flex items-center gap-3 pl-4 border-l border-gray-200">
                <span class="text-sm font-bold text-gray-700">개발자님</span>
                <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold text-xs">JS</div>
            </div>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-6 py-12">
    <a href="#" class="inline-flex items-center gap-2 text-gray-500 hover:text-blue-600 transition-colors mb-6 group">
        <i data-lucide="chevron-left" class="w-4 h-4"></i>
        <span class="text-sm font-bold">이전으로</span>
    </a>

    <div class="mb-10">
        <h1 class="text-4xl font-black text-gray-900 mb-2">전체 강의</h1>
        <p class="text-gray-500 font-medium">// 원하는 분야의 강의를 선택하세요</p>
    </div>

    <div class="relative mb-8">
        <input type="text" placeholder="강의명, 강사명으로 검색하세요"
               class="w-full bg-white border-2 border-gray-100 rounded-2xl px-12 py-4 focus:border-blue-500 focus:outline-none transition-all shadow-sm">
        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5"></i>
    </div>

    <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-3 overflow-x-auto no-scrollbar">
            <button class="px-5 py-2.5 rounded-full bg-gray-900 text-white font-bold text-sm shadow-lg">전체</button>
            <button class="px-5 py-2.5 rounded-full bg-white border-2 border-gray-100 text-gray-600 font-bold text-sm hover:border-blue-200 transition-all">Frontend</button>
            <button class="px-5 py-2.5 rounded-full bg-white border-2 border-gray-100 text-gray-600 font-bold text-sm hover:border-blue-200 transition-all">Backend</button>
            <button class="px-5 py-2.5 rounded-full bg-white border-2 border-gray-100 text-gray-600 font-bold text-sm hover:border-blue-200 transition-all">Programming</button>
            <button class="px-5 py-2.5 rounded-full bg-white border-2 border-gray-100 text-gray-600 font-bold text-sm hover:border-blue-200 transition-all">Design</button>
        </div>
        <select class="bg-white border-2 border-gray-100 rounded-xl px-4 py-2 text-sm font-bold text-gray-700 outline-none">
            <option>최신순</option>
            <option>인기순</option>
        </select>
    </div>

    <p class="text-sm font-bold text-gray-500 mb-6"><span class="text-blue-600 text-lg">18</span>개의 강의</p>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

        <div class="group bg-white border-2 border-gray-100 rounded-2xl overflow-hidden hover:shadow-2xl hover:border-blue-200 transition-all duration-300">
            <div class="aspect-video relative overflow-hidden">
                <img src="https://images.unsplash.com/photo-1544383835-bda2bc66a55d?q=80&w=800" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                <div class="absolute top-4 left-4">
                    <span class="bg-blue-50 text-blue-600 text-[10px] font-black px-2 py-1 rounded-md uppercase tracking-wider border border-blue-100">백엔드</span>
                </div>
            </div>
            <div class="p-6">
                <h3 class="text-xl font-black text-gray-900 mb-2 line-clamp-1">PostgreSQL 데이터베이스 설계</h3>
                <p class="text-gray-500 text-sm font-medium mb-4 line-clamp-2">관계형 데이터베이스 설계와 쿼리 최적화의 모든 것</p>
                <p class="text-sm font-bold text-gray-700 mb-4">이디비 강사</p>
                <div class="flex items-center justify-between pt-4 border-t border-gray-50">
                    <div class="flex items-center gap-3">
                        <div class="flex items-center gap-1">
                            <i data-lucide="star" class="w-4 h-4 text-yellow-400 fill-yellow-400"></i>
                            <span class="text-sm font-black">4.5</span>
                        </div>
                        <div class="flex items-center gap-1 text-gray-400">
                            <i data-lucide="users" class="w-4 h-4"></i>
                            <span class="text-sm font-bold">876</span>
                        </div>
                    </div>
                    <span class="text-lg font-black text-gray-900">₩47,000</span>
                </div>
            </div>
        </div>

        <div class="group bg-white border-2 border-gray-100 rounded-2xl overflow-hidden hover:shadow-2xl hover:border-blue-200 transition-all duration-300">
            <div class="aspect-video relative overflow-hidden">
                <img src="https://images.unsplash.com/photo-1618477388954-7852f32655ec?q=80&w=800" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                <div class="absolute top-4 left-4">
                    <span class="bg-blue-50 text-blue-600 text-[10px] font-black px-2 py-1 rounded-md uppercase tracking-wider border border-blue-100">프론트엔드</span>
                </div>
            </div>
            <div class="p-6">
                <h3 class="text-xl font-black text-gray-900 mb-2 line-clamp-1">Next.js 풀스택 개발</h3>
                <p class="text-gray-500 text-sm font-medium mb-4 line-clamp-2">Next.js로 서버사이드 렌더링과 API 라우트 완벽 구현</p>
                <p class="text-sm font-bold text-gray-700 mb-4">박넥스트 강사</p>
                <div class="flex items-center justify-between pt-4 border-t border-gray-50">
                    <div class="flex items-center gap-3">
                        <div class="flex items-center gap-1">
                            <i data-lucide="star" class="w-4 h-4 text-yellow-400 fill-yellow-400"></i>
                            <span class="text-sm font-black">4.8</span>
                        </div>
                        <div class="flex items-center gap-1 text-gray-400">
                            <i data-lucide="users" class="w-4 h-4"></i>
                            <span class="text-sm font-bold">1,234</span>
                        </div>
                    </div>
                    <span class="text-lg font-black text-gray-900">₩54,000</span>
                </div>
            </div>
        </div>

    </div>
</main>

<script>
    // 아이콘 렌더링
    lucide.createIcons();
</script>
</body>
</html>
