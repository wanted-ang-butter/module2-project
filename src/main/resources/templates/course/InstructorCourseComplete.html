<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>등록 신청 완료</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 h-screen flex items-center justify-center">
<div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-10 text-center">
    <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
        <i data-lucide="check-circle" class="w-10 h-10 text-green-600"></i>
    </div>

    <h1 class="text-3xl font-black text-gray-900 mb-4">등록 신청 완료</h1>
    <p class="text-gray-600 font-medium mb-8 leading-relaxed">
        강의 등록 신청이 성공적으로 접수되었습니다.<br>
        관리자 승인 후 목록에 공개됩니다.
    </p>

    <div class="space-y-3">
        <a href="/instructor/course-management" class="block w-full py-4 bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-xl font-bold hover:shadow-lg transition-all">
            내 강의 관리로 이동
        </a>
        <a th:href="@{/dashboard/instructor}"
           href="/dashboard/instructor"
           class="block w-full py-4 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition-all">            대시보드 홈으로
        </a>
    </div>
</div>

<script>
    lucide.createIcons();
</script>
</body>
</html>
