<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${course.title} + ' | Nae-Il'">강의 상세 | Nae-Il</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .line-clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<div class="bg-white border-b border-gray-200">
  <div class="max-w-7xl mx-auto px-6 py-4">
    <a th:href="@{/courses}" class="inline-flex items-center gap-2 text-gray-600 hover:text-blue-600 transition-colors">
      <i class="fa-solid fa-chevron-left text-xs"></i>
      <span class="text-sm font-medium">전체 강의로 돌아가기</span>
    </a>
  </div>
</div>

<div class="max-w-7xl mx-auto px-6 py-12">
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

    <div class="lg:col-span-2 space-y-8">

      <div class="bg-white border-2 border-gray-200 rounded-2xl p-8">
        <div class="flex gap-3 mb-4">
          <span class="px-3 py-1.5 text-sm font-bold rounded-lg border-2 border-gray-300 text-gray-700"
                th:text="${course.category}">카테고리</span>
        </div>

        <h1 class="text-4xl font-black text-gray-900 mb-4 leading-tight" th:text="${course.title}">강의 제목</h1>

        <div class="flex items-center gap-4 mb-6">
          <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-green-600 rounded-xl flex items-center justify-center shadow-md">
            <span class="text-white text-sm font-mono font-bold">&lt;&gt;</span>
          </div>
          <div class="flex-1">
            <p class="font-bold text-gray-900" th:text="${course.instructorName}">강사명</p>
            <div class="flex items-center gap-3 text-sm mt-1">
              <span class="text-yellow-400">★</span>
              <span class="font-bold text-gray-900" th:text="${course.rating}">4.5</span>
              <span class="text-gray-400">👥</span>
              <span class="text-gray-600" th:text="${#numbers.formatInteger(course.studentCount, 0, 'COMMA')}">1,234</span>
            </div>
          </div>
        </div>

        <div class="flex items-center justify-between gap-6">
          <p class="text-lg text-gray-700 leading-relaxed flex-1 whitespace-pre-wrap" th:text="${course.description}">강의 설명</p>
          <div class="flex items-center gap-3 flex-shrink-0">
            <span class="text-base font-bold text-gray-600" th:text="${#numbers.formatInteger(course.likeCount, 0, 'COMMA')}">0</span>
            <form th:action="@{/course/{id}/like(id=${course.courseId})}" method="post">
              <button type="submit" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-50 transition-all group">
                <i class="fa-regular fa-heart text-gray-400 group-hover:text-red-400 text-lg"></i>
              </button>
            </form>
          </div>
        </div>
      </div>

      <div class="rounded-2xl overflow-hidden border-2 border-gray-200">
        <img th:src="${course.thumbnail}" th:alt="${course.title}" src="#" alt="썸네일"
             class="w-full aspect-video object-cover"/>
      </div>

      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="bg-white border-2 border-gray-200 rounded-2xl p-5 text-center hover:border-blue-300 transition-all">
          <i class="fa-solid fa-book-open text-blue-600 text-2xl mb-3 block"></i>
          <p class="text-sm font-bold text-gray-600 mb-1">강의 수</p>
          <p class="text-lg font-black text-gray-900"><span th:text="${course.sectionCount}">0</span>개</p>
        </div>
        <div class="bg-white border-2 border-gray-200 rounded-2xl p-5 text-center hover:border-blue-300 transition-all">
          <i class="fa-solid fa-clock text-blue-600 text-2xl mb-3 block"></i>
          <p class="text-sm font-bold text-gray-600 mb-1">학습 기간</p>
          <p class="text-lg font-black text-gray-900">무제한</p>
        <div class="bg-white border-2 border-gray-200 rounded-2xl p-5 text-center hover:border-blue-300 transition-all">
          <i class="fa-solid fa-users text-blue-600 text-2xl mb-3 block"></i>
          <p class="text-sm font-bold text-gray-600 mb-1">수강생</p>
          <p class="text-lg font-black text-gray-900"><span th:text="${#numbers.formatInteger(course.studentCount, 0, 'COMMA')}">0</span>명</p>
        </div>
      </div>

      <div class="bg-white border-2 border-gray-200 rounded-2xl p-8" th:if="${curriculum != null}">
        <h2 class="text-2xl font-black text-gray-900 mb-6">무엇을 배우나요?</h2>
        <div class="space-y-4">
          <div th:each="item : ${curriculum}" class="flex gap-4">
            <i class="fa-solid fa-circle-check text-green-600 text-lg flex-shrink-0 mt-0.5"></i>
            <p class="text-gray-700 font-medium leading-relaxed" th:text="${item}">커리큘럼 항목</p>
          </div>
        </div>
      </div>

      <div class="bg-white border-2 border-gray-200 rounded-2xl p-8">
        <h2 class="text-2xl font-black text-gray-900 mb-6">강의 목차</h2>
        <div th:each="section, stat : ${course.sections}" class="mb-4 border-2 border-gray-200 rounded-xl overflow-hidden">
          <div class="bg-gray-50 px-5 py-4 flex items-center justify-between cursor-pointer"
               onclick="this.nextElementSibling.classList.toggle('hidden')">
            <span class="font-bold text-gray-900" th:text="|섹션 ${stat.count}. ${section.title}|">섹션명</span>

            <div class="flex items-center gap-3">
              <span th:if="${section.isFree}" class="text-[10px] font-black text-green-600 bg-green-100 px-2 py-1 rounded">무료공개</span>
              <span class="text-sm font-mono text-gray-500" th:text="${section.playTime}">00:00</span>
              <i class="fa-solid fa-chevron-down text-gray-500 text-sm"></i>
            </div>
          </div>
          <div class="hidden">
            <div class="flex items-center gap-3 px-5 py-3 border-t border-gray-100 hover:bg-gray-50">
              <i class="fa-solid fa-play text-blue-500 text-xs"></i>
              <span class="flex-1 text-sm text-gray-700" th:text="${section.title} + ' 학습하기'">강의명</span>
            </div>
          </div>
        </div>
      </div>

      <div th:if="${reviews != null and not #lists.isEmpty(reviews)}" class="bg-white border-2 border-gray-200 rounded-2xl p-8">
      </div>
    </div>

    <div class="lg:col-span-1">
      <div class="bg-white border-2 border-gray-200 rounded-2xl p-6 shadow-lg sticky top-24">
        <div class="mb-6">
          <p class="text-sm font-bold text-gray-600 mb-2">강의 가격</p>
          <p class="text-5xl font-black text-gray-900 mb-1"
             th:text="${#numbers.formatInteger(course.price, 0, 'COMMA')}">0</p>
          <p class="text-lg font-bold text-gray-600">크레딧</p>
        </div>

        <div class="space-y-3 mb-6">
          <a th:href="@{/payment(courses=${course.courseId})}" href="/payment"
             class="w-full py-4 bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-xl font-black text-lg hover:shadow-xl hover:shadow-blue-200 transition-all flex items-center justify-center gap-2">
            <i class="fa-solid fa-credit-card"></i>
            <span>바로 결제</span>
          </a>
          <form th:action="@{/cart/add}" method="post">
            <input type="hidden" name="courseId" th:value="${course.courseId}"/>
            <button type="submit"
                    class="w-full py-4 border-2 border-gray-300 bg-white text-gray-900 rounded-xl font-black text-lg hover:border-blue-600 hover:bg-blue-50 transition-all flex items-center justify-center gap-2">
              <i class="fa-solid fa-cart-shopping"></i>
              <span>장바구니 담기</span>
            </button>
          </form>
        </div>

        <div class="border-t-2 border-gray-200 pt-6 space-y-3">
          <div class="flex items-center gap-3 text-sm">
            <i class="fa-solid fa-circle-check text-green-600"></i>
            <span class="text-gray-700 font-medium">평생 수강 가능</span>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
