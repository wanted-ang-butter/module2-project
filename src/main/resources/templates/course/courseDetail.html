<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${course.title} + ' | Nae-Il'">강의 상세 | Nae-Il</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .line-clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- 이전으로 -->
<div class="bg-white border-b border-gray-200">
  <div class="max-w-7xl mx-auto px-6 py-4">
    <a th:href="@{/courses}" href="/courses" class="inline-flex items-center gap-2 text-gray-600 hover:text-blue-600 transition-colors">
      <i class="fa-solid fa-chevron-left text-xs"></i>
      <span class="text-sm font-medium">전체 강의로 돌아가기</span>
    </a>
  </div>
</div>

<div class="max-w-7xl mx-auto px-6 py-12">
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

    <!-- ── Left: Main Content ── -->
    <div class="lg:col-span-2 space-y-8">

      <!-- Course Header -->
      <div class="bg-white border-2 border-gray-200 rounded-2xl p-8">
        <div class="flex gap-3 mb-4">
          <!-- Level Badge (색상은 th:class로 조건 처리) -->
          <span th:text="${course.level}"
                th:class="${course.level == '입문'} ? 'px-3 py-1.5 text-sm font-bold rounded-lg border-2 bg-green-100 text-green-700 border-green-300' :
                           (${course.level == '초급'} ? 'px-3 py-1.5 text-sm font-bold rounded-lg border-2 bg-blue-100 text-blue-700 border-blue-300' :
                           (${course.level == '중급'} ? 'px-3 py-1.5 text-sm font-bold rounded-lg border-2 bg-yellow-100 text-yellow-700 border-yellow-300' :
                                                        'px-3 py-1.5 text-sm font-bold rounded-lg border-2 bg-red-100 text-red-700 border-red-300'))">
            난이도
          </span>
          <span class="px-3 py-1.5 text-sm font-bold rounded-lg border-2 border-gray-300 text-gray-700"
                th:text="${course.category}">카테고리</span>
        </div>

        <h1 class="text-4xl font-black text-gray-900 mb-4 leading-tight" th:text="${course.title}">강의 제목</h1>

        <div class="flex items-center gap-4 mb-6">
          <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-green-600 rounded-xl flex items-center justify-center shadow-md">
            <span class="text-white text-sm font-mono font-bold">&lt;&gt;</span>
          </div>
          <div class="flex-1">
            <p class="font-bold text-gray-900" th:text="${course.instructor}">강사명</p>
            <div class="flex items-center gap-3 text-sm mt-1">
              <span class="text-yellow-400">★</span>
              <span class="font-bold text-gray-900" th:text="${#numbers.formatDecimal(course.rating,1,1)}">4.5</span>
              <span class="text-gray-400">👥</span>
              <span class="text-gray-600" th:text="${#numbers.formatInteger(course.studentCount,1,'COMMA')}">1,234</span>
            </div>
          </div>
        </div>

        <!-- Description + Like -->
        <div class="flex items-center justify-between gap-6">
          <p class="text-lg text-gray-700 leading-relaxed flex-1" th:text="${course.description}">강의 설명</p>
          <div class="flex items-center gap-3 flex-shrink-0">
            <span class="text-base font-bold text-gray-600" th:text="${#numbers.formatInteger(course.likeCount,1,'COMMA')}">0</span>
            <!-- 좋아요: th:action으로 POST 처리 -->
            <form th:action="@{/course/{id}/like(id=${course.id})}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button type="submit" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-50 transition-all group">
                <i th:class="${course.liked} ? 'fa-solid fa-heart text-red-500' : 'fa-regular fa-heart text-gray-400 group-hover:text-red-400'"
                   class="text-lg"></i>
              </button>
            </form>
          </div>
        </div>
      </div>

      <!-- Thumbnail Image -->
      <div class="rounded-2xl overflow-hidden border-2 border-gray-200">
        <img th:src="${course.thumbnail}" th:alt="${course.title}" src="#" alt="썸네일"
             class="w-full aspect-video object-cover"/>
      </div>

      <!-- Feature Stats -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="bg-white border-2 border-gray-200 rounded-2xl p-5 text-center hover:border-blue-300 transition-all">
          <i class="fa-solid fa-book-open text-blue-600 text-2xl mb-3 block"></i>
          <p class="text-sm font-bold text-gray-600 mb-1">강의 수</p>
          <p class="text-lg font-black text-gray-900"><span th:text="${course.totalLectures}">0</span>개</p>
        </div>
        <div class="bg-white border-2 border-gray-200 rounded-2xl p-5 text-center hover:border-blue-300 transition-all">
          <i class="fa-solid fa-clock text-blue-600 text-2xl mb-3 block"></i>
          <p class="text-sm font-bold text-gray-600 mb-1">학습 기간</p>
          <p class="text-lg font-black text-gray-900">무제한</p>
        </div>
        <div class="bg-white border-2 border-gray-200 rounded-2xl p-5 text-center hover:border-blue-300 transition-all">
          <i class="fa-solid fa-chart-bar text-blue-600 text-2xl mb-3 block"></i>
          <p class="text-sm font-bold text-gray-600 mb-1">난이도</p>
          <p class="text-lg font-black text-gray-900" th:text="${course.level}">초급</p>
        </div>
        <div class="bg-white border-2 border-gray-200 rounded-2xl p-5 text-center hover:border-blue-300 transition-all">
          <i class="fa-solid fa-users text-blue-600 text-2xl mb-3 block"></i>
          <p class="text-sm font-bold text-gray-600 mb-1">수강생</p>
          <p class="text-lg font-black text-gray-900"><span th:text="${#numbers.formatInteger(course.studentCount,1,'COMMA')}">0</span>명</p>
        </div>
      </div>

      <!-- 무엇을 배우나요 -->
      <div class="bg-white border-2 border-gray-200 rounded-2xl p-8">
        <h2 class="text-2xl font-black text-gray-900 mb-6">무엇을 배우나요?</h2>
        <div class="space-y-4">
          <div th:each="item : ${curriculum}" class="flex gap-4">
            <i class="fa-solid fa-circle-check text-green-600 text-lg flex-shrink-0 mt-0.5"></i>
            <p class="text-gray-700 font-medium leading-relaxed" th:text="${item}">커리큘럼 항목</p>
          </div>
        </div>
      </div>

      <!-- 강의 목차 (섹션/강의 목록) -->
      <div class="bg-white border-2 border-gray-200 rounded-2xl p-8">
        <h2 class="text-2xl font-black text-gray-900 mb-6">강의 목차</h2>
        <div th:each="section : ${sections}" class="mb-4 border-2 border-gray-200 rounded-xl overflow-hidden">
          <div class="bg-gray-50 px-5 py-4 flex items-center justify-between cursor-pointer"
               onclick="this.nextElementSibling.classList.toggle('hidden')">
            <span class="font-bold text-gray-900" th:text="${section.title}">섹션명</span>
            <i class="fa-solid fa-chevron-down text-gray-500 text-sm"></i>
          </div>
          <div class="hidden">
            <div th:each="lecture : ${section.lectures}"
                 class="flex items-center gap-3 px-5 py-3 border-t border-gray-100 hover:bg-gray-50">
              <i class="fa-solid fa-play text-blue-500 text-xs"></i>
              <span class="flex-1 text-sm text-gray-700" th:text="${lecture.title}">강의명</span>
              <span class="text-xs text-gray-400 font-mono" th:text="${lecture.duration}">00:00</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 수강평 -->
      <div th:if="${not #lists.isEmpty(reviews)}" class="bg-white border-2 border-gray-200 rounded-2xl p-8">
        <h2 class="text-2xl font-black text-gray-900 mb-6">
          수강평 (<span th:text="${#lists.size(reviews)}">0</span>)
        </h2>
        <div class="space-y-4">
          <div th:each="review : ${reviews}" class="border-2 border-gray-200 rounded-xl p-5">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-10 h-10 bg-gradient-to-br from-blue-400 to-blue-600 rounded-full flex items-center justify-center">
                <span class="text-white font-bold text-sm"
                      th:text="${#strings.substring(review.userName,0,1)}">U</span>
              </div>
              <div class="flex-1">
                <p class="font-bold text-gray-900" th:text="${review.userName}">사용자명</p>
                <div class="flex items-center gap-2 text-sm">
                  <!-- 별점 -->
                  <span th:each="i : ${#numbers.sequence(1,5)}"
                        th:class="${i <= review.rating} ? 'text-yellow-400 text-sm' : 'text-gray-300 text-sm'">★</span>
                  <span class="font-bold text-gray-700" th:text="${#numbers.formatDecimal(review.rating,1,1)}">4.5</span>
                  <span class="text-gray-400">•</span>
                  <span class="text-gray-500 font-mono" th:text="${review.date}">2026-01-01</span>
                </div>
              </div>
            </div>
            <p class="text-gray-700 leading-relaxed" th:text="${review.reviewText}">리뷰 내용</p>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Right: Purchase Sidebar ── -->
    <div class="lg:col-span-1">
      <div class="bg-white border-2 border-gray-200 rounded-2xl p-6 shadow-lg sticky top-24">
        <div class="mb-6">
          <p class="text-sm font-bold text-gray-600 mb-2">강의 가격</p>
          <p class="text-5xl font-black text-gray-900 mb-1"
             th:text="${#numbers.formatInteger(course.price,1,'COMMA')}">0</p>
          <p class="text-lg font-bold text-gray-600">크레딧</p>
        </div>

        <div class="space-y-3 mb-6">
          <!-- 바로 결제 -->
          <a th:href="@{/payment(courses=${course.id})}" href="/payment"
             class="w-full py-4 bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-xl font-black text-lg hover:shadow-xl hover:shadow-blue-200 transition-all flex items-center justify-center gap-2">
            <i class="fa-solid fa-credit-card"></i>
            <span>바로 결제</span>
          </a>
          <!-- 장바구니 담기 -->
          <form th:action="@{/cart/add}" method="post">
            <input type="hidden" name="courseId" th:value="${course.id}"/>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit"
                    class="w-full py-4 border-2 border-gray-300 bg-white text-gray-900 rounded-xl font-black text-lg hover:border-blue-600 hover:bg-blue-50 transition-all flex items-center justify-center gap-2">
              <i class="fa-solid fa-cart-shopping"></i>
              <span>장바구니 담기</span>
            </button>
          </form>
        </div>

        <div class="border-t-2 border-gray-200 pt-6 space-y-3">
          <div class="flex items-center gap-3 text-sm">
            <i class="fa-solid fa-circle-check text-green-600"></i>
            <span class="text-gray-700 font-medium">평생 수강 가능</span>
          </div>
          <div class="flex items-center gap-3 text-sm">
            <i class="fa-solid fa-circle-check text-green-600"></i>
            <span class="text-gray-700 font-medium">모바일 지원</span>
          </div>
          <div class="flex items-center gap-3 text-sm">
            <i class="fa-solid fa-circle-check text-green-600"></i>
            <span class="text-gray-700 font-medium">수료증 발급</span>
          </div>
          <div class="flex items-center gap-3 text-sm">
            <i class="fa-solid fa-circle-check text-green-600"></i>
            <span class="text-gray-700 font-medium">Q&A 지원</span>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
