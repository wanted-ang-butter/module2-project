<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${course.title} + ' | Nae-Il'">강의 상세 | Nae-Il</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .toast {
      position: fixed;
      top: 28px;
      right: 28px;
      z-index: 9999;
      min-width: 280px;
      max-width: 360px;
      padding: 16px 18px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.16);
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transform: translateY(-16px);
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s ease;
      background: #ffffff;
      border: 1px solid #e5e7eb;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    .toast.success {
      border-left: 5px solid #22c55e;
    }

    .toast.warning {
      border-left: 5px solid #f59e0b;
    }

    .toast-icon {
      font-size: 18px;
      line-height: 1;
      margin-top: 2px;
    }

    .toast.success .toast-icon {
      color: #16a34a;
    }

    .toast.warning .toast-icon {
      color: #d97706;
    }

    .toast-title {
      font-size: 15px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 2px;
    }

    .toast-message {
      font-size: 14px;
      color: #4b5563;
      line-height: 1.45;
    }
  </style>
</head>
<body class="bg-[#f7f7f9] min-h-screen text-gray-900">

<!-- 토스트 -->
<div id="cartToast" class="toast">
  <div id="toastIcon" class="toast-icon">
    <i class="fa-solid fa-circle-check"></i>
  </div>
  <div>
    <div id="toastTitle" class="toast-title">알림</div>
    <div id="toastMessage" class="toast-message">메시지</div>
  </div>
</div>

<div class="border-b border-gray-200 bg-white">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
    <a th:href="@{/course}"
       class="inline-flex items-center gap-2 text-sm font-medium text-gray-600 hover:text-blue-600 transition">
      <i class="fa-solid fa-chevron-left text-xs"></i>
      <span>전체 강의로 돌아가기</span>
    </a>
  </div>
</div>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">

    <!-- Left Content -->
    <section class="lg:col-span-8 space-y-6">

      <!-- Course Hero -->
      <div class="bg-white border border-gray-200 rounded-3xl p-6 sm:p-8">
        <div class="flex flex-wrap items-center gap-3 mb-5">
          <span class="px-3 py-1 text-sm font-semibold rounded-lg border border-yellow-400 bg-yellow-50 text-yellow-700"
                th:text="${course.category}">카테고리</span>
        </div>

        <h1 class="text-3xl sm:text-5xl font-extrabold tracking-tight leading-tight mb-6"
            th:text="${course.title}">강의 제목</h1>

        <div class="flex items-center gap-4 mb-6">
          <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-blue-600 to-green-500 flex items-center justify-center shadow">
            <span class="text-white text-sm font-bold">&lt;&gt;</span>
          </div>

          <div class="flex-1 min-w-0">
            <p class="font-bold text-gray-900" th:text="${course.instructorName}">강사명</p>
            <div class="flex items-center gap-3 mt-1 text-sm text-gray-500">
              <span class="text-yellow-500">★</span>
              <span class="font-semibold text-gray-900" th:text="${course.rating}">4.8</span>
              <span><i class="fa-solid fa-users text-xs"></i></span>
              <span th:text="${#numbers.formatInteger(course.studentCount, 0, 'COMMA')}">0</span>
            </div>
          </div>
        </div>

        <div class="flex items-end justify-between gap-4">
          <p class="text-base sm:text-lg text-gray-600 leading-relaxed whitespace-pre-wrap"
             th:text="${course.description}">
            강의 설명
          </p>

          <div class="flex items-center gap-3 shrink-0">
            <span class="font-semibold text-gray-700"
                  th:text="${#numbers.formatInteger(course.likeCount, 0, 'COMMA')}">0</span>
            <form th:action="@{/course/{id}/like(id=${course.courseId})}" method="post">
              <button type="submit"
                      class="w-9 h-9 rounded-full flex items-center justify-center text-gray-400 hover:text-red-500 hover:bg-red-50 transition">
                <i class="fa-regular fa-heart"></i>
              </button>
            </form>
          </div>
        </div>
      </div>

      <!-- Thumbnail -->
      <div class="overflow-hidden rounded-3xl border border-gray-200 bg-white">
        <img th:src="${course.thumbnail}"
             th:alt="${course.title}"
             src="#"
             alt="썸네일"
             class="w-full aspect-[16/9] object-cover"/>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <div class="bg-white border border-gray-200 rounded-2xl p-6 text-center min-h-[140px] flex flex-col justify-center">
          <i class="fa-regular fa-bookmark text-2xl text-indigo-500 mb-3"></i>
          <p class="text-sm text-gray-500 mb-2">강의 수</p>
          <p class="text-2xl font-extrabold text-gray-900">
            <span th:text="${course.sectionCount}">0</span>개
          </p>
        </div>

        <div class="bg-white border border-gray-200 rounded-2xl p-6 text-center min-h-[140px] flex flex-col justify-center">
          <i class="fa-regular fa-clock text-2xl text-indigo-500 mb-3"></i>
          <p class="text-sm text-gray-500 mb-2">학습 기간</p>
          <p class="text-2xl font-extrabold text-gray-900">무제한</p>
        </div>

        <div class="bg-white border border-gray-200 rounded-2xl p-6 text-center min-h-[140px] flex flex-col justify-center">
          <i class="fa-solid fa-users text-2xl text-indigo-500 mb-3"></i>
          <p class="text-sm text-gray-500 mb-2">수강생</p>
          <p class="text-2xl font-extrabold text-gray-900">
            <span th:text="${#numbers.formatInteger(course.studentCount, 0, 'COMMA')}">0</span>명
          </p>
        </div>
      </div>

      <!-- Curriculum Intro -->
      <div th:if="${curriculum != null}" class="bg-white border border-gray-200 rounded-3xl p-6 sm:p-8">
        <h2 class="text-3xl font-extrabold mb-6">무엇을 배우나요?</h2>
        <div class="space-y-4">
          <div th:each="item : ${curriculum}" class="flex items-start gap-4">
            <i class="fa-regular fa-circle-check text-green-600 text-lg mt-1"></i>
            <p class="text-gray-700 leading-relaxed font-medium" th:text="${item}">커리큘럼 항목</p>
          </div>
        </div>
      </div>

      <!-- Course Sections -->
      <div class="bg-white border border-gray-200 rounded-3xl overflow-hidden">
        <div class="px-6 py-5 flex items-center justify-between border-b border-gray-200">
          <h2 class="text-3xl font-extrabold">커리큘럼</h2>
          <span class="text-sm text-gray-500">
            총 <span th:text="${course.sectionCount}">0</span>개 강의
          </span>
        </div>

        <div class="divide-y divide-gray-200">
          <div th:each="section, stat : ${course.sections}">
            <button type="button"
                    class="w-full px-6 py-5 flex items-center justify-between text-left hover:bg-gray-50 transition"
                    onclick="this.nextElementSibling.classList.toggle('hidden')">
              <div class="min-w-0 pr-4">
                <p class="font-bold text-gray-900 break-words"
                   th:text="|섹션 ${stat.count}. ${section.title}|">섹션명</p>
              </div>

              <div class="flex items-center gap-3 shrink-0">
                <span th:if="${section.isFree}"
                      class="text-[11px] font-bold text-green-700 bg-green-100 px-2 py-1 rounded-md">
                  무료공개
                </span>
                <span class="text-sm text-gray-500 font-medium"
                      th:text="${section.playTime}">00:15</span>
                <i class="fa-solid fa-chevron-down text-sm text-gray-400"></i>
              </div>
            </button>

            <div class="hidden bg-gray-50 border-t border-gray-100">
              <div class="px-6 py-4 flex items-center gap-3">
                <i class="fa-solid fa-play text-blue-500 text-xs"></i>
                <span class="text-sm text-gray-700"
                      th:text="${section.title} + ' 학습하기'">강의명</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Reviews placeholder -->
      <div th:if="${reviews != null and not #lists.isEmpty(reviews)}"
           class="bg-white border border-gray-200 rounded-3xl p-8">
      </div>
    </section>

    <!-- Right Sidebar -->
    <aside class="lg:col-span-4">
      <div class="lg:sticky lg:top-24">
        <div class="bg-white border border-gray-200 rounded-3xl p-6 shadow-sm">
          <div class="mb-6">
            <p class="text-sm text-gray-500 font-semibold mb-2">강의 가격</p>
            <p class="text-5xl font-extrabold tracking-tight text-gray-900"
               th:text="${#numbers.formatInteger(course.price, 0, 'COMMA')}">0</p>
            <p class="mt-1 text-lg font-semibold text-gray-600">크레딧</p>
          </div>

          <div class="space-y-3">
            <!-- 바로 결제 -->
            <form th:action="@{/payments/courses/direct/{courseId}(courseId=${course.courseId})}" method="post">
              <button type="submit"
                      class="w-full h-14 rounded-2xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-lg flex items-center justify-center gap-2 transition">
                <i class="fa-regular fa-credit-card"></i>
                <span>바로 결제</span>
              </button>
            </form>

            <!-- 장바구니 담기 -->
            <form th:action="@{/cart/add/{courseId}(courseId=${course.courseId})}" method="post">
              <button type="submit"
                      class="w-full h-14 rounded-2xl border border-gray-300 bg-white hover:bg-gray-50 text-gray-900 font-bold text-lg flex items-center justify-center gap-2 transition">
                <i class="fa-solid fa-cart-shopping"></i>
                <span>장바구니 담기</span>
              </button>
            </form>
          </div>

          <div class="mt-6 pt-6 border-t border-gray-200 space-y-3">
            <div class="flex items-center gap-3 text-sm text-gray-700">
              <i class="fa-regular fa-circle-check text-green-600"></i>
              <span>평생 수강 가능</span>
            </div>
            <div class="flex items-center gap-3 text-sm text-gray-700">
              <i class="fa-regular fa-circle-check text-green-600"></i>
              <span>모바일 지원</span>
            </div>
            <div class="flex items-center gap-3 text-sm text-gray-700">
              <i class="fa-regular fa-circle-check text-green-600"></i>
              <span>수료증 발급</span>
            </div>
            <div class="flex items-center gap-3 text-sm text-gray-700">
              <i class="fa-regular fa-circle-check text-green-600"></i>
              <span>Q&amp;A 지원</span>
            </div>
          </div>
        </div>
      </div>
    </aside>
  </div>
</main>

<script>
  function showToast(type, title, message) {

    const old = document.getElementById('centerToast');
    if (old) old.remove();

    const toast = document.createElement('div');
    toast.id = 'centerToast';

    const color = type === 'success' ? 'border-green-300' : 'border-yellow-300';
    const icon = type === 'success'
            ? 'fa-circle-check text-green-600'
            : 'fa-triangle-exclamation text-yellow-500';

    toast.className = `
    fixed inset-0 z-[9999] flex items-center justify-center
    bg-black/30 backdrop-blur-sm
    opacity-0 transition-all duration-300
  `;

    toast.innerHTML = `
    <div class="
      bg-white rounded-3xl shadow-2xl border ${color}
      px-8 py-6 w-[360px] text-center
      scale-90 transition-all duration-300
    ">
      <div class="flex flex-col items-center gap-3">
        <i class="fa-solid ${icon} text-2xl"></i>
        <div class="text-lg font-extrabold text-gray-900">${title}</div>
        <div class="text-sm text-gray-600">${message}</div>
      </div>
    </div>
  `;

    document.body.appendChild(toast);

    // 등장 애니메이션
    requestAnimationFrame(() => {
      toast.classList.remove('opacity-0');
      toast.classList.add('opacity-100');
      toast.firstElementChild.classList.remove('scale-90');
      toast.firstElementChild.classList.add('scale-100');
    });

    // 자동 사라짐
    setTimeout(() => {
      toast.classList.remove('opacity-100');
      toast.classList.add('opacity-0');
      toast.firstElementChild.classList.remove('scale-100');
      toast.firstElementChild.classList.add('scale-90');

      setTimeout(() => toast.remove(), 300);
    }, 2000);

    // 클릭 시 닫힘
    toast.addEventListener('click', () => {
      toast.remove();
    });
  }

  // 상태 체크 (이건 그대로 유지)
  const params = new URLSearchParams(window.location.search);
  const cartStatus = params.get('cartStatus');

  if (cartStatus === 'added') {
    showToast('success', '장바구니 담기 완료', '장바구니에 담았습니다.');
  } else if (cartStatus === 'duplicate') {
    showToast('warning', '이미 담긴 강의', '이미 장바구니에 담긴 강의입니다.');
  }

  if (cartStatus) {
    const cleanUrl = window.location.pathname;
    window.history.replaceState({}, document.title, cleanUrl);
  }
</script>

</body>
</html>
