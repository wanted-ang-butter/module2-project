<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>로그인</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-green-50 flex items-center justify-center p-6">

<div class="w-full max-w-md">

  <!-- Logo -->
  <div class="flex items-center justify-center gap-3 mb-8">
    <div class="w-12 h-12 bg-gradient-to-br from-blue-600 to-green-600 rounded-xl flex items-center justify-center">
      <span class="text-white font-bold">N</span>
    </div>
    <div>
      <h1 class="text-2xl font-black text-gray-900">내일 <span class="text-gray-500">Nae-il</span></h1>
      <p class="text-[10px] text-gray-500">내일의 일, My Work</p>
    </div>
  </div>

  <!-- Login Form -->
  <div class="bg-white border-2 border-gray-200 rounded-2xl p-8 shadow-xl mb-6">
    <h2 class="text-3xl font-black text-gray-900 mb-2">로그인</h2>
    <p class="text-gray-600 mb-8">계정에 로그인하여 학습을 시작하세요</p>

    <form id="loginForm" class="space-y-5">
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">아이디</label>
        <input
                type="text"
                id="userId"
                placeholder="아이디를 입력하세요"
                class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-600 outline-none"
        />
      </div>

      <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">비밀번호</label>
        <input
                type="password"
                id="password"
                placeholder="••••••••"
                class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-600 outline-none"
        />
      </div>

      <button
              type="submit"
              class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold text-lg hover:bg-blue-700"
      >
        로그인
      </button>
    </form>
