<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>글 작성 | Nae-Il</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="bg-white">
<th:block th:if="${user == null or user.role == null}">
    <div th:replace="~{fragments/guestHeader :: guestHeader}"></div>
</th:block>

<th:block th:if="${user != null and user.role != null and user.role.name() == 'USER'}">
    <div th:replace="~{fragments/userHeader :: userHeader}"></div>
</th:block>

<th:block th:if="${user != null and user.role != null and user.role.name() == 'INSTRUCTOR'}">
    <div th:replace="~{fragments/instructorHeader :: instructorHeader}"></div>
</th:block>

<th:block th:if="${user != null and user.role != null and user.role.name() == 'ADMIN'}">
    <div th:replace="~{fragments/adminHeader :: adminHeader}"></div>
</th:block>

<div class="max-w-7xl mx-auto px-6 py-12">
    <div class="grid grid-cols-12 gap-8">

        <!-- 사이드바 -->
        <div class="col-span-3">
            <div class="bg-white border-2 border-gray-200 rounded-2xl p-6 sticky top-24">
                <h2 class="text-xl font-black text-gray-900 mb-6">커뮤니티</h2>
                <nav class="space-y-2">
                    <a th:href="@{/community/qna}"
                       class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-gray-700 hover:bg-gray-50 font-medium">
                        <i class="fa-solid fa-comment text-sm"></i>
                        <span class="text-sm">Q&A</span>
                    </a>
                    <a th:href="@{/community/free}"
                       class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all bg-blue-50 text-blue-600 font-bold">
                        <i class="fa-solid fa-file-lines text-sm"></i>
                        <span class="text-sm">자유게시판</span>
                    </a>
                </nav>
            </div>
        </div>

        <!-- 메인 -->
        <div class="col-span-9">
            <div class="bg-white border-2 border-gray-200 rounded-2xl p-8">

                <h1 class="text-3xl font-black text-gray-900 mb-8"
                    th:text="${post != null} ? '글 수정' : '글 작성'">글 작성</h1>

                <!-- 에러 메시지 -->
                <div th:if="${errorMessage}"
                     class="mb-6 p-4 bg-red-100 border-l-4 border-red-500 text-red-700 rounded-xl">
                    <p th:text="${errorMessage}"></p>
                </div>

                <!-- 작성 폼 -->
                <form th:if="${post == null}"
                      th:action="@{/community/free}"
                      method="post">
                    <input type="hidden" name="category" value="FREE">
                    <div class="space-y-6">

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">제목</label>
                            <input type="text" name="title" required
                                   placeholder="제목을 입력하세요"
                                   class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-600 focus:outline-none transition-colors font-medium"/>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">내용</label>
                            <textarea name="content" required
                                      placeholder="내용을 입력하세요"
                                      class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-600 focus:outline-none transition-colors resize-none h-96 font-medium"></textarea>
                        </div>

                        <div class="flex items-center gap-3">
                            <input type="checkbox" name="isPublic" value="true"
                                   checked id="isPublicCreate">
                            <label for="isPublicCreate"
                                   class="text-sm font-bold text-gray-700">공개</label>
                        </div>

                        <div class="flex gap-3 justify-end pt-6 border-t-2 border-gray-200">
                            <a th:href="@{/community/free}"
                               class="px-6 py-3 border-2 border-gray-300 text-gray-700 rounded-xl hover:border-gray-400 transition-all font-bold">
                                취소
                            </a>
                            <button type="submit"
                                    class="px-6 py-3 bg-gradient-to-r from-blue-600 to-green-600 text-white rounded-xl hover:shadow-lg transition-all font-bold">
                                글 등록하기
                            </button>
                        </div>
                    </div>
                </form>

                <!-- 수정 폼 -->
                <form th:if="${post != null}"
                      th:action="@{/community/free/{postId}(postId=${post.postId})}"
                      method="post">
                    <input type="hidden" name="_method" value="PUT">
                    <input type="hidden" name="category" value="FREE">
                    <div class="space-y-6">

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">제목</label>
                            <input type="text" name="title"
                                   th:value="${post.title}"
                                   required
                                   class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-600 focus:outline-none transition-colors font-medium"/>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">내용</label>
                            <textarea name="content" required
                                      class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-600 focus:outline-none transition-colors resize-none h-96 font-medium"
                                      th:text="${post.content}"></textarea>
                        </div>

                        <div class="flex items-center gap-3">
                            <input type="checkbox" name="isPublic" value="true"
                                   th:checked="${post.isPublic}" id="isPublicEdit">
                            <label for="isPublicEdit"
                                   class="text-sm font-bold text-gray-700">공개</label>
                        </div>

                        <div class="flex gap-3 justify-end pt-6 border-t-2 border-gray-200">
                            <a th:href="@{/community/free/{postId}(postId=${post.postId})}"
                               class="px-6 py-3 border-2 border-gray-300 text-gray-700 rounded-xl hover:border-gray-400 transition-all font-bold">
                                취소
                            </a>
                            <button type="submit"
                                    class="px-6 py-3 bg-gradient-to-r from-blue-600 to-green-600 text-white rounded-xl hover:shadow-lg transition-all font-bold">
                                수정 완료
                            </button>
                        </div>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
</body>
</html>
