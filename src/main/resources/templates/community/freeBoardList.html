<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>자유게시판 | Nae-Il</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="bg-white">
<th:block th:if="${user == null or user.role == null}">
  <div th:replace="~{fragments/guestHeader :: guestHeader}"></div>
</th:block>

<th:block th:if="${user != null and user.role != null and (user.role.name() == 'USER' or user.role.name() == 'SUBSCRIBER')}">
  <div th:replace="~{fragments/userHeader :: userHeader}"></div>
</th:block>

<th:block th:if="${user != null and user.role != null and user.role.name() == 'INSTRUCTOR'}">
  <div th:replace="~{fragments/instructorHeader :: instructorHeader}"></div>
</th:block>

<th:block th:if="${user != null and user.role != null and user.role.name() == 'ADMIN'}">
  <div th:replace="~{fragments/adminHeader :: adminHeader}"></div>
</th:block>

<div class="max-w-7xl mx-auto px-6 py-12">

  <a th:href="@{/}" class="inline-flex items-center gap-2 text-gray-600 hover:text-blue-600 transition-colors mb-6 font-medium">
    <i class="fa-solid fa-arrow-left text-sm"></i>
    <span class="text-sm">이전으로</span>
  </a>

  <div class="grid grid-cols-12 gap-8">

    <!-- 사이드바 -->
    <div class="col-span-3">
      <div class="bg-white border-2 border-gray-200 rounded-2xl p-6 sticky top-24">
        <h2 class="text-xl font-black text-gray-900 mb-6">커뮤니티</h2>
        <nav class="space-y-2">
          <a th:href="@{/community/qna}"
             class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-gray-700 hover:bg-gray-50 font-medium">
            <i class="fa-solid fa-comment text-sm"></i>
            <span class="text-sm">Q&A</span>
          </a>
          <a th:href="@{/community/free}"
             class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all bg-blue-50 text-blue-600 font-bold">
            <i class="fa-solid fa-file-lines text-sm"></i>
            <span class="text-sm">자유게시판</span>
          </a>
        </nav>
      </div>
    </div>

    <!-- 메인 -->
    <div class="col-span-9">
      <div class="flex items-center justify-between mb-8">
        <h1 class="text-4xl font-black text-gray-900">자유게시판</h1>
        <a th:href="@{/community/free/form}"
           class="inline-flex items-center gap-2 px-6 py-3 bg-gradient-to-r from-blue-600 to-green-600 text-white rounded-xl hover:shadow-lg transition-all font-bold">
          <i class="fa-solid fa-plus"></i> 글쓰기
        </a>
      </div>

      <!-- 정렬 버튼 -->
      <div class="flex gap-2 mb-6">
        <a th:href="@{/community/free(sortType='latest')}"
           th:class="${sortType == 'latest'} ? 'px-4 py-2 rounded-xl font-bold bg-blue-600 text-white' : 'px-4 py-2 rounded-xl font-bold border-2 border-gray-200 text-gray-700'">
          최신순
        </a>
        <a th:href="@{/community/free(sortType='oldest')}"
           th:class="${sortType == 'oldest'} ? 'px-4 py-2 rounded-xl font-bold bg-blue-600 text-white' : 'px-4 py-2 rounded-xl font-bold border-2 border-gray-200 text-gray-700'">
          오래된순
        </a>
        <a th:href="@{/community/free(sortType='popular')}"
           th:class="${sortType == 'popular'} ? 'px-4 py-2 rounded-xl font-bold bg-blue-600 text-white' : 'px-4 py-2 rounded-xl font-bold border-2 border-gray-200 text-gray-700'">
          조회순
        </a>
      </div>

      <!-- 게시글 목록 -->
      <div class="space-y-4">

        <div th:if="${#lists.isEmpty(posts)}" class="text-center py-20">
          <p class="text-gray-500 font-medium">등록된 게시글이 없습니다</p>
        </div>

        <a th:each="post : ${posts}"
           th:href="@{/community/free/{postId}(postId=${post.postId})}"
           class="block bg-white border-2 border-gray-200 rounded-2xl p-6 hover:shadow-xl hover:-translate-y-1 transition-all group">
          <div class="flex items-start justify-between">
            <div class="flex-1">
              <h3 class="text-xl font-bold text-gray-900 group-hover:text-blue-600 transition-colors mb-3 flex items-center gap-2">
                <span th:text="${post.title}">제목</span>
                <i th:if="${!post.isPublic}" class="fa-solid fa-lock text-gray-400 text-sm" title="비공개"></i>
              </h3>
              <div class="flex items-center gap-4">
                <span class="text-sm text-gray-600 font-medium"
                      th:text="${post.nickname}">작성자</span>
                <span class="text-sm text-gray-500 font-mono"
                      th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}">날짜</span>
                <div class="flex items-center gap-1.5 text-gray-500">
                  <i class="fa-solid fa-eye text-sm"></i>
                  <span class="text-sm font-mono" th:text="${post.viewCount}">0</span>
                </div>
                <div class="flex items-center gap-1.5 text-red-500">
                  <i class="fa-solid fa-heart text-sm"></i>
                  <span class="text-sm font-mono" th:text="${post.likeCount}">0</span>
                </div>
              </div>
            </div>
          </div>
        </a>

        <div th:if="${not #lists.isEmpty(posts)}" class="text-center py-8">
          <p class="text-gray-500 font-medium">모든 게시글을 불러왔습니다</p>
        </div>

      </div>
    </div>
  </div>
</div>
</body>
</html>
