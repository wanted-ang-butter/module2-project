<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${post.title} + ' | Q&A | Nae-Il'">Q&A 상세 | Nae-Il</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .dropdown-menu { display:none; position:absolute; right:0; top:100%; margin-top:.5rem; z-index:50; }
    .dropdown-menu.open { display:block; }
  </style>
</head>
<body class="bg-white">
<th:block th:if="${user == null or user.role == null}">
  <div th:replace="~{fragments/guestHeader :: guestHeader}"></div>
</th:block>

<th:block th:if="${user != null and user.role != null and (user.role.name() == 'USER' or user.role.name() == 'SUBSCRIBER')}">
  <div th:replace="~{fragments/userHeader :: userHeader}"></div>
</th:block>
<th:block th:if="${user != null and user.role != null and user.role.name() == 'INSTRUCTOR'}">
  <div th:replace="~{fragments/instructorHeader :: instructorHeader}"></div>
</th:block>

<th:block th:if="${user != null and user.role != null and user.role.name() == 'ADMIN'}">
  <div th:replace="~{fragments/adminHeader :: adminHeader}"></div>
</th:block>

<div class="max-w-7xl mx-auto px-6 py-12">

  <a th:href="@{/community/qna}"
     class="inline-flex items-center gap-2 text-gray-600 hover:text-blue-600 transition-colors mb-6 font-medium">
    <i class="fa-solid fa-chevron-left text-xs"></i>
    <span class="text-sm">목록으로 돌아가기</span>
  </a>

  <div class="grid grid-cols-12 gap-8">

    <div class="col-span-3">
      <div class="bg-white border-2 border-gray-200 rounded-2xl p-6 sticky top-24">
        <h2 class="text-xl font-black text-gray-900 mb-6">커뮤니티</h2>
        <nav class="space-y-2">
          <a th:href="@{/community/qna}"
             class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all bg-blue-50 text-blue-600 font-bold">
            <i class="fa-solid fa-comment text-sm"></i>
            <span class="text-sm">Q&A</span>
          </a>
          <a th:href="@{/community/free}"
             class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-gray-700 hover:bg-gray-50 font-medium">
            <i class="fa-solid fa-file-lines text-sm"></i>
            <span class="text-sm">자유게시판</span>
          </a>
        </nav>
      </div>
    </div>

    <div class="col-span-9 space-y-6">

      <!-- 게시글 본문 -->
      <div class="bg-white border-2 border-gray-200 rounded-2xl p-8">
        <div class="flex items-center justify-between mb-6">
          <div>
            <p class="font-bold text-gray-900" th:text="${post.nickname}">작성자</p>
            <p class="text-sm text-gray-500 font-mono"
               th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}">날짜</p>
          </div>
          <div class="relative" th:if="${isOwner or isAdmin}">
            <button onclick="this.nextElementSibling.classList.toggle('open')"
                    class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
              <i class="fa-solid fa-ellipsis-vertical text-gray-600"></i>
            </button>
            <div class="dropdown-menu w-48 bg-white border-2 border-gray-200 rounded-xl shadow-lg">
              <a th:if="${isOwner}"
                 th:href="@{/community/qna/{postId}/form(postId=${post.postId})}"
                 class="flex items-center gap-2 px-4 py-3 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
                <i class="fa-solid fa-pen text-xs"></i> 수정
              </a>
              <form th:action="@{/community/qna/{postId}/delete(postId=${post.postId})}"
                    method="post" onsubmit="return confirm('게시글을 삭제하시겠습니까?')">
                <button type="submit"
                        class="w-full px-4 py-3 text-left text-sm font-medium text-red-600 hover:bg-red-50 transition-colors flex items-center gap-2"
                        th:classappend="${isOwner} ? 'rounded-b-xl' : 'rounded-xl'">
                  <i class="fa-solid fa-trash text-xs"></i> 삭제
                </button>
              </form>
            </div>
          </div>
        </div>

        <!-- 강의 배지 -->
        <div th:if="${post.courseTitle != null}" class="mb-3">
          <span class="inline-flex items-center gap-1.5 px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-sm font-bold border border-blue-200">
            <i class="fa-solid fa-book-open text-xs"></i>
            <span th:text="${post.courseTitle}">강의명</span>
          </span>
        </div>

        <h1 class="text-3xl font-black text-gray-900 mb-6 flex items-center gap-3">
          <span th:text="${post.title}">제목</span>
          <span th:if="${!post.isPublic}"
                class="inline-flex items-center gap-1.5 px-3 py-1 bg-gray-100 text-gray-500 rounded-lg text-sm font-bold border border-gray-200">
    <i class="fa-solid fa-lock text-xs"></i>
    비공개
  </span>
        </h1>

        <div class="flex items-center gap-3 mb-6">
          <span th:class="${post.isResolved} ? 'px-3 py-1 rounded-full text-sm font-bold bg-green-100 text-green-700' : 'px-3 py-1 rounded-full text-sm font-bold bg-gray-100 text-gray-600'"
                th:text="${post.isResolved} ? '해결됨' : '미해결'">미해결</span>
          <form th:if="${isOwner}" th:action="@{/community/qna/{postId}/resolve(postId=${post.postId})}" method="post">
            <button type="submit"
                    th:class="${post.isResolved} ? 'px-4 py-2 rounded-lg border-2 font-bold text-sm border-gray-300 text-gray-600 hover:bg-gray-50' : 'px-4 py-2 rounded-lg border-2 font-bold text-sm border-green-500 text-green-600 hover:bg-green-50'"
                    th:text="${post.isResolved} ? '미해결로 변경' : '해결됨으로 표시'">
              해결됨으로 표시
            </button>
          </form>
        </div>

        <div class="bg-gray-100 rounded-2xl p-6 mb-6">
          <p class="text-gray-700 leading-relaxed whitespace-pre-wrap" th:text="${post.content}">내용</p>
        </div>

        <div class="flex items-center gap-3 pt-6 border-t-2 border-gray-200">
          <!-- 좋아요 등록 -->
          <form th:if="${!post.isLiked}" th:action="@{/likes}" method="post">
            <input type="hidden" name="targetType" value="POST">
            <input type="hidden" name="targetId" th:value="${post.postId}">
            <button type="submit"
                    class="inline-flex items-center gap-2 px-6 py-3 rounded-xl font-bold border-2 border-gray-300 text-gray-700 hover:border-red-500 hover:text-red-500">
              <i class="fa-regular fa-heart text-lg"></i>
              <span th:text="${post.likeCount}">0</span>
            </button>
          </form>
          <!-- 좋아요 취소 -->
          <form th:if="${post.isLiked}"
                th:action="@{/likes/{likeId}/delete(likeId=${post.likeId})}" method="post"
                onsubmit="return confirm('좋아요를 취소하시겠습니까?')">
            <button type="submit"
                    class="inline-flex items-center gap-2 px-6 py-3 rounded-xl font-bold bg-gradient-to-r from-red-500 to-pink-500 text-white shadow-lg">
              <i class="fa-solid fa-heart text-lg"></i>
              <span th:text="${post.likeCount}">0</span>
            </button>
          </form>
        </div>
      </div>

      <!-- 답변 목록 -->
      <div class="bg-white border-2 border-gray-200 rounded-2xl p-8">
        <h2 class="text-2xl font-black text-gray-900 mb-6">
          답변 <span class="text-blue-600">(<span th:text="${#lists.size(post.comments)}">0</span>)</span>
        </h2>
        <div class="space-y-6">
          <div th:if="${#lists.isEmpty(post.comments)}"
               class="text-center py-8 text-gray-400 font-medium">
            아직 답변이 없습니다
          </div>

          <div th:each="comment : ${post.comments}"
               th:id="'comment-' + ${comment.commentId}"
               class="bg-gray-50 rounded-2xl p-6 border-2 border-gray-200 relative">
            <div class="flex items-start justify-between mb-4">
              <div>
                <p class="font-bold text-gray-900" th:text="${comment.nickname}">작성자</p>
                <p class="text-sm text-gray-500 font-mono"
                   th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd')}">날짜</p>
              </div>
              <div class="relative" th:if="${(loginUser != null and comment.nickname == loginUser.nickname) or isAdmin}">
                <button onclick="this.nextElementSibling.classList.toggle('open')"
                        class="p-2 hover:bg-gray-200 rounded-lg transition-colors">
                  <i class="fa-solid fa-ellipsis-vertical text-gray-600"></i>
                </button>
                <div class="dropdown-menu w-48 bg-white border-2 border-gray-200 rounded-xl shadow-lg">
                  <!-- 수정 (본인만) -->
                  <button th:if="${loginUser != null and comment.nickname == loginUser.nickname}"
                          th:data-id="${comment.commentId}"
                          th:data-content="${comment.content}"
                          onclick="startEdit(this.dataset.id, this.dataset.content)"
                          class="w-full flex items-center gap-2 px-4 py-3 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
                    <i class="fa-solid fa-pen text-xs"></i> 수정
                  </button>
                  <!-- 삭제 -->
                  <form th:action="@{/community/{category}/{postId}/comments/{commentId}/delete(category=${category}, postId=${post.postId}, commentId=${comment.commentId})}"
                        method="post" onsubmit="return confirm('답변을 삭제하시겠습니까?')">
                    <button type="submit"
                            class="w-full px-4 py-3 text-left text-sm font-medium text-red-600 hover:bg-red-50 flex items-center gap-2 rounded-b-xl">
                      <i class="fa-solid fa-trash text-xs"></i> 삭제
                    </button>
                  </form>
                </div>
              </div>
            </div>

            <!-- 보기 모드 -->
            <p th:id="'comment-text-' + ${comment.commentId}"
               class="text-gray-700 leading-relaxed"
               th:text="${comment.content}">답변 내용</p>

            <!-- 수정 폼 (기본 숨김) -->
            <form th:id="'comment-edit-' + ${comment.commentId}"
                  th:action="@{/community/{category}/{postId}/comments/{commentId}/update(category=${category}, postId=${post.postId}, commentId=${comment.commentId})}"
                  method="post" style="display:none" class="mt-3">
              <textarea th:id="'comment-textarea-' + ${comment.commentId}"
                        name="content" required
                        class="w-full px-4 py-3 border-2 border-blue-400 rounded-xl focus:border-blue-600 focus:outline-none resize-none h-24 font-medium"></textarea>
              <div class="flex gap-2 mt-2">
                <button type="submit"
                        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-all font-bold text-sm">
                  <i class="fa-solid fa-check mr-1"></i>저장
                </button>
                <button type="button"
                        th:data-id="${comment.commentId}"
                        onclick="cancelEdit(this.dataset.id)"
                        class="px-4 py-2 border-2 border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-all font-bold text-sm">
                  <i class="fa-solid fa-x mr-1"></i>취소
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <!-- 답변 작성 -->
      <div class="bg-white border-2 border-gray-200 rounded-2xl p-6">
        <h3 class="text-lg font-bold text-gray-900 mb-4">답변 작성</h3>
        <form th:action="@{/community/qna/{postId}/comments(postId=${post.postId})}" method="post">
          <textarea name="content" required placeholder="답변을 입력하세요"
                    class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-600 focus:outline-none transition-colors resize-none h-32 font-medium"></textarea>
          <button type="submit"
                  class="mt-4 px-6 py-3 bg-gradient-to-r from-blue-600 to-green-600 text-white rounded-xl hover:shadow-lg transition-all font-bold">
            답변 등록
          </button>
        </form>
      </div>

    </div>
  </div>
</div>

<script>
  document.addEventListener('click', function(e) {
    document.querySelectorAll('.dropdown-menu').forEach(m => {
      if (!m.previousElementSibling?.contains(e.target) && !m.contains(e.target))
        m.classList.remove('open');
    });
  });

  function startEdit(id, content) {
    document.getElementById('comment-text-' + id).style.display = 'none';
    document.getElementById('comment-edit-' + id).style.display = 'block';
    document.getElementById('comment-textarea-' + id).value = content;
    document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
  }

  function cancelEdit(id) {
    document.getElementById('comment-text-' + id).style.display = 'block';
    document.getElementById('comment-edit-' + id).style.display = 'none';
  }
</script>
</body>
</html>
