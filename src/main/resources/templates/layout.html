<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내일 Nae-il</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.css">
</head>
<body class="min-h-screen bg-white">

<!-- Header -->
<header class="border-b border-gray-200 bg-white/80 backdrop-blur-sm sticky top-0 z-50 shadow-sm">
  <div class="max-w-7xl mx-auto px-6 py-4">
    <div class="flex items-center justify-between">

      <!-- 로고 -->
      <a th:href="@{/dashboard}" href="/dashboard" class="flex items-center gap-3 group">
        <div class="relative">
          <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-green-600 rounded-xl flex items-center justify-center shadow-lg group-hover:shadow-xl transition-shadow">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
              <polyline points="17 6 23 6 23 12"></polyline>
            </svg>
          </div>
        </div>
        <div>
          <h1 class="text-xl font-bold text-gray-900 tracking-tight flex items-center gap-1">
            내일 <span class="text-gray-500 font-normal">Nae-il</span>
          </h1>
          <p class="text-[10px] font-semibold text-gray-500 tracking-wide">내일의 일, My Work</p>
        </div>
      </a>

      <!-- 네비게이션 (학생/구독자용) -->
      <nav class="flex items-center gap-1 flex-nowrap" id="nav-student">
        <a th:href="@{/dashboard/courses}" href="/dashboard/courses"
           class="flex items-center gap-1.5 rounded-lg transition-all text-gray-600 hover:bg-gray-50 px-2.5 py-2 whitespace-nowrap">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
          </svg>
          <span class="text-xs font-medium">전체 강의</span>
        </a>
        <a th:href="@{/dashboard/live-booking}" href="/dashboard/live-booking"
           class="flex items-center gap-1.5 rounded-lg transition-all text-gray-600 hover:bg-gray-50 px-2.5 py-2 whitespace-nowrap">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          <span class="text-xs font-medium">실시간 강의</span>
        </a>
        <a th:href="@{/dashboard/my-courses}" href="/dashboard/my-courses"
           class="flex items-center gap-1.5 rounded-lg transition-all text-gray-600 hover:bg-gray-50 px-2.5 py-2 whitespace-nowrap">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 10l4.553-2.069A1 1 0 0 1 21 8.82v6.36a1 1 0 0 1-1.447.894L15 14"></path>
            <rect x="1" y="6" width="15" height="12" rx="2" ry="2"></rect>
          </svg>
          <span class="text-xs font-medium">내 강의</span>
        </a>
        <a th:href="@{/dashboard/community/qna}" href="/dashboard/community/qna"
           class="flex items-center gap-1.5 rounded-lg transition-all text-gray-600 hover:bg-gray-50 px-2.5 py-2 whitespace-nowrap">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
          <span class="text-xs font-medium">커뮤니티</span>
        </a>
        <a th:href="@{/dashboard/cart}" href="/dashboard/cart"
           class="flex items-center gap-1.5 rounded-lg transition-all text-gray-600 hover:bg-gray-50 px-2.5 py-2 whitespace-nowrap">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          <span class="text-xs font-medium">장바구니</span>
        </a>
        <a th:href="@{/dashboard/credits}" href="/dashboard/credits"
           class="flex items-center gap-1.5 rounded-lg transition-all text-gray-600 hover:bg-gray-50 px-2.5 py-2 whitespace-nowrap">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="5" width="20" height="14" rx="2"></rect>
            <line x1="2" y1="10" x2="22" y2="10"></line>
          </svg>
          <span class="text-xs font-medium">크레딧</span>
        </a>
      </nav>

      <!-- 우측 버튼들 -->
      <div class="flex items-center gap-4">

        <!-- 로그아웃 -->
        <a th:href="@{/logout}" href="/logout"
           class="flex items-center gap-2 px-4 py-2 rounded-xl hover:bg-red-50 transition-all group">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-600 group-hover:text-red-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          <span class="font-medium text-gray-700 group-hover:text-red-600 text-[14px]">로그아웃</span>
        </a>

        <!-- 유저 정보 -->
        <div class="text-right">
          <p class="text-sm font-medium text-gray-900" th:text="${user.nickname}">개발자님</p>
          <p class="text-xs font-mono text-gray-500" th:text="${user.email}">dev@naeil.io</p>
        </div>

        <!-- 공지사항 버튼 -->
        <div class="relative">
          <a th:href="@{/notice}" href="/notice"
             class="w-10 h-10 rounded-lg bg-gradient-to-br from-orange-500 to-red-500 flex items-center justify-center shadow-md hover:shadow-lg transition-shadow cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 11l19-9-9 19-2-8-8-2z"></path>
            </svg>
          </a>
        </div>

        <!-- 프로필 드롭다운 -->
        <div class="relative" id="profileDropdown">
          <button onclick="toggleDropdown()"
                  class="w-10 h-10 rounded-lg bg-gradient-to-br from-blue-500 to-green-500 flex items-center justify-center shadow-md hover:shadow-lg transition-shadow cursor-pointer">
            <span class="text-white font-mono text-xs font-bold">{ }</span>
          </button>

          <!-- 드롭다운 메뉴 -->
          <div id="dropdownMenu"
               class="hidden absolute right-0 mt-2 w-56 bg-white border-2 border-gray-200 rounded-xl shadow-xl z-50">
            <div class="py-2">
              <a th:href="@{/dashboard/my-courses}" href="/dashboard/my-courses"
                 class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M15 10l4.553-2.069A1 1 0 0 1 21 8.82v6.36a1 1 0 0 1-1.447.894L15 14"></path>
                  <rect x="1" y="6" width="15" height="12" rx="2" ry="2"></rect>
                </svg>
                <span class="text-sm font-medium text-gray-900">내 강의</span>
              </a>
              <a th:href="@{/dashboard/account-settings}" href="/dashboard/account-settings"
                 class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="3"></circle>
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
                <span class="text-sm font-medium text-gray-900">계정 설정</span>
              </a>
              <a th:href="@{/subscriber/mySubscriber}" href="/subscriber/mySubscriber"
                 class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span class="text-sm font-medium text-gray-900">나의 구독</span>
              </a>
              <a th:href="@{/dashboard/instructor-application-history}" href="/dashboard/instructor-application-history"
                 class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                  <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
                <span class="text-sm font-medium text-gray-900">강사 신청</span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- Main Content -->
<main class="min-h-[calc(100vh-73px)]">
  <!-- 각 페이지 내용이 여기 들어와요 -->
  <th:block th:replace="${content}"></th:block>
</main>

<!-- Footer -->
<footer class="border-t border-gray-200 bg-gray-50 mt-20">
  <div class="max-w-7xl mx-auto px-6 py-8">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
          <polyline points="17 6 23 6 23 12"></polyline>
        </svg>
        <span class="text-sm text-gray-500 font-semibold">© 2026 Nae-Il. 코딩으로 만드는 내일</span>
      </div>
      <div class="flex gap-6 text-sm text-gray-600">
        <a href="#" class="hover:text-blue-600 transition-colors font-medium">이용약관</a>
        <a href="#" class="hover:text-blue-600 transition-colors font-medium">개인정보처리방침</a>
        <a href="#" class="hover:text-blue-600 transition-colors font-medium">고객센터</a>
      </div>
    </div>
  </div>
</footer>

<script>
  function toggleDropdown() {
    const menu = document.getElementById('dropdownMenu');
    menu.classList.toggle('hidden');
  }

  // 외부 클릭 시 드롭다운 닫기
  document.addEventListener('click', function(event) {
    const dropdown = document.getElementById('profileDropdown');
    if (!dropdown.contains(event.target)) {
      document.getElementById('dropdownMenu').classList.add('hidden');
    }
  });
</script>

</body>
</html>
