<header th:fragment="adminHeader"
        class="border-b border-gray-200 bg-white/80 backdrop-blur-sm sticky top-0 z-50 shadow-sm">

    <div class="max-w-7xl mx-auto px-6 py-4">
        <div class="flex items-center justify-between gap-6">

            <!-- Left -->
            <a th:href="@{/dashboard/admin}" href="/dashboard/admin" class="flex items-center gap-3 group shrink-0">
                <div class="w-11 h-11 bg-gradient-to-br from-purple-600 to-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-terminal text-white text-sm"></i>
                </div>
                <div class="leading-tight">
                    <div class="flex items-center gap-2">
                        <h1 class="text-xl font-black text-gray-900 tracking-tight">
                            내일 <span class="text-gray-500 font-medium">Nae-il</span>
                        </h1>
                        <span class="px-2.5 py-1 rounded-lg bg-red-50 text-red-600 border border-red-200 text-[11px] font-black tracking-wide">
                            ADMIN
                        </span>
                    </div>
                    <p class="text-[11px] font-semibold text-gray-500 tracking-wide">관리자 패널</p>
                </div>
            </a>

            <!-- Center -->
            <nav class="hidden lg:flex items-center gap-2 flex-1 justify-center">

                <a th:href="@{/community/qna}" href="/community/qna"
                   class="flex items-center gap-2 px-4 py-2 border-2 border-gray-200 rounded-xl text-gray-700 hover:border-blue-600 hover:bg-blue-50 hover:text-blue-600 transition-all font-semibold text-sm">
                    <i class="fa-solid fa-comment text-sm"></i>
                    <span>커뮤니티</span>
                </a>

                <div class="relative" id="adminMenuWrapper">
                    <button type="button" onclick="toggleAdminMenu()"
                            class="flex items-center gap-2 px-4 py-2 border-2 border-gray-200 rounded-xl text-gray-700 hover:border-blue-600 hover:bg-blue-50 hover:text-blue-600 transition-all font-semibold text-sm">
                        <i class="fa-solid fa-shield text-sm"></i>
                        <span>관리</span>
                        <i class="fa-solid fa-chevron-down text-xs"></i>
                    </button>

                    <div id="adminMenu"
                         class="hidden absolute left-0 mt-2 w-64 bg-white border-2 border-gray-200 rounded-xl shadow-xl z-50 overflow-hidden">

                        <div class="py-2">

                            <!-- 회원 관리 -->
                            <div>
                                <button type="button" onclick="toggleMemberMenu()"
                                        class="w-full flex items-center justify-between px-4 py-3 hover:bg-gray-50">
                                    <div class="flex items-center gap-3">
                                        <i class="fa-solid fa-users text-gray-600"></i>
                                        <span class="text-sm font-bold text-gray-900">회원 관리</span>
                                    </div>
                                    <i class="fa-solid fa-chevron-down text-xs text-gray-500" id="memberChevron"></i>
                                </button>

                                <div id="memberSubMenu" class="hidden px-4 pb-2">

                                    <!-- 🔥 수정됨 -->
                                    <a th:href="@{/admin/user-management}" href="/admin/user-management"
                                       class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">
                                        회원 조회
                                    </a>

                                    <!-- 🔥 수정됨 -->
                                    <a th:href="@{/admin/instructor-approval}" href="/admin/instructor-approval"
                                       class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">
                                        강사 승인
                                    </a>

                                    <a th:href="@{/admin/blacklist}" href="/admin/blacklist"
                                       class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">
                                        블랙리스트 관리
                                    </a>
                                </div>
                            </div>

                            <div class="border-t border-gray-100"></div>

                            <!-- 코스 관리 -->
                            <div>
                                <button type="button" onclick="toggleCourseMenu()"
                                        class="w-full flex items-center justify-between px-4 py-3 hover:bg-gray-50">
                                    <div class="flex items-center gap-3">
                                        <i class="fa-solid fa-book-open text-gray-600"></i>
                                        <span class="text-sm font-bold text-gray-900">코스 관리</span>
                                    </div>
                                    <i class="fa-solid fa-chevron-down text-xs text-gray-500" id="courseChevron"></i>
                                </button>

                                <div id="courseSubMenu" class="hidden px-4 pb-2">
                                    <a th:href="@{/admin/course-management/approval}" href="/admin/course-management/approval"
                                       class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">
                                        코스 승인 관리
                                    </a>
                                    <a th:href="@{/admin/live-management}" href="/admin/live-management"
                                       class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">
                                        실시간 강의 승인 관리
                                    </a>
                                    <a th:href="@{/admin/category-management}" href="/admin/category-management"
                                       class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">
                                        카테고리 관리
                                    </a>
                                </div>
                            </div>

                            <div class="border-t border-gray-100"></div>

                            <a th:href="@{/admin/settlement}" href="/admin/settlement"
                               class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50">
                                <i class="fa-solid fa-wallet text-gray-600"></i>
                                <span class="text-sm font-bold text-gray-900">정산 관리</span>
                            </a>

                        </div>
                    </div>
                </div>
            </nav>

            <!-- Right -->
            <div class="flex items-center gap-3">
                <a th:href="@{/auth/logout}" href="/auth/logout"
                   class="flex items-center gap-2 px-4 py-2 rounded-xl hover:bg-red-50">
                    <i class="fa-solid fa-right-from-bracket text-gray-600"></i>
                    <span class="text-sm font-semibold text-gray-700">로그아웃</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        function toggleAdminMenu() {
            document.getElementById('adminMenu').classList.toggle('hidden');
        }
        function toggleMemberMenu() {
            document.getElementById('memberSubMenu').classList.toggle('hidden');
            document.getElementById('memberChevron').classList.toggle('rotate-180');
        }
        function toggleCourseMenu() {
            document.getElementById('courseSubMenu').classList.toggle('hidden');
        }
        document.addEventListener('click', function(e) {
            const wrapper = document.getElementById('adminMenuWrapper');
            if (wrapper && !wrapper.contains(e.target)) {
                document.getElementById('adminMenu').classList.add('hidden');
            }
        });
    </script>
</header>
