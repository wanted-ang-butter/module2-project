<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<header th:fragment="userHeader" class="border-b border-gray-200 bg-white/80 backdrop-blur-sm sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-4">
        <div class="flex items-center justify-between">

            <!-- Logo -->
            <a th:href="@{/dashboard/user}" class="flex items-center gap-3 group">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-green-600 rounded-xl flex items-center justify-center shadow-lg group-hover:shadow-xl transition-shadow">
                    <i class="fa-solid fa-terminal text-white text-sm"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-gray-900 tracking-tight">내일 <span class="text-gray-500 font-normal">Nae-il</span></h1>
                    <p class="text-[10px] font-semibold text-gray-500 tracking-wide">내일의 일, My Work</p>
                </div>
            </a>

            <!-- Nav -->
            <nav class="flex items-center gap-1 flex-nowrap">
                <a th:href="@{/course}" class="flex items-center gap-1.5 px-2.5 py-2 rounded-lg text-gray-600 hover:bg-gray-50 transition-all whitespace-nowrap">
                    <i class="fa-solid fa-book-open w-4 h-4"></i><span class="text-xs font-medium">전체 강의</span>
                </a>
                <a th:href="@{/live-lecture}" class="flex items-center gap-1.5 px-2.5 py-2 rounded-lg text-gray-600 hover:bg-gray-50 transition-all whitespace-nowrap">
                    <i class="fa-solid fa-calendar w-4 h-4"></i><span class="text-xs font-medium">실시간 강의</span>
                </a>
                <a th:href="@{/my-courses}" class="flex items-center gap-1.5 px-2.5 py-2 rounded-lg text-gray-600 hover:bg-gray-50 transition-all whitespace-nowrap">
                    <i class="fa-solid fa-video w-4 h-4"></i><span class="text-xs font-medium">내 강의</span>
                </a>
                <a th:href="@{/community/qna}" class="flex items-center gap-1.5 px-2.5 py-2 rounded-lg text-gray-600 hover:bg-gray-50 transition-all whitespace-nowrap">
                    <i class="fa-solid fa-comment w-4 h-4"></i><span class="text-xs font-medium">커뮤니티</span>
                </a>
                <a th:href="@{/cart}" class="flex items-center gap-1.5 px-2.5 py-2 rounded-lg text-gray-600 hover:bg-gray-50 transition-all whitespace-nowrap">
                    <i class="fa-solid fa-cart-shopping w-4 h-4"></i><span class="text-xs font-medium">장바구니</span>
                </a>
                <a th:href="@{/credit/charge}" href="/credit/charge"
                   class="flex items-center gap-1.5 px-2.5 py-2 rounded-lg text-gray-600 hover:bg-gray-50 transition-all whitespace-nowrap">
                    <i class="fa-solid fa-wallet w-4 h-4"></i>
                    <span class="text-xs font-medium">크레딧</span>
                </a>
            </nav>

            <!-- Right -->
            <div class="flex items-center gap-4">

                <!-- 로그아웃 -->
                <a th:href="@{/auth/logout}" class="flex items-center gap-2 px-4 py-2 rounded-xl hover:bg-red-50 transition-all group">
                    <i class="fa-solid fa-right-from-bracket text-gray-600 group-hover:text-red-600 text-sm"></i>
                    <span class="font-medium text-gray-700 group-hover:text-red-600 text-sm">로그아웃</span>
                </a>

                <!-- 사용자 정보 -->
                <div class="text-right" th:if="${user}">
                    <p class="text-sm font-medium text-gray-900" th:text="${user.nickname}">사용자</p>
                    <p class="text-xs font-mono text-gray-500" th:text="${user.role}">ROLE</p>
                </div>

                <!-- 공지 드롭다운 -->
                <div class="relative" id="noticeDropdownWrapper">
                    <button onclick="toggleNoticeDropdown()" class="w-10 h-10 rounded-lg bg-gradient-to-br from-orange-500 to-red-500 flex items-center justify-center shadow-md hover:shadow-lg transition-shadow cursor-pointer">
                        <i class="fa-solid fa-bullhorn text-white text-sm"></i>
                    </button>
                    <div id="noticeDropdown" class="notice-dropdown hidden absolute right-0 mt-2 w-48 bg-white border-2 border-gray-200 rounded-xl shadow-xl z-50">
                        <div class="py-2">
                            <a th:href="@{/notice}" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors">
                                <i class="fa-solid fa-bullhorn text-gray-600"></i>
                                <span class="text-sm font-medium text-gray-900">공지사항</span>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- 프로필 드롭다운 -->
                <div class="relative" id="profileDropdownWrapper">
                    <button onclick="toggleProfileDropdown()" class="w-10 h-10 rounded-lg bg-gradient-to-br from-blue-500 to-green-500 flex items-center justify-center shadow-md hover:shadow-lg transition-shadow cursor-pointer">
                        <span class="text-white font-mono text-xs font-bold">{ }</span>
                    </button>
                    <div id="profileDropdown" class="profile-dropdown hidden absolute right-0 mt-2 w-56 bg-white border-2 border-gray-200 rounded-xl shadow-xl z-50">
                        <div class="py-2">
                            <a th:href="@{/my-courses}" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors">
                                <i class="fa-solid fa-video text-gray-600"></i>
                                <span class="text-sm font-medium text-gray-900">내 강의</span>
                            </a>
                            <a th:href="@{/user/me}" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors">
                                <i class="fa-solid fa-gear text-gray-600"></i>
                                <span class="text-sm font-medium text-gray-900">계정 설정</span>
                            </a>
                            <a th:href="@{/payment/history}" href="/payment/history"
                               class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors">
                                <i class="fa-solid fa-user text-gray-600"></i>
                                <span class="text-sm font-medium text-gray-900">결제 내역</span>
                            </a>
                            <a th:href="@{/user/me/instructor-application/history}" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors">
                                <i class="fa-solid fa-chalkboard-user text-gray-600"></i>
                                <span class="text-sm font-medium text-gray-900">강사 신청</span>
                            </a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script>
        function toggleNoticeDropdown() {
            document.getElementById('noticeDropdown').classList.toggle('hidden');
            document.getElementById('profileDropdown').classList.add('hidden');
        }
        function toggleProfileDropdown() {
            document.getElementById('profileDropdown').classList.toggle('hidden');
            document.getElementById('noticeDropdown').classList.add('hidden');
        }
        document.addEventListener('click', function(e) {
            const noticeWrapper = document.getElementById('noticeDropdownWrapper');
            const profileWrapper = document.getElementById('profileDropdownWrapper');
            if (noticeWrapper && !noticeWrapper.contains(e.target)) {
                document.getElementById('noticeDropdown').classList.add('hidden');
            }
            if (profileWrapper && !profileWrapper.contains(e.target)) {
                document.getElementById('profileDropdown').classList.add('hidden');
            }
        });

    </script>
</header>

</body>
</html>
