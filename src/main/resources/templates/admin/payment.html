<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>결제</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">

<div class="max-w-5xl mx-auto px-6 py-12">

  <!-- 뒤로가기 -->
  <a href="cart.html" class="text-gray-600 mb-6 inline-block">← 이전으로</a>

  <h1 class="text-4xl font-black mb-6">결제하기</h1>

  <!-- 주문 목록 -->
  <div id="courseList" class="space-y-4 mb-10"></div>

  <!-- 결제 정보 -->
  <div class="bg-white p-6 rounded-xl border mb-6">
    <p>총 강의: <span id="count"></span></p>
    <p>총 금액: <span id="total"></span></p>
    <p>잔액: <span id="balance"></span></p>
  </div>

  <!-- 버튼 -->
  <button onclick="pay()" id="payBtn"
          class="px-6 py-3 bg-blue-600 text-white rounded">
    결제하기
  </button>

</div>

<script>
  /*
    URL 예시:
    payment.html?courses=1,2
  */
  const params = new URLSearchParams(location.search);
  const ids = params.get("courses")?.split(",") || [];

  // mock 데이터 (React꺼 대체)
  const courses = [
    { id: "1", title: "React 강의", instructor: "홍길동", price: 30000 },
    { id: "2", title: "Spring 강의", instructor: "김개발", price: 40000 },
    { id: "3", title: "Node 강의", instructor: "이백엔드", price: 20000 }
  ];

  const selected = courses.filter(c => ids.includes(c.id));

  const balance = 120000;

  function render() {
    const list = document.getElementById("courseList");

    if (selected.length === 0) {
      list.innerHTML = "<p>결제할 강의 없음</p>";
      return;
    }

    let html = "";
    let total = 0;

    selected.forEach(c => {
      total += c.price;

      html += `
      <div class="bg-white p-4 border rounded flex justify-between">
        <div>
          <p class="font-bold">${c.title}</p>
          <p class="text-sm text-gray-500">${c.instructor}</p>
        </div>
        <p class="text-blue-600 font-bold">${c.price}</p>
      </div>
    `;
    });

    list.innerHTML = html;

    document.getElementById("count").innerText = selected.length;
    document.getElementById("total").innerText = total;
    document.getElementById("balance").innerText = balance - total;

    if (total > balance) {
      document.getElementById("payBtn").innerText = "잔액 부족";
      document.getElementById("payBtn").disabled = true;
      document.getElementById("payBtn").classList.add("bg-gray-400");
    }
  }

  function pay() {
    alert("결제 완료!");
    location.href = "my-courses.html";
  }

  render();
</script>

</body>
</html>
