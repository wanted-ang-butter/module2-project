<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>카테고리 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Header -->
<header class="border-b border-gray-200 bg-white/80 backdrop-blur-sm sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-4">
        <div class="flex items-center justify-between">

            <!-- Logo -->
            <a href="/admin/dashboard" class="flex items-center gap-3 group">
                <div class="w-10 h-10 bg-gradient-to-br from-purple-600 to-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-terminal text-white text-sm"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-gray-900 tracking-tight">
                        내일 <span class="text-gray-500 font-normal">Nae-il</span>
                    </h1>
                    <p class="text-[10px] font-semibold text-gray-500 tracking-wide">관리자 패널</p>
                </div>
            </a>

            <!-- Nav -->
            <nav class="flex items-center gap-2">
                <a href="/community/qna"
                   class="flex items-center gap-2 px-4 py-2 border-2 border-gray-200 rounded-xl text-gray-700 hover:border-blue-600 hover:bg-blue-50 hover:text-blue-600 transition-all font-medium text-sm">
                    <i class="fa-solid fa-comment text-sm"></i>
                    <span>커뮤니티</span>
                </a>

                <div class="relative" id="adminMenuWrapper">
                    <button onclick="toggleAdminMenu()"
                            class="flex items-center gap-2 px-4 py-2 border-2 border-gray-200 rounded-xl text-gray-700 hover:border-blue-600 hover:bg-blue-50 hover:text-blue-600 transition-all font-medium text-sm">
                        <i class="fa-solid fa-shield text-sm"></i>
                        <span>관리</span>
                        <i class="fa-solid fa-chevron-down text-xs"></i>
                    </button>

                    <div id="adminMenu" class="hidden absolute left-0 mt-2 w-64 bg-white border-2 border-gray-200 rounded-xl shadow-xl z-50">
                        <div class="py-2">
                            <div>
                                <button onclick="toggleMemberMenu()"
                                        class="w-full flex items-center justify-between px-4 py-3 hover:bg-gray-50 transition-colors">
                                    <div class="flex items-center gap-3">
                                        <i class="fa-solid fa-users text-gray-600"></i>
                                        <span class="text-sm font-bold text-gray-900">회원 관리</span>
                                    </div>
                                    <i class="fa-solid fa-chevron-down text-xs text-gray-500" id="memberChevron"></i>
                                </button>
                                <div id="memberSubMenu" class="hidden px-4 pb-2">
                                    <a href="/admin/user-management" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">회원 조회</a>
                                    <a href="/admin/instructor-approval" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">강사 승인</a>
                                    <a href="/admin/blacklist" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">블랙리스트 관리</a>
                                </div>
                            </div>
                            <div class="border-t border-gray-100"></div>
                            <div>
                                <button onclick="toggleCourseMenu()"
                                        class="w-full flex items-center justify-between px-4 py-3 hover:bg-gray-50 transition-colors">
                                    <div class="flex items-center gap-3">
                                        <i class="fa-solid fa-book-open text-gray-600"></i>
                                        <span class="text-sm font-bold text-gray-900">코스 관리</span>
                                    </div>
                                    <i class="fa-solid fa-chevron-down text-xs text-gray-500" id="courseChevron"></i>
                                </button>
                                <div id="courseSubMenu" class="hidden px-4 pb-2">
                                    <a href="/admin/course-management/approval" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">코스 승인 관리</a>
                                    <a href="/admin/live-management" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">실시간 강의 승인 관리</a>
                                    <a href="/admin/category-management" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">카테고리 관리</a>
                                </div>
                            </div>
                            <div class="border-t border-gray-100"></div>
                            <a href="/admin/settlement" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors">
                                <i class="fa-solid fa-wallet text-gray-600"></i>
                                <span class="text-sm font-bold text-gray-900">정산 관리</span>
                            </a>
                            <a href="/community/qna" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors">
                                <i class="fa-solid fa-comment text-gray-600"></i>
                                <span class="text-sm font-bold text-gray-900">커뮤니티</span>
                            </a>
                        </div>
                    </div>
                </div>
            </nav>

            <!-- Logout -->
            <a href="/auth/logout"
               class="flex items-center gap-2 px-4 py-2 rounded-xl hover:bg-red-50 transition-all group">
                <i class="fa-solid fa-right-from-bracket text-gray-600 group-hover:text-red-600 text-sm"></i>
                <span class="font-medium text-gray-700 group-hover:text-red-600 text-sm">로그아웃</span>
            </a>
        </div>
    </div>
</header>

<!-- Layout -->
<div class="max-w-7xl mx-auto px-6 py-10 flex gap-8">

    <!-- Sidebar -->
    <aside class="w-56 shrink-0">
        <div class="bg-white border-2 border-gray-200 rounded-2xl p-4">
            <p class="text-sm font-black text-gray-900 px-3 py-2 mb-1">코스 관리</p>
            <nav class="space-y-1">
                <a href="/admin/course-management/approval"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
                    <i class="fa-solid fa-book-open text-gray-400 w-4"></i>
                    코스 승인 관리
                </a>
                <a href="/admin/live-management"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
                    <i class="fa-solid fa-video text-gray-400 w-4"></i>
                    실시간 강의 승인 관리
                </a>
                <a href="/admin/category-management"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-bold text-purple-700 bg-purple-50 transition-colors">
                    <i class="fa-solid fa-tags text-purple-500 w-4"></i>
                    카테고리 관리
                </a>
            </nav>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1">

        <!-- Page Header -->
        <h1 class="text-4xl font-black text-gray-900 mb-8">카테고리 관리</h1>

        <!-- Add Category -->
        <div class="bg-white border-2 border-gray-200 rounded-2xl p-6 mb-8">
            <h2 class="text-lg font-black text-gray-900 mb-4">카테고리 추가</h2>
            <div class="flex gap-3">
                <div class="flex-1">
                    <input
                        type="text"
                        id="new-category-input"
                        placeholder="카테고리명을 입력하세요"
                        class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none font-medium"
                        onkeypress="if(event.key==='Enter') handleAdd()"
                    />
                    <p id="duplicate-error" class="hidden text-red-600 text-sm mt-2 font-medium">
                        동일한 카테고리가 이미 존재합니다.
                    </p>
                </div>
                <button onclick="handleAdd()"
                        class="px-6 py-3 bg-gradient-to-r from-blue-600 to-green-600 text-white rounded-xl hover:shadow-lg transition-all font-bold flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i>
                    등록
                </button>
            </div>
        </div>

        <!-- Table -->
        <div class="bg-white border-2 border-gray-200 rounded-2xl overflow-hidden">
            <table class="w-full">
                <thead class="bg-gray-50 border-b-2 border-gray-200">
                    <tr>
                        <th class="px-6 py-4 text-left text-sm font-black text-gray-900">No</th>
                        <th class="px-6 py-4 text-left text-sm font-black text-gray-900">카테고리명</th>
                        <th class="px-6 py-4 text-left text-sm font-black text-gray-900">액션</th>
                    </tr>
                </thead>
                <tbody id="category-tbody" class="divide-y-2 divide-gray-100"></tbody>
            </table>

            <div id="empty-state" class="hidden text-center py-16">
                <p class="text-gray-500 text-sm">등록된 카테고리가 없습니다</p>
            </div>
        </div>
    </main>
</div>

<!-- Alert Modal -->
<div id="alert-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-8 max-w-sm w-full mx-4 border-2 border-gray-200 shadow-xl">
        <p id="alert-message" class="text-gray-900 font-semibold text-center mb-6"></p>
        <button onclick="closeAlert()"
                class="w-full px-4 py-2 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-colors">
            확인
        </button>
    </div>
</div>

<!-- Confirm Modal -->
<div id="confirm-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-8 max-w-sm w-full mx-4 border-2 border-gray-200 shadow-xl">
        <p id="confirm-message" class="text-gray-900 font-semibold text-center mb-6"></p>
        <div class="flex gap-3">
            <button onclick="closeConfirm()"
                    class="flex-1 px-4 py-2 border-2 border-gray-200 rounded-xl text-gray-700 font-bold hover:bg-gray-50 transition-colors">
                취소
            </button>
            <button id="confirm-ok-btn"
                    class="flex-1 px-4 py-2 bg-red-600 text-white rounded-xl font-bold hover:bg-red-700 transition-colors">
                삭제
            </button>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', loadCategories);

    function loadCategories() {
        fetch('/api/admin/categories')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('category-tbody');
                const emptyState = document.getElementById('empty-state');
                tbody.innerHTML = '';

                if (data.length === 0) {
                    emptyState.classList.remove('hidden');
                    return;
                }
                emptyState.classList.add('hidden');
                data.forEach((category, index) => {
                    tbody.appendChild(createRow(category, index));
                });
            })
            .catch(err => console.error('카테고리 조회 실패:', err));
    }

    function createRow(category, index) {
        const tr = document.createElement('tr');
        tr.id = `row-${category.id}`;
        tr.className = 'hover:bg-gray-50 transition-colors';
        tr.innerHTML = `
            <td class="px-6 py-4 text-sm font-medium text-gray-900">${index + 1}</td>
            <td class="px-6 py-4" id="name-cell-${category.id}">
                <span class="font-medium text-gray-900">${category.name}</span>
            </td>
            <td class="px-6 py-4">
                <div class="flex gap-2" id="action-cell-${category.id}">
                    <button onclick="handleStartEdit(${category.id}, '${category.name}')"
                            class="px-4 py-2 border-2 border-blue-300 text-blue-600 rounded-lg hover:bg-blue-50 transition-all font-bold text-sm">
                        <i class="fa-solid fa-pen-to-square mr-1"></i>수정
                    </button>
                    <button onclick="handleDelete(${category.id}, '${category.name}')"
                            class="px-4 py-2 border-2 border-red-300 text-red-600 rounded-lg hover:bg-red-50 transition-all font-bold text-sm">
                        <i class="fa-solid fa-trash mr-1"></i>삭제
                    </button>
                </div>
            </td>
        `;
        return tr;
    }

    function handleAdd() {
        const input = document.getElementById('new-category-input');
        const name = input.value.trim();
        const duplicateError = document.getElementById('duplicate-error');

        if (!name) {
            showAlert('카테고리명을 입력해주세요');
            return;
        }
        duplicateError.classList.add('hidden');

        fetch('/api/admin/categories', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name })
        })
        .then(res => {
            if (res.status === 400) {
                duplicateError.classList.remove('hidden');
                return;
            }
            if (!res.ok) throw new Error('추가 실패');
            input.value = '';
            showAlert(`"${name}" 카테고리가 등록되었습니다.`);
        })
        .catch(err => {
            showAlert('카테고리 추가 중 오류가 발생했습니다.');
            console.error(err);
        });
    }

    function handleStartEdit(id, currentName) {
        const nameCell = document.getElementById(`name-cell-${id}`);
        const actionCell = document.getElementById(`action-cell-${id}`);

        nameCell.innerHTML = `
            <div class="flex items-center gap-2">
                <input type="text" id="edit-input-${id}" value="${currentName}"
                       class="flex-1 px-3 py-2 border-2 border-blue-500 rounded-lg focus:outline-none font-medium"
                       onkeypress="if(event.key==='Enter') handleSaveEdit(${id})" />
                <button onclick="handleSaveEdit(${id})"
                        class="p-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-all">
                    <i class="fa-solid fa-check"></i>
                </button>
                <button onclick="loadCategories()"
                        class="p-2 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400 transition-all">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
        `;
        actionCell.innerHTML = '';
        document.getElementById(`edit-input-${id}`).focus();
    }

    function handleSaveEdit(id) {
        const input = document.getElementById(`edit-input-${id}`);
        const name = input.value.trim();

        if (!name) {
            showAlert('카테고리명을 입력해주세요');
            return;
        }

        fetch(`/api/admin/categories/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name })
        })
        .then(res => {
            if (!res.ok) throw new Error('수정 실패');
            showAlert('카테고리가 수정되었습니다.');
        })
        .catch(err => {
            showAlert('카테고리 수정 중 오류가 발생했습니다.');
            console.error(err);
        });
    }

    let confirmCallback = null;

    function handleDelete(id, name) {
        showConfirm(`"${name}" 카테고리를 삭제하시겠습니까?`, () => {
            fetch(`/api/admin/categories/${id}`, { method: 'DELETE' })
            .then(res => {
                if (res.status === 400) {
                    closeConfirm();
                    showAlert('해당 카테고리에 코스가 존재합니다');
                    return;
                }
                if (!res.ok) throw new Error('삭제 실패');
                closeConfirm();
                showAlert(`"${name}" 카테고리가 삭제되었습니다.`);
            })
            .catch(err => {
                closeConfirm();
                showAlert('카테고리 삭제 중 오류가 발생했습니다.');
                console.error(err);
            });
        });
    }

    function showAlert(message) {
        document.getElementById('alert-message').textContent = message;
        document.getElementById('alert-modal').classList.remove('hidden');
    }
    function closeAlert() {
        document.getElementById('alert-modal').classList.add('hidden');
        loadCategories();
    }

    function showConfirm(message, onConfirm) {
        document.getElementById('confirm-message').textContent = message;
        confirmCallback = onConfirm;
        document.getElementById('confirm-modal').classList.remove('hidden');
        document.getElementById('confirm-ok-btn').onclick = () => {
            if (confirmCallback) confirmCallback();
        };
    }
    function closeConfirm() {
        document.getElementById('confirm-modal').classList.add('hidden');
        confirmCallback = null;
    }

    function toggleAdminMenu() {
        document.getElementById('adminMenu').classList.toggle('hidden');
    }
    function toggleMemberMenu() {
        document.getElementById('memberSubMenu').classList.toggle('hidden');
    }
    function toggleCourseMenu() {
        document.getElementById('courseSubMenu').classList.toggle('hidden');
    }
    document.addEventListener('click', function(e) {
        if (!document.getElementById('adminMenuWrapper').contains(e.target)) {
            document.getElementById('adminMenu').classList.add('hidden');
        }
    });
</script>

</body>
</html>
