<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>실시간 강의 승인 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="bg-gray-50 min-h-screen">

<div th:replace="fragments/adminHeader :: adminHeader"></div>

<!-- Layout -->
<div class="max-w-7xl mx-auto px-6 py-10 flex gap-8">

    <!-- Sidebar -->
    <aside class="w-56 shrink-0">
        <div class="bg-white border-2 border-gray-200 rounded-2xl p-4">
            <p class="text-sm font-black text-gray-900 px-3 py-2 mb-1">코스 관리</p>
            <nav class="space-y-1">
                <a th:href="@{/admin/course-management/approval}"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-50">
                    <i class="fa-solid fa-book-open text-gray-400 w-4"></i>코스 승인 관리
                </a>
                <a th:href="@{/admin/live-management}"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-bold text-purple-700 bg-purple-50">
                    <i class="fa-solid fa-video text-purple-500 w-4"></i>실시간 강의 승인 관리
                </a>
                <a th:href="@{/admin/category-management}"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-50">
                    <i class="fa-solid fa-tags text-gray-400 w-4"></i>카테고리 관리
                </a>
            </nav>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1">
        <button onclick="history.back()" class="flex items-center gap-2 px-4 py-2 border-2 border-gray-200 rounded-xl text-gray-700 hover:bg-gray-100 font-medium text-sm mb-4"><i class="fa-solid fa-arrow-left text-sm"></i>뒤로가기</button>
        <h1 class="text-4xl font-black text-gray-900 mb-8">실시간 강의 승인 관리</h1>

        <!-- Stats -->
        <div class="grid grid-cols-3 gap-6 mb-8">
            <div class="bg-white border-2 border-yellow-200 rounded-2xl p-6">
                <p class="text-sm font-bold text-gray-600 mb-2">승인 대기</p>
                <p class="text-4xl font-black text-yellow-600" th:text="${pendingCount} + '개'">0개</p>
            </div>
            <div class="bg-white border-2 border-green-200 rounded-2xl p-6">
                <p class="text-sm font-bold text-gray-600 mb-2">승인 완료</p>
                <p class="text-4xl font-black text-green-600" th:text="${approvedCount} + '개'">0개</p>
            </div>
            <div class="bg-white border-2 border-red-200 rounded-2xl p-6">
                <p class="text-sm font-bold text-gray-600 mb-2">반려</p>
                <p class="text-4xl font-black text-red-600" th:text="${rejectedCount} + '개'">0개</p>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="flex gap-3 mb-6">
            <button onclick="filterRows('ALL')" id="tab-ALL"
                    class="px-4 py-2 rounded-full font-bold text-sm bg-blue-600 text-white shadow-md">전체</button>
            <button onclick="filterRows('PENDING')" id="tab-PENDING"
                    class="px-4 py-2 rounded-full font-bold text-sm bg-white border-2 border-gray-200 text-gray-700 hover:border-blue-300">승인 대기</button>
            <button onclick="filterRows('APPROVED')" id="tab-APPROVED"
                    class="px-4 py-2 rounded-full font-bold text-sm bg-white border-2 border-gray-200 text-gray-700 hover:border-blue-300">승인 완료</button>
            <button onclick="filterRows('REJECTED')" id="tab-REJECTED"
                    class="px-4 py-2 rounded-full font-bold text-sm bg-white border-2 border-gray-200 text-gray-700 hover:border-blue-300">반려</button>
        </div>

        <!-- Table -->
        <div class="bg-white border-2 border-gray-200 rounded-2xl overflow-hidden overflow-x-auto">
            <table class="w-full min-w-max">
                <thead class="bg-gray-50 border-b-2 border-gray-200">
                    <tr>
                        <th class="px-4 py-3 text-left text-sm font-black text-gray-900">강의명</th>
                        <th class="px-4 py-3 text-left text-sm font-black text-gray-900 whitespace-nowrap">강사명</th>
                        <th class="px-4 py-3 text-left text-sm font-black text-gray-900 whitespace-nowrap">예정 일시</th>
                        <th class="px-4 py-3 text-left text-sm font-black text-gray-900 whitespace-nowrap">신청일</th>
                        <th class="px-4 py-3 text-left text-sm font-black text-gray-900 whitespace-nowrap">상태</th>
                        <th class="px-4 py-3 text-left text-sm font-black text-gray-900 whitespace-nowrap">액션</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(approvals)}">
                        <td colspan="6" class="px-6 py-16 text-center text-gray-400">대기 중인 실시간 강의 신청이 없습니다</td>
                    </tr>
                    <tr th:each="approval : ${approvals}"
                        th:attr="data-status=${approval.status.name()}"
                        class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
                        <td class="px-4 py-3 font-medium text-gray-900 text-sm max-w-xs truncate" th:text="${approval.title ?: '-'}"></td>
                        <td class="px-4 py-3 text-gray-700 text-sm whitespace-nowrap" th:text="${approval.instuctorName ?: '-'}"></td>
                        <td class="px-4 py-3 text-gray-700 font-mono text-sm whitespace-nowrap"
                            th:text="${approval.startAt != null ? #temporals.format(approval.startAt, 'yyyy-MM-dd HH:mm') : '-'}"></td>
                        <td class="px-4 py-3 text-gray-600 font-mono text-sm whitespace-nowrap"
                            th:text="${approval.createdAt != null ? #temporals.format(approval.createdAt, 'yyyy-MM-dd') : '-'}"></td>
                        <td class="px-4 py-3 whitespace-nowrap">
                            <span th:classappend="${approval.status.name() == 'PENDING'} ? 'bg-yellow-100 text-yellow-700' : (${approval.status.name() == 'APPROVED'} ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700')"
                                  class="px-3 py-1 rounded-full text-sm font-bold"
                                  th:text="${approval.status.name() == 'PENDING'} ? '승인 대기' : (${approval.status.name() == 'APPROVED'} ? '승인 완료' : '반려')"></span>
                        </td>
                        <td class="px-4 py-3 whitespace-nowrap">
                            <div class="flex gap-1.5 items-center">
                                <!-- 검토 버튼 (전체) -->
                                <button type="button"
                                        th:attr="data-id=${approval.approvalId},
                                                 data-title=${approval.title},
                                                 data-instructor=${approval.instuctorName},
                                                 data-description=${approval.description},
                                                 data-startat=${approval.startAt != null ? #temporals.format(approval.startAt, 'yyyy-MM-dd HH:mm') : '-'},
                                                 data-createdat=${approval.createdAt != null ? #temporals.format(approval.createdAt, 'yyyy-MM-dd') : '-'},
                                                 data-status=${approval.status.name()}"
                                        onclick="openDetailModal(this)"
                                        class="px-2.5 py-1.5 border-2 border-blue-300 text-blue-600 rounded-lg hover:bg-blue-50 font-bold text-xs">검토</button>
                                <!-- 승인/반려 버튼 (PENDING만) -->
                                <form method="post" th:if="${approval.status.name() == 'PENDING'}"
                                      th:action="@{/admin/approvals/{id}/approve(id=${approval.approvalId})}">
                                    <input type="hidden" name="redirect" value="/admin/live-management"/>
                                    <button type="submit" class="px-2.5 py-1.5 border-2 border-green-300 text-green-600 rounded-lg hover:bg-green-50 font-bold text-xs">승인</button>
                                </form>
                                <button type="button" th:if="${approval.status.name() == 'PENDING'}"
                                        th:attr="data-id=${approval.approvalId}, data-title=${approval.title}"
                                        onclick="openRejectModal(this.dataset.id, this.dataset.title)"
                                        class="px-2.5 py-1.5 border-2 border-red-300 text-red-600 rounded-lg hover:bg-red-50 font-bold text-xs">반려</button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- Detail Modal -->
<div id="detail-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" style="display:none">
    <div class="bg-white rounded-2xl w-full max-w-lg mx-4 shadow-2xl overflow-y-auto max-h-[90vh]">
        <div class="p-8">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-2xl font-black text-gray-900">실시간 강의 신청 상세</h3>
                <button onclick="closeDetailModal()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-500">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="space-y-4">
                <div class="flex justify-between items-center p-4 bg-gray-50 rounded-xl text-sm">
                    <span class="text-gray-500 font-medium">상태</span>
                    <span id="d-status" class="px-3 py-1 rounded-full text-sm font-bold"></span>
                </div>
                <div class="flex justify-between items-center p-4 bg-gray-50 rounded-xl text-sm">
                    <span class="text-gray-500 font-medium">강의명</span>
                    <span id="d-title" class="font-bold text-gray-900 text-right"></span>
                </div>
                <div class="flex justify-between items-center p-4 bg-gray-50 rounded-xl text-sm">
                    <span class="text-gray-500 font-medium">강사명</span>
                    <span id="d-instructor" class="font-bold text-gray-900"></span>
                </div>
                <div class="p-4 bg-gray-50 rounded-xl text-sm">
                    <p class="text-gray-500 font-medium mb-2">코스 설명</p>
                    <p id="d-description" class="font-bold text-gray-900 leading-relaxed"></p>
                </div>
                <div class="flex justify-between items-center p-4 bg-gray-50 rounded-xl text-sm">
                    <span class="text-gray-500 font-medium">강의 예정 일시</span>
                    <span id="d-startat" class="font-bold text-gray-900"></span>
                </div>
                <div class="flex justify-between items-center p-4 bg-gray-50 rounded-xl text-sm">
                    <span class="text-gray-500 font-medium">신청일</span>
                    <span id="d-createdat" class="font-bold text-gray-900"></span>
                </div>
            </div>
            <div class="flex gap-3 mt-8">
                <form id="d-approve-form" method="post" class="flex-1" style="display:none">
                    <input type="hidden" name="redirect" value="/admin/live-management"/>
                    <button type="submit" class="w-full py-3 bg-green-600 text-white rounded-xl hover:bg-green-700 font-bold">승인하기</button>
                </form>
                <button id="d-reject-btn" type="button" onclick="openRejectFromDetail()" class="flex-1 py-3 border-2 border-red-300 text-red-600 rounded-xl hover:bg-red-50 font-bold" style="display:none">반려하기</button>
                <button onclick="closeDetailModal()" class="flex-1 py-3 border-2 border-gray-200 rounded-xl font-bold text-gray-700 hover:bg-gray-50">닫기</button>
            </div>
        </div>
    </div>
</div>

<!-- Reject Modal -->
<div id="reject-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" style="display:none">
    <div class="bg-white rounded-2xl p-8 max-w-md w-full mx-4 shadow-xl">
        <h3 class="text-2xl font-black text-gray-900 mb-4">실시간 강의 반려</h3>
        <p id="reject-title" class="text-gray-600 mb-4 font-medium"></p>
        <form id="reject-form" method="post">
            <input type="hidden" name="redirect" value="/admin/live-management"/>
            <textarea name="rejectReason" rows="4" placeholder="반려 사유를 입력하세요"
                      class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none resize-none font-medium"></textarea>
            <div class="flex gap-3 mt-6">
                <button type="submit" class="flex-1 px-6 py-3 bg-red-600 text-white rounded-xl hover:bg-red-700 font-bold">반려 처리</button>
                <button type="button" onclick="closeRejectModal()" class="flex-1 px-6 py-3 border-2 border-gray-300 rounded-xl hover:bg-gray-50 font-bold text-gray-700">취소</button>
            </div>
        </form>
    </div>
</div>

<script>
    function filterRows(status) {
        document.querySelectorAll('tbody tr[data-status]').forEach(tr => {
            tr.style.display = (status === 'ALL' || tr.dataset.status === status) ? '' : 'none';
        });
        document.querySelectorAll('[id^="tab-"]').forEach(btn => {
            btn.className = btn.id === 'tab-' + status
                ? 'px-4 py-2 rounded-full font-bold text-sm bg-blue-600 text-white shadow-md'
                : 'px-4 py-2 rounded-full font-bold text-sm bg-white border-2 border-gray-200 text-gray-700 hover:border-blue-300';
        });
    }
    let currentDetailId = null;
    let currentDetailTitle = null;

    function openDetailModal(btn) {
        currentDetailId = btn.dataset.id;
        currentDetailTitle = btn.dataset.title;
        const status = btn.dataset.status;

        document.getElementById('d-title').textContent = btn.dataset.title || '-';
        document.getElementById('d-instructor').textContent = btn.dataset.instructor || '-';
        document.getElementById('d-description').textContent = btn.dataset.description || '-';
        document.getElementById('d-startat').textContent = btn.dataset.startat || '-';
        document.getElementById('d-createdat').textContent = btn.dataset.createdat || '-';

        const statusEl = document.getElementById('d-status');
        if (status === 'PENDING') {
            statusEl.textContent = '승인 대기';
            statusEl.className = 'px-3 py-1 rounded-full text-sm font-bold bg-yellow-100 text-yellow-700';
        } else if (status === 'APPROVED') {
            statusEl.textContent = '승인 완료';
            statusEl.className = 'px-3 py-1 rounded-full text-sm font-bold bg-green-100 text-green-700';
        } else {
            statusEl.textContent = '반려';
            statusEl.className = 'px-3 py-1 rounded-full text-sm font-bold bg-red-100 text-red-700';
        }

        const approveForm = document.getElementById('d-approve-form');
        const rejectBtn = document.getElementById('d-reject-btn');
        if (status === 'PENDING') {
            approveForm.action = '/admin/approvals/' + currentDetailId + '/approve';
            approveForm.style.display = 'block';
            rejectBtn.style.display = 'block';
        } else {
            approveForm.style.display = 'none';
            rejectBtn.style.display = 'none';
        }
        document.getElementById('detail-modal').style.display = 'flex';
    }
    function closeDetailModal() { document.getElementById('detail-modal').style.display = 'none'; }
    function openRejectFromDetail() {
        closeDetailModal();
        openRejectModal(currentDetailId, currentDetailTitle);
    }

    function openRejectModal(id, title) {
        document.getElementById('reject-title').textContent = '"' + title + '"를 반려하시겠습니까?';
        document.getElementById('reject-form').action = '/admin/approvals/' + id + '/reject';
        document.getElementById('reject-modal').style.display = 'flex';
    }
    function closeRejectModal() { document.getElementById('reject-modal').style.display = 'none'; }
    function toggleAdminMenu() { document.getElementById('adminMenu').classList.toggle('hidden'); }
    function toggleMemberMenu() { document.getElementById('memberSubMenu').classList.toggle('hidden'); }
    function toggleCourseMenu() { document.getElementById('courseSubMenu').classList.toggle('hidden'); }
    document.addEventListener('click', e => {
        if (!document.getElementById('adminMenuWrapper').contains(e.target))
            document.getElementById('adminMenu').classList.add('hidden');
    });
</script>

</body>
</html>
