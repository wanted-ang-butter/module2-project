<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>블랙리스트 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<div class="max-w-7xl mx-auto px-6 py-12">

    <!-- Top Header -->
    <div class="mb-12">
        <div class="flex items-center justify-between mb-6">
            <a href="/admin/dashboard"
               class="flex items-center gap-2 px-4 py-2 border-2 border-gray-200 rounded-xl hover:border-blue-600 hover:bg-blue-50 transition-all">
                <span class="font-medium text-gray-700 hover:text-blue-600 text-sm">← 뒤로가기</span>
            </a>
        </div>

        <!-- Admin Hero Banner -->
        <div class="relative overflow-hidden mb-8">
            <div class="relative bg-gradient-to-br from-purple-50 via-white to-blue-50 rounded-3xl p-12 border-2 border-gray-200 shadow-lg">
                <div class="flex items-center justify-between">
                    <div>
                        <div class="inline-flex items-center gap-2 px-4 py-2 bg-white border-2 border-gray-200 rounded-full mb-6 shadow-sm">
                            <div class="w-2.5 h-2.5 bg-purple-500 rounded-full"></div>
                            <span class="text-sm font-bold text-gray-700">시스템 정상</span>
                        </div>
                        <h2 class="text-4xl font-black text-gray-900 mb-4 leading-tight">
                            안녕하세요,<br />
                            <span class="text-purple-600">관리자</span>님
                        </h2>
                        <p class="text-xl text-gray-700 font-semibold">
                            플랫폼 운영 상태를 확인하고 관리하세요
                        </p>
                    </div>
                    <div class="hidden lg:block">
                        <div class="w-48 h-48 bg-gradient-to-br from-purple-400 to-blue-400 rounded-3xl flex items-center justify-center shadow-2xl">
                            <span class="text-white text-7xl">⚙️</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Page Header -->
        <h1 class="text-4xl font-black text-gray-900 mb-2">블랙 리스트</h1>
        <p class="text-gray-600 font-medium">블랙리스트에 등록된 회원을 관리합니다</p>
    </div>

    <!-- Table -->
    <div class="bg-white border-2 border-gray-200 rounded-2xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-4 text-left text-sm font-black text-gray-900">No</th>
                        <th class="px-6 py-4 text-left text-sm font-black text-gray-900">회원 ID</th>
                        <th class="px-6 py-4 text-left text-sm font-black text-gray-900">이름</th>
                        <th class="px-6 py-4 text-left text-sm font-black text-gray-900">사유</th>
                        <th class="px-6 py-4 text-left text-sm font-black text-gray-900">등록일</th>
                        <th class="px-6 py-4 text-left text-sm font-black text-gray-900">상태</th>
                        <th class="px-6 py-4 text-left text-sm font-black text-gray-900">관리</th>
                    </tr>
                </thead>
                <tbody id="blacklist-tbody" class="divide-y-2 divide-gray-100">
                    <!-- JS로 채워짐 -->
                </tbody>
            </table>
        </div>

        <!-- 빈 목록 -->
        <div id="empty-state" class="hidden text-center py-16">
            <div class="w-24 h-24 bg-gray-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <span class="text-4xl text-gray-400">🚫</span>
            </div>
            <p class="text-gray-500 text-sm">블랙리스트에 등록된 회원이 없습니다</p>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full mx-4 border-2 border-gray-200 shadow-xl">
            <p id="confirm-message" class="text-gray-900 font-semibold text-center mb-6"></p>
            <div class="flex gap-3">
                <button onclick="closeConfirm()"
                        class="flex-1 px-4 py-2 border-2 border-gray-200 rounded-xl text-gray-700 font-bold hover:bg-gray-50 transition-colors">
                    취소
                </button>
                <button id="confirm-ok-btn"
                        class="flex-1 px-4 py-2 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700 transition-colors">
                    확인
                </button>
            </div>
        </div>
    </div>

    <!-- Alert Modal -->
    <div id="alert-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full mx-4 border-2 border-gray-200 shadow-xl">
            <p id="alert-message" class="text-gray-900 font-semibold text-center mb-6"></p>
            <button onclick="closeAlert()"
                    class="w-full px-4 py-2 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-colors">
                확인
            </button>
        </div>
    </div>

</div>

<script>
    // 페이지 로드 시 블랙리스트 조회
    document.addEventListener('DOMContentLoaded', loadBlacklist);

    function loadBlacklist() {
        fetch('/api/admin/blacklist')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('blacklist-tbody');
                const emptyState = document.getElementById('empty-state');

                if (data.length === 0) {
                    emptyState.classList.remove('hidden');
                    return;
                }

                data.forEach((item, index) => {
                    const date = item.createdAt ? item.createdAt.substring(0, 10) : '-';
                    const tr = document.createElement('tr');
                    tr.className = 'hover:bg-gray-50 transition-colors';
                    tr.innerHTML = `
                        <td class="px-6 py-4 text-sm font-medium text-gray-900">${index + 1}</td>
                        <td class="px-6 py-4 text-sm font-medium text-gray-900">${item.userId}</td>
                        <td class="px-6 py-4 text-sm font-bold text-gray-900">${item.userName}</td>
                        <td class="px-6 py-4 text-sm text-gray-600">${item.reason}</td>
                        <td class="px-6 py-4 text-sm text-gray-600">${date}</td>
                        <td class="px-6 py-4">
                            <span class="inline-flex px-3 py-1 rounded-full text-xs font-bold bg-red-100 text-red-700">
                                블랙리스트
                            </span>
                        </td>
                        <td class="px-6 py-4">
                            <button onclick="handleRelease(${item.blacklistID})"
                                    class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors text-sm font-bold">
                                해제
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            })
            .catch(err => console.error('블랙리스트 조회 실패:', err));
    }

    // 해제 처리
    function handleRelease(blacklistId) {
        showConfirm('블랙리스트에서 해제하시겠습니까? 회원이 활성화됩니다.', () => {
            fetch(`/api/admin/blacklist/${blacklistId}/release`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'text/plain' },
                body: '관리자 해제'
            })
            .then(res => {
                if (!res.ok) throw new Error('해제 실패');
                closeConfirm();
                showAlert('블랙리스트에서 해제되었습니다.');
            })
            .catch(err => {
                closeConfirm();
                showAlert('해제 중 오류가 발생했습니다.');
                console.error(err);
            });
        });
    }

    // Confirm Modal
    let confirmCallback = null;

    function showConfirm(message, onConfirm) {
        document.getElementById('confirm-message').textContent = message;
        confirmCallback = onConfirm;
        document.getElementById('confirm-modal').classList.remove('hidden');
        document.getElementById('confirm-ok-btn').onclick = () => {
            if (confirmCallback) confirmCallback();
        };
    }

    function closeConfirm() {
        document.getElementById('confirm-modal').classList.add('hidden');
        confirmCallback = null;
    }

    // Alert Modal
    function showAlert(message) {
        document.getElementById('alert-message').textContent = message;
        document.getElementById('alert-modal').classList.remove('hidden');
    }

    function closeAlert() {
        document.getElementById('alert-modal').classList.add('hidden');
        loadBlacklist(); // 알림 닫으면 목록 새로고침
    }
</script>

</body>
</html>
