<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>코스 신청 검토</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.3s ease; }
  </style>
</head>
<body class="bg-gray-50 p-8">

<div class="max-w-7xl mx-auto">

  <!-- Header -->
  <div class="mb-8">
    <h1 class="text-4xl font-black text-gray-900 mb-2">코스 신청 검토</h1>
    <p class="text-gray-600 font-medium">강사가 신청한 강의를 검토하고 승인 여부를 결정합니다</p>
  </div>

  <!-- Stats -->
  <div class="grid grid-cols-3 gap-6 mb-8" id="stats"></div>

  <!-- Filters -->
  <div class="flex gap-3 mb-6" id="filters"></div>

  <!-- Table -->
  <div class="bg-white border-2 border-gray-200 rounded-2xl overflow-hidden overflow-x-auto">
    <table class="w-full min-w-max">
      <thead class="bg-gray-50 border-b-2">
      <tr>
        <th class="px-4 py-3 text-left text-sm font-black">코스명</th>
        <th class="px-4 py-3 text-left text-sm font-black">강사명</th>
        <th class="px-4 py-3 text-left text-sm font-black">카테고리</th>
        <th class="px-4 py-3 text-left text-sm font-black">신청일</th>
        <th class="px-4 py-3 text-left text-sm font-black">상태</th>
        <th class="px-4 py-3 text-left text-sm font-black">액션</th>
      </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<!-- Detail Modal -->
<div id="detailModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
  <div class="bg-white p-8 rounded-2xl max-w-xl w-full">
    <h3 class="text-2xl font-black mb-4">강의 상세</h3>
    <div id="detailContent" class="space-y-3 text-sm"></div>
    <button onclick="closeDetail()" class="mt-6 w-full border-2 rounded-xl py-2">닫기</button>
  </div>
</div>

<!-- Reject Modal -->
<div id="rejectModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
  <div class="bg-white p-8 rounded-2xl max-w-md w-full">
    <h3 class="text-xl font-black mb-4">반려 사유 입력</h3>
    <textarea id="rejectReason" class="w-full border-2 rounded-xl p-3" rows="4"></textarea>
    <div class="flex gap-3 mt-4">
      <button onclick="confirmReject()" class="flex-1 bg-red-600 text-white py-2 rounded-xl">반려</button>
      <button onclick="closeReject()" class="flex-1 border py-2 rounded-xl">취소</button>
    </div>
  </div>
</div>

<script>
  let filter = "전체";
  let rejectId = null;

  const filters = ["전체","승인 대기","승인 완료","반려"];

  function badge(status){
    if(status==="승인 대기") return "bg-yellow-100 text-yellow-700";
    if(status==="승인 완료") return "bg-green-100 text-green-700";
    return "bg-red-100 text-red-700";
  }

  function renderStats(){
    const el = document.getElementById("stats");
    const p = courses.filter(c=>c.status==="승인 대기").length;
    const a = courses.filter(c=>c.status==="승인 완료").length;
    const r = courses.filter(c=>c.status==="반려").length;

    el.innerHTML = `
    <div class="p-6 border-2 border-yellow-200 rounded-2xl"><p class="text-sm">검토 대기</p><p class="text-3xl font-black text-yellow-600">${p}</p></div>
    <div class="p-6 border-2 border-green-200 rounded-2xl"><p class="text-sm">승인 완료</p><p class="text-3xl font-black text-green-600">${a}</p></div>
    <div class="p-6 border-2 border-red-200 rounded-2xl"><p class="text-sm">반려</p><p class="text-3xl font-black text-red-600">${r}</p></div>
  `;
  }

  function renderFilters(){
    const el=document.getElementById("filters"); el.innerHTML="";
    filters.forEach(f=>{
      const b=document.createElement("button");
      b.innerText=f;
      b.className=`px-4 py-2 rounded-full font-bold ${filter===f?"bg-blue-600 text-white":"bg-white border"}`;
      b.onclick=()=>{filter=f; render();};
      el.appendChild(b);
    });
  }

  function renderTable(){
    const body=document.getElementById("tableBody"); body.innerHTML="";
    const list=courses.filter(c=>filter==="전체"||c.status===filter);

    list.forEach((c,i)=>{
      const tr=document.createElement("tr");
      tr.className=`fade-in border-b ${i%2?"bg-gray-50":""}`;
      tr.innerHTML=`
      <td class="px-4 py-3 font-medium">${c.name}</td>
      <td class="px-4 py-3">${c.instructor}</td>
      <td class="px-4 py-3">${c.category}</td>
      <td class="px-4 py-3 font-mono">${c.date}</td>
      <td class="px-4 py-3"><span class="px-3 py-1 rounded-full text-sm font-bold ${badge(c.status)}">${c.status}</span></td>
      <td class="px-4 py-3">
        <button onclick="detail('${c.id}')" class="text-blue-600">검토</button>
        ${c.status==="승인 대기"?`<button onclick="approve('${c.id}')" class="ml-2 text-green-600">승인</button><button onclick="openReject('${c.id}')" class="ml-2 text-red-600">반려</button>`:""}
        ${c.status!=="승인 대기"?`<button onclick="remove('${c.id}')" class="ml-2 text-red-600">삭제</button>`:""}
      </td>
    `;
      body.appendChild(tr);
    });
  }

  function approve(id){
    fetch(`/api/admin/course-approvals/${id}/approve`, {
      method: 'PATCH'
    }).then(() => location.reload());
  }

  function openReject(id){ rejectId=id; document.getElementById("rejectModal").classList.remove("hidden"); }
  function closeReject(){ document.getElementById("rejectModal").classList.add("hidden"); }

  function confirmReject(){
    const val=document.getElementById("rejectReason").value;
    if(!val) return alert("사유 입력 필요");
    fetch(`/api/admin/course-approvals/${rejectId}/reject`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rejectReason: val })
    }).then(() => location.reload());

    closeReject();
  }

  function remove(id){ if(confirm("삭제하시겠습니까?")){ courses=courses.filter(c=>c.id!==id); render(); }}

  function detail(id){
    const c=courses.find(x=>x.id===id);
    document.getElementById("detailContent").innerHTML=`
    <div><b>코스명:</b> ${c.name}</div>
    <div><b>강사:</b> ${c.instructor}</div>
    <div><b>카테고리:</b> ${c.category}</div>
    <div><b>설명:</b> ${c.desc}</div>
    <div><b>신청일:</b> ${c.date}</div>
  `;
    document.getElementById("detailModal").classList.remove("hidden");
  }
  function closeDetail(){ document.getElementById("detailModal").classList.add("hidden"); }

  function render(){ renderStats(); renderFilters(); renderTable(); }
  fetch('/api/admin/course-approvals?type=REGISTER')
          .then(res => res.json())
          .then(data => {
            courses = data;
            render();
          });

</script>

</body>
</html>
