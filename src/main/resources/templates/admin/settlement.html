<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>정산 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Header -->
<header class="border-b border-gray-200 bg-white/80 backdrop-blur-sm sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-4">
        <div class="flex items-center justify-between">
            <a href="/admin/dashboard" class="flex items-center gap-3 group">
                <div class="w-10 h-10 bg-gradient-to-br from-purple-600 to-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-terminal text-white text-sm"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-gray-900">내일 <span class="text-gray-500 font-normal">Nae-il</span></h1>
                    <p class="text-[10px] font-semibold text-gray-500">관리자 패널</p>
                </div>
            </a>
            <nav class="flex items-center gap-2">
                <a href="/community/qna" class="flex items-center gap-2 px-4 py-2 border-2 border-gray-200 rounded-xl text-gray-700 hover:border-blue-600 hover:bg-blue-50 transition-all font-medium text-sm">
                    <i class="fa-solid fa-comment text-sm"></i><span>커뮤니티</span>
                </a>
                <div class="relative" id="adminMenuWrapper">
                    <button onclick="toggleAdminMenu()" class="flex items-center gap-2 px-4 py-2 border-2 border-gray-200 rounded-xl text-gray-700 hover:border-blue-600 hover:bg-blue-50 transition-all font-medium text-sm">
                        <i class="fa-solid fa-shield text-sm"></i><span>관리</span><i class="fa-solid fa-chevron-down text-xs"></i>
                    </button>
                    <div id="adminMenu" class="hidden absolute left-0 mt-2 w-64 bg-white border-2 border-gray-200 rounded-xl shadow-xl z-50">
                        <div class="py-2">
                            <div>
                                <button onclick="toggleMemberMenu()" class="w-full flex items-center justify-between px-4 py-3 hover:bg-gray-50">
                                    <div class="flex items-center gap-3"><i class="fa-solid fa-users text-gray-600"></i><span class="text-sm font-bold">회원 관리</span></div>
                                    <i class="fa-solid fa-chevron-down text-xs text-gray-500"></i>
                                </button>
                                <div id="memberSubMenu" class="hidden px-4 pb-2">
                                    <a href="/admin/user-management" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">회원 조회</a>
                                    <a href="/admin/instructor-approval" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">강사 승인</a>
                                    <a href="/admin/blacklist" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">블랙리스트 관리</a>
                                </div>
                            </div>
                            <div class="border-t border-gray-100"></div>
                            <div>
                                <button onclick="toggleCourseMenu()" class="w-full flex items-center justify-between px-4 py-3 hover:bg-gray-50">
                                    <div class="flex items-center gap-3"><i class="fa-solid fa-book-open text-gray-600"></i><span class="text-sm font-bold">코스 관리</span></div>
                                    <i class="fa-solid fa-chevron-down text-xs text-gray-500"></i>
                                </button>
                                <div id="courseSubMenu" class="hidden px-4 pb-2">
                                    <a href="/admin/course-management/approval" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">코스 승인 관리</a>
                                    <a href="/admin/live-management" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">실시간 강의 승인 관리</a>
                                    <a href="/admin/category-management" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">카테고리 관리</a>
                                </div>
                            </div>
                            <div class="border-t border-gray-100"></div>
                            <a href="/admin/settlement" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50">
                                <i class="fa-solid fa-wallet text-gray-600"></i><span class="text-sm font-bold">정산 관리</span>
                            </a>
                        </div>
                    </div>
                </div>
            </nav>
            <a href="/auth/logout" class="flex items-center gap-2 px-4 py-2 rounded-xl hover:bg-red-50 transition-all group">
                <i class="fa-solid fa-right-from-bracket text-gray-600 group-hover:text-red-600 text-sm"></i>
                <span class="font-medium text-gray-700 group-hover:text-red-600 text-sm">로그아웃</span>
            </a>
        </div>
    </div>
</header>

<div class="max-w-7xl mx-auto px-6 py-12">

    <!-- Page Header -->
    <div class="mb-8">
        <h1 class="text-4xl font-black text-gray-900 mb-2">정산 관리</h1>
        <p class="text-lg text-gray-600 font-medium">강사 정산 요청과 수익 현황을 관리합니다</p>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
        <div class="bg-white border-2 border-yellow-200 rounded-2xl p-6 hover:shadow-lg transition-all">
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-sm font-bold text-gray-700">이번 달 정산 요청</h3>
                <div class="w-10 h-10 bg-yellow-100 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-wallet text-yellow-600"></i>
                </div>
            </div>
            <p id="stat-pending" class="text-4xl font-black text-gray-900 mb-2">0건</p>
            <p class="text-sm text-yellow-600 font-bold">승인 대기 중</p>
        </div>
        <div class="bg-white border-2 border-green-200 rounded-2xl p-6 hover:shadow-lg transition-all">
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-sm font-bold text-gray-700">승인 완료</h3>
                <div class="w-10 h-10 bg-green-100 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-circle-check text-green-600"></i>
                </div>
            </div>
            <p id="stat-approved" class="text-4xl font-black text-gray-900 mb-2">0건</p>
            <p class="text-sm text-green-600 font-bold">처리 완료</p>
        </div>
        <div class="bg-white border-2 border-red-200 rounded-2xl p-6 hover:shadow-lg transition-all">
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-sm font-bold text-gray-700">반려</h3>
                <div class="w-10 h-10 bg-red-100 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-circle-xmark text-red-600"></i>
                </div>
            </div>
            <p id="stat-rejected" class="text-4xl font-black text-gray-900 mb-2">0건</p>
            <p class="text-sm text-red-600 font-bold">반려 처리</p>
        </div>
    </div>

    <!-- Table -->
    <div class="bg-white border-2 border-gray-200 rounded-2xl p-6">
        <h2 class="text-2xl font-black text-gray-900 mb-6">강사 정산 요청 목록</h2>
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead class="bg-gray-50 border-b-2 border-gray-200">
                    <tr>
                        <th class="px-4 py-3 text-left text-sm font-black text-gray-900 whitespace-nowrap">No</th>
                        <th class="px-4 py-3 text-left text-sm font-black text-gray-900 whitespace-nowrap">강사명</th>
                        <th class="px-4 py-3 text-left text-sm font-black text-gray-900 whitespace-nowrap">요청일</th>
                        <th class="px-4 py-3 text-left text-sm font-black text-gray-900 whitespace-nowrap">상태</th>
                        <th class="px-4 py-3 text-left text-sm font-black text-gray-900 whitespace-nowrap">액션</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Detail Modal -->
<div id="detail-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl p-8 max-w-2xl w-full shadow-xl max-h-[90vh] overflow-y-auto">
        <h3 class="text-2xl font-black text-gray-900 mb-6">정산 요청 상세</h3>
        <div id="detail-content" class="space-y-4 mb-6"></div>
        <div class="flex gap-3">
            <button id="detail-approve-btn" class="hidden flex-1 px-6 py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 font-bold">승인하기</button>
            <button onclick="closeDetail()" class="flex-1 px-6 py-3 border-2 border-gray-300 rounded-xl hover:bg-gray-50 font-bold text-gray-700">닫기</button>
        </div>
    </div>
</div>

<!-- Confirm Modal -->
<div id="confirm-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-8 max-w-md w-full mx-4 shadow-xl">
        <div class="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-6">
            <i class="fa-solid fa-check text-2xl text-blue-600"></i>
        </div>
        <h3 class="text-2xl font-black text-gray-900 mb-4 text-center">정산 승인</h3>
        <p class="text-gray-600 mb-4 font-medium text-center">이 정산 요청을 승인하시겠습니까?</p>
        <div id="confirm-info" class="bg-gray-50 rounded-xl p-4 mb-6"></div>
        <div class="flex gap-3">
            <button onclick="confirmApprove()" class="flex-1 px-6 py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 font-bold">승인 완료</button>
            <button onclick="closeConfirm()" class="flex-1 px-6 py-3 border-2 border-gray-300 rounded-xl hover:bg-gray-50 font-bold text-gray-700">취소</button>
        </div>
    </div>
</div>

<!-- Alert Modal -->
<div id="alert-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-8 max-w-sm w-full mx-4 border-2 border-gray-200 shadow-xl">
        <p id="alert-message" class="text-gray-900 font-semibold text-center mb-6"></p>
        <button onclick="closeAlert()" class="w-full px-4 py-2 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700">확인</button>
    </div>
</div>

<script>
    let allData = [];
    let selectedApprovalId = null;

    function statusLabel(s) {
        return { PENDING: '승인 대기', APPROVED: '승인 완료', REJECTED: '반려' }[s] || s;
    }
    function statusBadge(s) {
        return { PENDING: 'bg-yellow-100 text-yellow-700', APPROVED: 'bg-green-100 text-green-700', REJECTED: 'bg-red-100 text-red-700' }[s] || 'bg-gray-100 text-gray-700';
    }

    function renderStats() {
        document.getElementById('stat-pending').textContent = allData.filter(c => c.status === 'PENDING').length + '건';
        document.getElementById('stat-approved').textContent = allData.filter(c => c.status === 'APPROVED').length + '건';
        document.getElementById('stat-rejected').textContent = allData.filter(c => c.status === 'REJECTED').length + '건';
    }

    function renderTable() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        if (allData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-16 text-center">
                <div class="flex flex-col items-center gap-3">
                    <div class="w-16 h-16 bg-gray-100 rounded-2xl flex items-center justify-center"><span class="text-3xl">💰</span></div>
                    <p class="text-gray-500 font-medium">정산 요청이 없습니다</p>
                </div>
            </td></tr>`;
            return;
        }

        allData.forEach((c, i) => {
            const date = c.createdAt ? c.createdAt.substring(0, 10) : '-';
            const tr = document.createElement('tr');
            tr.className = `border-b border-gray-100 hover:bg-gray-50 transition-colors ${c.status === 'PENDING' ? 'bg-yellow-50/30' : i % 2 === 1 ? 'bg-gray-50/50' : ''}`;
            tr.innerHTML = `
                <td class="px-4 py-3 text-sm text-gray-600">${i + 1}</td>
                <td class="px-4 py-3 text-sm font-bold text-gray-900 whitespace-nowrap">${c.instuctorName || '-'}</td>
                <td class="px-4 py-3 text-sm font-mono text-gray-600 whitespace-nowrap">${date}</td>
                <td class="px-4 py-3 whitespace-nowrap">
                    <span class="px-3 py-1 rounded-full text-sm font-bold ${statusBadge(c.status)}">${statusLabel(c.status)}</span>
                </td>
                <td class="px-4 py-3 whitespace-nowrap">
                    <div class="flex gap-2">
                        <button onclick="openDetail(${c.approvalId})" class="px-3 py-1.5 border-2 border-blue-300 text-blue-600 rounded-lg hover:bg-blue-50 font-bold text-sm">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                        ${c.status === 'PENDING' ? `
                        <button onclick="openConfirm(${c.approvalId})" class="px-3 py-1.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-bold text-sm">승인</button>
                        ` : ''}
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function openDetail(approvalId) {
        const c = allData.find(x => x.approvalId === approvalId);
        if (!c) return;
        selectedApprovalId = approvalId;
        const date = c.createdAt ? c.createdAt.substring(0, 10) : '-';

        document.getElementById('detail-content').innerHTML = `
            <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl">
                <span class="text-sm font-bold text-gray-600">상태</span>
                <span class="px-3 py-1 rounded-full text-sm font-bold ${statusBadge(c.status)}">${statusLabel(c.status)}</span>
            </div>
            <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl">
                <span class="text-sm font-bold text-gray-600">강사명</span>
                <span class="text-sm font-bold text-gray-900">${c.instuctorName || '-'}</span>
            </div>
            <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl">
                <span class="text-sm font-bold text-gray-600">요청일</span>
                <span class="text-sm font-mono text-gray-900">${date}</span>
            </div>
        `;

        const approveBtn = document.getElementById('detail-approve-btn');
        if (c.status === 'PENDING') {
            approveBtn.classList.remove('hidden');
            approveBtn.onclick = () => { closeDetail(); openConfirm(approvalId); };
        } else {
            approveBtn.classList.add('hidden');
        }

        document.getElementById('detail-modal').classList.remove('hidden');
    }
    function closeDetail() { document.getElementById('detail-modal').classList.add('hidden'); }

    function openConfirm(approvalId) {
        const c = allData.find(x => x.approvalId === approvalId);
        if (!c) return;
        selectedApprovalId = approvalId;
        document.getElementById('confirm-info').innerHTML = `
            <div class="flex justify-between mb-2">
                <span class="text-sm font-medium text-gray-600">강사명</span>
                <span class="text-sm font-bold text-gray-900">${c.instuctorName || '-'}</span>
            </div>
            <div class="flex justify-between">
                <span class="text-sm font-medium text-gray-600">요청일</span>
                <span class="text-sm font-mono text-gray-900">${c.createdAt ? c.createdAt.substring(0, 10) : '-'}</span>
            </div>
        `;
        document.getElementById('confirm-modal').classList.remove('hidden');
    }
    function closeConfirm() { document.getElementById('confirm-modal').classList.add('hidden'); }

    function confirmApprove() {
        fetch(`/api/admin/course-approvals/${selectedApprovalId}/approve`, { method: 'PATCH' })
            .then(res => {
                if (!res.ok) throw new Error('승인 실패');
                closeConfirm();
                showAlert('정산 요청이 승인되었습니다');
            })
            .catch(() => { closeConfirm(); showAlert('승인 중 오류가 발생했습니다.'); });
    }

    function showAlert(msg) {
        document.getElementById('alert-message').textContent = msg;
        document.getElementById('alert-modal').classList.remove('hidden');
    }
    function closeAlert() {
        document.getElementById('alert-modal').classList.add('hidden');
        loadData();
    }

    function toggleAdminMenu() { document.getElementById('adminMenu').classList.toggle('hidden'); }
    function toggleMemberMenu() { document.getElementById('memberSubMenu').classList.toggle('hidden'); }
    function toggleCourseMenu() { document.getElementById('courseSubMenu').classList.toggle('hidden'); }
    document.addEventListener('click', e => {
        if (!document.getElementById('adminMenuWrapper').contains(e.target)) {
            document.getElementById('adminMenu').classList.add('hidden');
        }
    });

    function loadData() {
        fetch('/api/admin/course-approvals?type=SETTLEMENT_REGISTER')
            .then(res => res.json())
            .then(data => { allData = data; renderStats(); renderTable(); })
            .catch(err => console.error('조회 실패:', err));
    }

    document.addEventListener('DOMContentLoaded', loadData);
</script>

</body>
</html>
