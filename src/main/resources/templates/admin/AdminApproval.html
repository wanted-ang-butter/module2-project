<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>코스 승인 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="bg-gray-50 min-h-screen">

<div th:replace="fragments/adminHeader :: adminHeader"></div>

<div class="max-w-7xl mx-auto px-6 py-10 flex gap-8">

    <!-- 사이드바 -->
    <aside class="w-56 shrink-0">
        <div class="bg-white border-2 border-gray-200 rounded-2xl p-4">
            <p class="text-sm font-black text-gray-900 px-3 py-2 mb-1">코스 관리</p>
            <nav class="space-y-1">
                <a th:href="@{/admin/course-management/approval}"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-bold text-purple-700 bg-purple-50">
                    <i class="fa-solid fa-book-open text-purple-500 w-4"></i>코스 승인 관리
                </a>
                <a th:href="@{/admin/live-management}"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-50">
                    <i class="fa-solid fa-video text-gray-400 w-4"></i>실시간 강의 승인
                </a>
                <a th:href="@{/admin/category-management}"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-50">
                    <i class="fa-solid fa-tags text-gray-400 w-4"></i>카테고리 관리
                </a>
            </nav>
        </div>
    </aside>

    <!-- 메인 -->
    <main class="flex-1">

        <div class="mb-8">
            <h1 class="text-4xl font-black text-gray-900 mb-2">코스 신청 검토</h1>
            <p class="text-gray-600 font-medium">강사가 신청한 강의를 검토하고 승인 여부를 결정합니다</p>
        </div>

        <!-- 통계 카드 -->
        <div class="grid grid-cols-3 gap-6 mb-8">
            <div class="bg-white border-2 border-yellow-200 rounded-2xl p-6">
                <p class="text-sm font-bold text-gray-500 mb-1">검토 대기 중</p>
                <p class="text-4xl font-black text-yellow-500 mb-1" th:text="${pendingCount} + '건'">0건</p>
                <p class="text-xs text-gray-400 font-medium">신규 신청</p>
            </div>
            <div class="bg-white border-2 border-green-200 rounded-2xl p-6">
                <p class="text-sm font-bold text-gray-500 mb-1">승인 완료</p>
                <p class="text-4xl font-black text-green-600 mb-1" th:text="${approvedCount} + '건'">0건</p>
                <p class="text-xs text-gray-400 font-medium">운영 중</p>
            </div>
            <div class="bg-white border-2 border-red-200 rounded-2xl p-6">
                <p class="text-sm font-bold text-gray-500 mb-1">반려</p>
                <p class="text-4xl font-black text-red-500 mb-1" th:text="${rejectedCount} + '건'">0건</p>
                <p class="text-xs text-gray-400 font-medium">재신청 필요</p>
            </div>
        </div>

        <!-- 필터 탭 -->
        <div class="flex items-center gap-2 mb-6">
            <button onclick="filterTable('ALL')" id="tab-ALL"
                    class="filter-tab px-5 py-2 rounded-full text-sm font-bold bg-gray-900 text-white transition-all">전체</button>
            <button onclick="filterTable('PENDING')" id="tab-PENDING"
                    class="filter-tab px-5 py-2 rounded-full text-sm font-bold bg-white border-2 border-gray-200 text-gray-600 transition-all">승인 대기</button>
            <button onclick="filterTable('APPROVED')" id="tab-APPROVED"
                    class="filter-tab px-5 py-2 rounded-full text-sm font-bold bg-white border-2 border-gray-200 text-gray-600 transition-all">승인 완료</button>
            <button onclick="filterTable('REJECTED')" id="tab-REJECTED"
                    class="filter-tab px-5 py-2 rounded-full text-sm font-bold bg-white border-2 border-gray-200 text-gray-600 transition-all">반려</button>
        </div>

        <!-- 테이블 -->
        <div class="bg-white border-2 border-gray-200 rounded-2xl overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 border-b-2 border-gray-200">
                    <tr>
                        <th class="px-5 py-4 text-left font-bold text-gray-600">코스명</th>
                        <th class="px-5 py-4 text-left font-bold text-gray-600">강사명</th>
                        <th class="px-5 py-4 text-left font-bold text-gray-600">카테고리</th>
                        <th class="px-5 py-4 text-left font-bold text-gray-600">신청일</th>
                        <th class="px-5 py-4 text-left font-bold text-gray-600">상태</th>
                        <th class="px-5 py-4 text-left font-bold text-gray-600">액션</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(approvals)}">
                        <td colspan="6" class="px-5 py-12 text-center text-gray-400">승인 요청이 없습니다</td>
                    </tr>
                    <tr th:each="a : ${approvals}"
                        th:attr="data-status=${a.status.name()}"
                        class="approval-row border-b border-gray-100 hover:bg-gray-50 transition-colors">
                        <td class="px-5 py-4 font-bold text-gray-900" th:text="${a.title ?: '-'}"></td>
                        <td class="px-5 py-4 text-gray-700" th:text="${a.instuctorName ?: '-'}"></td>
                        <td class="px-5 py-4 text-gray-600" th:text="${a.categoryName ?: '-'}"></td>
                        <td class="px-5 py-4 text-gray-500 whitespace-nowrap"
                            th:text="${a.createdAt != null ? #temporals.format(a.createdAt, 'yyyy-MM-dd') : '-'}"></td>
                        <td class="px-5 py-4">
                            <span th:if="${a.status.name() == 'PENDING'}"
                                  class="px-3 py-1.5 bg-yellow-50 text-yellow-700 border border-yellow-200 rounded-full text-xs font-bold">승인 대기</span>
                            <span th:if="${a.status.name() == 'APPROVED'}"
                                  class="px-3 py-1.5 bg-green-50 text-green-700 border border-green-200 rounded-full text-xs font-bold">승인 완료</span>
                            <span th:if="${a.status.name() == 'REJECTED'}"
                                  class="px-3 py-1.5 bg-red-50 text-red-600 border border-red-200 rounded-full text-xs font-bold">반려</span>
                        </td>
                        <td class="px-5 py-4">
                            <div class="flex gap-2">
                                <!-- 검토 버튼 (전체 공통) -->
                                <button type="button"
                                        th:attr="onclick='openReviewModal(' + ${a.approvalId} + ',\'' + ${a.title} + '\',\'' + (${a.instuctorName} ?: '-') + '\',\'' + (${a.categoryName} ?: '-') + '\',' + (${a.price} ?: 0) + ',\'' + (${a.description} ?: '') + '\',\'' + (${a.thumbnail} ?: '') + '\',\'' + ${a.status.name()} + '\',\'' + (${a.createdAt != null ? #temporals.format(a.createdAt, 'yyyy-MM-dd') : '-'}) + '\')'"
                                        class="px-3 py-1.5 border-2 border-blue-300 text-blue-600 rounded-lg text-xs font-bold hover:bg-blue-50 transition">검토</button>

                                <!-- 승인 대기일 때만 승인/반려 버튼 -->
                                <form th:if="${a.status.name() == 'PENDING'}"
                                      method="post" th:action="@{/admin/approvals/{id}/approve(id=${a.approvalId})}">
                                    <button type="submit"
                                            class="px-3 py-1.5 border-2 border-green-300 text-green-600 rounded-lg text-xs font-bold hover:bg-green-50 transition">승인</button>
                                </form>
                                <form th:if="${a.status.name() == 'PENDING'}"
                                      method="post" th:action="@{/admin/approvals/{id}/reject(id=${a.approvalId})}">
                                    <button type="submit"
                                            class="px-3 py-1.5 border-2 border-red-300 text-red-500 rounded-lg text-xs font-bold hover:bg-red-50 transition">반려</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>
</div>

<!-- 검토 모달 -->
<div id="reviewModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden p-4">
    <div class="bg-white rounded-2xl w-full max-w-lg shadow-xl max-h-[90vh] overflow-y-auto">
        <div class="p-8">
            <h3 class="text-2xl font-black text-gray-900 mb-6">강의 신청 상세</h3>

            <div class="space-y-2 mb-6">
                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl">
                    <span class="text-sm font-bold text-gray-600">상태</span>
                    <span id="modal-status-badge" class="px-3 py-1 rounded-full text-xs font-bold"></span>
                </div>
                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl">
                    <span class="text-sm font-bold text-gray-600">코스명</span>
                    <span id="modal-title" class="text-sm font-bold text-gray-900"></span>
                </div>
                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl">
                    <span class="text-sm font-bold text-gray-600">강사명</span>
                    <span id="modal-instructor" class="text-sm font-bold text-gray-900"></span>
                </div>
                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl">
                    <span class="text-sm font-bold text-gray-600">카테고리</span>
                    <span id="modal-category" class="text-sm font-medium text-gray-900"></span>
                </div>
                <div class="p-4 bg-gray-50 rounded-xl">
                    <span class="text-sm font-bold text-gray-600 block mb-2">코스 설명</span>
                    <p id="modal-description" class="text-sm text-gray-900 leading-relaxed"></p>
                </div>
                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl">
                    <span class="text-sm font-bold text-gray-600">신청일</span>
                    <span id="modal-date" class="text-sm font-mono text-gray-900"></span>
                </div>
            </div>

            <button type="button" onclick="closeReviewModal()"
                    class="w-full py-4 border-2 border-gray-200 rounded-xl font-bold text-gray-700 hover:bg-gray-50 transition text-base">
                닫기
            </button>
        </div>
    </div>
</div>

<script>
    function filterTable(status) {
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.classList.remove('bg-gray-900', 'text-white');
            tab.classList.add('bg-white', 'border-2', 'border-gray-200', 'text-gray-600');
        });
        const activeTab = document.getElementById('tab-' + status);
        activeTab.classList.add('bg-gray-900', 'text-white');
        activeTab.classList.remove('bg-white', 'border-2', 'border-gray-200', 'text-gray-600');

        document.querySelectorAll('.approval-row').forEach(row => {
            if (status === 'ALL' || row.dataset.status === status) {
                row.style.display = '';
            } else {
                row.style.display = 'none';
            }
        });
    }

    function openReviewModal(id, title, instructor, category, price, description, thumbnail, status, date) {
        document.getElementById('modal-title').textContent = title || '-';
        document.getElementById('modal-instructor').textContent = instructor || '-';
        document.getElementById('modal-category').textContent = category || '-';
        document.getElementById('modal-description').textContent = description || '설명 없음';
        document.getElementById('modal-date').textContent = date || '-';

        const badge = document.getElementById('modal-status-badge');
        if (status === 'PENDING') {
            badge.textContent = '승인 대기';
            badge.className = 'px-3 py-1 rounded-full text-xs font-bold bg-yellow-100 text-yellow-700';
        } else if (status === 'APPROVED') {
            badge.textContent = '승인 완료';
            badge.className = 'px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700';
        } else {
            badge.textContent = '반려';
            badge.className = 'px-3 py-1 rounded-full text-xs font-bold bg-red-100 text-red-600';
        }

        document.getElementById('reviewModal').classList.remove('hidden');
    }

    function closeReviewModal() {
        document.getElementById('reviewModal').classList.add('hidden');
    }

    document.getElementById('reviewModal').addEventListener('click', function(e) {
        if (e.target === this) closeReviewModal();
    });
</script>

</body>
</html>
