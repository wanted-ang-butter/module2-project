<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>코스 승인 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="bg-gray-50 min-h-screen">

<div th:replace="fragments/adminHeader :: adminHeader"></div>

<div class="max-w-7xl mx-auto px-6 py-10 flex gap-8">

    <!-- 사이드바 -->
    <aside class="w-56 shrink-0">
        <div class="bg-white border-2 border-gray-200 rounded-2xl p-4">
            <p class="text-sm font-black text-gray-900 px-3 py-2 mb-1">코스 관리</p>
            <nav class="space-y-1">
                <a th:href="@{/admin/course-management/approval}"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-bold text-purple-700 bg-purple-50">
                    <i class="fa-solid fa-book-open text-purple-500 w-4"></i>코스 승인 관리
                </a>
                <a th:href="@{/admin/live-management}"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-50">
                    <i class="fa-solid fa-video text-gray-400 w-4"></i>실시간 강의 승인
                </a>
                <a th:href="@{/admin/category-management}"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-50">
                    <i class="fa-solid fa-tags text-gray-400 w-4"></i>카테고리 관리
                </a>
            </nav>
        </div>
    </aside>

    <!-- 메인 -->
    <main class="flex-1">

        <div class="mb-10">
            <h1 class="text-4xl font-black text-gray-900 mb-2">코스 승인 관리</h1>
            <p class="text-gray-600 font-medium">강사가 등록 요청한 코스를 검토하고 승인합니다</p>
        </div>

        <!-- 통계 -->
        <div class="grid grid-cols-3 gap-6 mb-8">
            <div class="bg-white border-2 border-gray-200 rounded-2xl p-6 shadow-sm">
                <p class="text-sm font-bold text-gray-500 mb-1">대기 중</p>
                <p class="text-3xl font-black text-yellow-500" th:text="${pendingCount}">0</p>
            </div>
            <div class="bg-white border-2 border-gray-200 rounded-2xl p-6 shadow-sm">
                <p class="text-sm font-bold text-gray-500 mb-1">승인 완료</p>
                <p class="text-3xl font-black text-green-600" th:text="${approvedCount}">0</p>
            </div>
            <div class="bg-white border-2 border-gray-200 rounded-2xl p-6 shadow-sm">
                <p class="text-sm font-bold text-gray-500 mb-1">반려</p>
                <p class="text-3xl font-black text-red-500" th:text="${rejectedCount}">0</p>
            </div>
        </div>

        <!-- 테이블 -->
        <div class="bg-white border-2 border-gray-200 rounded-2xl shadow-sm overflow-hidden overflow-x-auto">
            <table class="w-full text-sm min-w-max">
                <thead class="bg-gray-50 border-b-2 border-gray-200">
                    <tr>
                        <th class="px-4 py-3 text-left font-bold text-gray-600">No</th>
                        <th class="px-4 py-3 text-left font-bold text-gray-600">코스명</th>
                        <th class="px-4 py-3 text-left font-bold text-gray-600">강사</th>
                        <th class="px-4 py-3 text-left font-bold text-gray-600">카테고리</th>
                        <th class="px-4 py-3 text-left font-bold text-gray-600">가격</th>
                        <th class="px-4 py-3 text-left font-bold text-gray-600">신청일</th>
                        <th class="px-4 py-3 text-left font-bold text-gray-600">상태</th>
                        <th class="px-4 py-3 text-left font-bold text-gray-600">관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(approvals)}">
                        <td colspan="8" class="px-4 py-12 text-center text-gray-400">승인 요청이 없습니다</td>
                    </tr>
                    <tr th:each="a, stat : ${approvals}"
                        class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
                        <td class="px-4 py-3 text-gray-500" th:text="${stat.count}"></td>
                        <td class="px-4 py-3 font-medium text-gray-900" th:text="${a.title ?: '-'}"></td>
                        <td class="px-4 py-3 text-gray-700" th:text="${a.instuctorName ?: '-'}"></td>
                        <td class="px-4 py-3 text-gray-600" th:text="${a.categoryName ?: '-'}"></td>
                        <td class="px-4 py-3 text-gray-600" th:text="${#numbers.formatInteger(a.price, 0, 'COMMA') + ' 크레딧'}"></td>
                        <td class="px-4 py-3 text-gray-600 whitespace-nowrap"
                            th:text="${a.createdAt != null ? #temporals.format(a.createdAt, 'yyyy-MM-dd') : '-'}"></td>
                        <td class="px-4 py-3">
                            <span th:if="${a.status.name() == 'PENDING'}"
                                  class="px-2 py-1 bg-yellow-100 text-yellow-700 rounded-full text-xs font-bold">대기</span>
                            <span th:if="${a.status.name() == 'APPROVED'}"
                                  class="px-2 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold">승인</span>
                            <span th:if="${a.status.name() == 'REJECTED'}"
                                  class="px-2 py-1 bg-red-100 text-red-600 rounded-full text-xs font-bold">반려</span>
                        </td>
                        <td class="px-4 py-3">
                            <div class="flex gap-2" th:if="${a.status.name() == 'PENDING'}">
                                <form method="post" th:action="@{/admin/approvals/{id}/approve(id=${a.approvalId})}">
                                    <button type="submit"
                                            class="px-3 py-1 bg-green-600 text-white rounded-lg text-xs font-bold hover:bg-green-700 transition">승인</button>
                                </form>
                                <form method="post" th:action="@{/admin/approvals/{id}/reject(id=${a.approvalId})}">
                                    <button type="submit"
                                            class="px-3 py-1 bg-red-500 text-white rounded-lg text-xs font-bold hover:bg-red-600 transition">반려</button>
                                </form>
                            </div>
                            <span th:unless="${a.status.name() == 'PENDING'}" class="text-gray-400 text-xs">처리완료</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>
</div>

</body>
</html>
