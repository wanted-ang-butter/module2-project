<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>

<body class="bg-gray-50 min-h-screen">

<!-- 🔥 관리자 헤더 -->
<div th:replace="fragments/adminHeader :: adminHeader"></div>

<div class="max-w-7xl mx-auto px-6 py-10 flex gap-8">

    <!-- 사이드바 -->
    <aside class="w-56 shrink-0">
        <div class="bg-white border-2 border-gray-200 rounded-2xl p-4">
            <p class="text-sm font-black text-gray-900 px-3 py-2 mb-1">회원 관리</p>

            <nav class="space-y-1">
                <a href="/admin/user-list"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-bold text-purple-700 bg-purple-50">
                    <i class="fa-solid fa-users text-purple-500 w-4"></i>회원 조회
                </a>

                <a href="/admin/instructor-approval"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-gray-700 hover:bg-gray-50">
                    <i class="fa-solid fa-chalkboard-teacher text-gray-400 w-4"></i>강사 승인
                </a>

                <a href="/admin/blacklist"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-gray-700 hover:bg-gray-50">
                    <i class="fa-solid fa-ban text-gray-400 w-4"></i>블랙리스트
                </a>
            </nav>
        </div>
    </aside>

    <!-- 메인 -->
    <main class="flex-1">

        <!-- 제목 -->
        <div class="mb-10">
            <h1 class="text-4xl font-black text-gray-900 mb-2">회원 관리</h1>
            <p class="text-gray-600">회원 목록을 조회하고 관리합니다</p>
        </div>

        <!-- 검색 -->
        <div class="bg-white border-2 border-gray-200 rounded-2xl p-6 mb-6">
            <input type="text" id="search-input" placeholder="이름 또는 닉네임 검색"
                   class="w-full px-4 py-2 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-blue-400 text-sm"
                   oninput="applySearch()" />
        </div>

        <!-- 테이블 -->
        <div class="bg-white border-2 border-gray-200 rounded-2xl overflow-hidden overflow-x-auto">
            <table class="w-full text-sm min-w-max">
                <thead class="bg-gray-50 border-b">
                <tr>
                    <th class="px-4 py-3 text-left">No</th>
                    <th class="px-4 py-3 text-left">아이디</th>
                    <th class="px-4 py-3 text-left">이름</th>
                    <th class="px-4 py-3 text-left">닉네임</th>
                    <th class="px-4 py-3 text-left">역할</th>
                    <th class="px-4 py-3 text-left">상태</th>
                </tr>
                </thead>

                <tbody>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="6" class="px-6 py-16 text-center text-gray-400">
                        회원이 없습니다
                    </td>
                </tr>

                <tr th:each="user, stat : ${users}"
                    th:attr="data-name=${user.name}, data-nickname=${user.nickname}"
                    class="border-b hover:bg-gray-50 search-row">

                    <td class="px-4 py-3" th:text="${stat.count}"></td>
                    <td class="px-4 py-3" th:text="${user.username}"></td>
                    <td class="px-4 py-3" th:text="${user.name}"></td>
                    <td class="px-4 py-3" th:text="${user.nickname}"></td>

                    <td class="px-4 py-3">
                        <span th:text="${user.role}"></span>
                    </td>

                    <td class="px-4 py-3">
                        <span th:text="${user.status}"></span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

    </main>
</div>

<script>
    function applySearch() {
        const keyword = document.getElementById('search-input').value.toLowerCase();

        document.querySelectorAll('.search-row').forEach(tr => {
            const name = tr.dataset.name?.toLowerCase() || '';
            const nick = tr.dataset.nickname?.toLowerCase() || '';

            tr.style.display =
                (!keyword || name.includes(keyword) || nick.includes(keyword))
                    ? ''
                    : 'none';
        });
    }
</script>

</body>
</html>
