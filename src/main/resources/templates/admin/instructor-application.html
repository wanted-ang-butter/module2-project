<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>강사 승인</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- 🔥 공통 관리자 헤더 -->
<div th:replace="fragments/adminHeader :: adminHeader"></div>

<div class="max-w-7xl mx-auto px-6 py-10 flex gap-8">

    <!-- Sidebar -->
    <aside class="w-56 shrink-0">
        <div class="bg-white border-2 border-gray-200 rounded-2xl p-4">
            <p class="text-sm font-black text-gray-900 px-3 py-2 mb-1">회원 관리</p>

            <nav class="space-y-1">
                <a href="/admin/user-management"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-gray-700 hover:bg-gray-50">
                    <i class="fa-solid fa-users text-gray-400 w-4"></i>회원 조회
                </a>

                <!-- 🔥 여기 수정됨 -->
                <a href="/admin/instructor-approval"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-bold text-purple-700 bg-purple-50">
                    <i class="fa-solid fa-chalkboard-teacher text-purple-500 w-4"></i>강사 승인
                </a>

                <a href="/admin/blacklist"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-gray-700 hover:bg-gray-50">
                    <i class="fa-solid fa-ban text-gray-400 w-4"></i>블랙리스트
                </a>
            </nav>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1">

        <button type="button"
                onclick="history.back()"
                class="flex items-center gap-2 px-4 py-2 border-2 border-gray-200 rounded-xl text-gray-700 hover:bg-gray-100 font-medium text-sm mb-4">
            <i class="fa-solid fa-arrow-left text-sm"></i>뒤로가기
        </button>

        <h1 class="text-4xl font-black text-gray-900 mb-2">강사 승인</h1>
        <p class="text-gray-600 font-medium mb-8">강사 신청 목록을 확인하고 승인/반려합니다</p>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

            <!-- Left -->
            <div>
                <h2 class="text-xl font-black text-gray-900 mb-4">
                    신청 목록 (<span th:text="${#lists.size(approvals)}">0</span>)
                </h2>

                <div th:if="${#lists.isEmpty(approvals)}"
                     class="text-center py-16 bg-white border-2 border-gray-200 rounded-2xl">
                    <p class="text-gray-500 text-sm">대기중인 신청이 없습니다</p>
                </div>

                <div class="space-y-4">
                    <div th:each="app : ${approvals}"
                         th:attr="data-id=${app.approvalId},
                                  data-title=${app.title},
                                  data-applicant=${app.applicantName},
                                  data-category=${app.categoryName},
                                  data-introduction=${app.introduction},
                                  data-career=${app.career},
                                  data-proof=${app.proofFileUrl},
                                  data-date=${app.createdAt != null ? #temporals.format(app.createdAt, 'yyyy-MM-dd') : '-'},
                                  data-status=${app.status.name()}"
                         onclick="selectApplication(this)"
                         class="p-6 border-2 rounded-2xl cursor-pointer transition-all hover:shadow-lg border-gray-200 bg-white hover:border-blue-300">

                        <h3 class="text-lg font-black text-gray-900 mb-1"
                            th:text="${app.title ?: '-'}"></h3>

                        <p class="text-sm text-gray-600"
                           th:text="${app.applicantName ?: '-'}"></p>
                    </div>
                </div>
            </div>

            <!-- Right -->
            <div>
                <div id="detail-empty"
                     class="bg-white border-2 border-gray-200 rounded-2xl p-8 text-center sticky top-24">
                    <p class="text-gray-500 text-sm">신청을 선택하세요</p>
                </div>

                <div id="detail-panel"
                     class="hidden bg-white border-2 border-gray-200 rounded-2xl p-8 sticky top-24">

                    <h2 class="text-2xl font-black mb-6">신청 상세</h2>

                    <p id="d-title"></p>
                    <p id="d-applicant"></p>
                    <p id="d-category"></p>
                    <p id="d-introduction"></p>
                    <p id="d-career"></p>

                    <div class="flex gap-3 mt-6">
                        <form id="approve-form" method="post">
                            <button class="px-4 py-2 bg-blue-600 text-white rounded-xl">승인</button>
                        </form>

                        <button onclick="openRejectModal()"
                                class="px-4 py-2 border border-red-400 text-red-500 rounded-xl">
                            반려
                        </button>
                    </div>
                </div>
            </div>

        </div>

    </main>
</div>

<!-- Reject Modal -->
<div id="reject-modal"
     class="fixed inset-0 bg-black/50 flex items-center justify-center z-50"
     style="display:none">

    <div class="bg-white p-6 rounded-xl w-full max-w-md">
        <form id="reject-form" method="post">
            <textarea name="rejectReason" class="w-full border p-2"></textarea>

            <div class="flex gap-2 mt-4">
                <button class="flex-1 bg-red-500 text-white py-2">반려</button>
                <button type="button" onclick="closeRejectModal()" class="flex-1 border py-2">취소</button>
            </div>
        </form>
    </div>
</div>

<script>
    let selectedId = null;

    function selectApplication(el) {
        selectedId = el.dataset.id;

        document.getElementById('d-title').textContent = el.dataset.title;
        document.getElementById('d-applicant').textContent = el.dataset.applicant;
        document.getElementById('d-category').textContent = el.dataset.category;
        document.getElementById('d-introduction').textContent = el.dataset.introduction;
        document.getElementById('d-career').textContent = el.dataset.career;

        document.getElementById('approve-form').action = '/admin/approvals/' + selectedId + '/approve';
        document.getElementById('reject-form').action = '/admin/approvals/' + selectedId + '/reject';

        document.getElementById('detail-empty').classList.add('hidden');
        document.getElementById('detail-panel').classList.remove('hidden');
    }

    function openRejectModal() {
        document.getElementById('reject-modal').style.display = 'flex';
    }
    function closeRejectModal() {
        document.getElementById('reject-modal').style.display = 'none';
    }
</script>

</body>
</html>
