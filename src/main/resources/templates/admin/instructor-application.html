<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>강사 승인</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Header -->
<header class="border-b border-gray-200 bg-white/80 backdrop-blur-sm sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-4">
        <div class="flex items-center justify-between">
            <a href="/admin/dashboard" class="flex items-center gap-3 group">
                <div class="w-10 h-10 bg-gradient-to-br from-purple-600 to-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-terminal text-white text-sm"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-gray-900">내일 <span class="text-gray-500 font-normal">Nae-il</span></h1>
                    <p class="text-[10px] font-semibold text-gray-500">관리자 패널</p>
                </div>
            </a>
            <nav class="flex items-center gap-2">
                <a href="/community/qna" class="flex items-center gap-2 px-4 py-2 border-2 border-gray-200 rounded-xl text-gray-700 hover:border-blue-600 hover:bg-blue-50 transition-all font-medium text-sm">
                    <i class="fa-solid fa-comment text-sm"></i><span>커뮤니티</span>
                </a>
                <div class="relative" id="adminMenuWrapper">
                    <button onclick="toggleAdminMenu()" class="flex items-center gap-2 px-4 py-2 border-2 border-gray-200 rounded-xl text-gray-700 hover:border-blue-600 hover:bg-blue-50 transition-all font-medium text-sm">
                        <i class="fa-solid fa-shield text-sm"></i><span>관리</span><i class="fa-solid fa-chevron-down text-xs"></i>
                    </button>
                    <div id="adminMenu" class="hidden absolute left-0 mt-2 w-64 bg-white border-2 border-gray-200 rounded-xl shadow-xl z-50">
                        <div class="py-2">
                            <div>
                                <button onclick="toggleMemberMenu()" class="w-full flex items-center justify-between px-4 py-3 hover:bg-gray-50">
                                    <div class="flex items-center gap-3"><i class="fa-solid fa-users text-gray-600"></i><span class="text-sm font-bold">회원 관리</span></div>
                                    <i class="fa-solid fa-chevron-down text-xs text-gray-500"></i>
                                </button>
                                <div id="memberSubMenu" class="hidden px-4 pb-2">
                                    <a href="/admin/user-management" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">회원 조회</a>
                                    <a href="/admin/instructor-approval" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">강사 승인</a>
                                    <a href="/admin/blacklist" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">블랙리스트 관리</a>
                                </div>
                            </div>
                            <div class="border-t border-gray-100"></div>
                            <div>
                                <button onclick="toggleCourseMenu()" class="w-full flex items-center justify-between px-4 py-3 hover:bg-gray-50">
                                    <div class="flex items-center gap-3"><i class="fa-solid fa-book-open text-gray-600"></i><span class="text-sm font-bold">코스 관리</span></div>
                                    <i class="fa-solid fa-chevron-down text-xs text-gray-500"></i>
                                </button>
                                <div id="courseSubMenu" class="hidden px-4 pb-2">
                                    <a href="/admin/course-management/approval" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">코스 승인 관리</a>
                                    <a href="/admin/live-management" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">실시간 강의 승인 관리</a>
                                    <a href="/admin/category-management" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">카테고리 관리</a>
                                </div>
                            </div>
                            <div class="border-t border-gray-100"></div>
                            <a href="/admin/settlement" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50">
                                <i class="fa-solid fa-wallet text-gray-600"></i><span class="text-sm font-bold">정산 관리</span>
                            </a>
                        </div>
                    </div>
                </div>
            </nav>
            <a href="/auth/logout" class="flex items-center gap-2 px-4 py-2 rounded-xl hover:bg-red-50 transition-all group">
                <i class="fa-solid fa-right-from-bracket text-gray-600 group-hover:text-red-600 text-sm"></i>
                <span class="font-medium text-gray-700 group-hover:text-red-600 text-sm">로그아웃</span>
            </a>
        </div>
    </div>
</header>

<div class="max-w-7xl mx-auto px-6 py-12">

    <!-- Hero Banner -->
    <div class="relative overflow-hidden mb-8">
        <div class="relative bg-gradient-to-br from-purple-50 via-white to-blue-50 rounded-3xl p-12 border-2 border-gray-200 shadow-lg">
            <div class="flex items-center justify-between">
                <div>
                    <div class="inline-flex items-center gap-2 px-4 py-2 bg-white border-2 border-gray-200 rounded-full mb-6 shadow-sm">
                        <div class="w-2.5 h-2.5 bg-purple-500 rounded-full"></div>
                        <span class="text-sm font-bold text-gray-700">시스템 정상</span>
                    </div>
                    <h2 class="text-4xl font-black text-gray-900 mb-4 leading-tight">
                        안녕하세요,<br/>
                        <span class="text-purple-600">관리자</span>님
                    </h2>
                    <p class="text-xl text-gray-700 font-semibold">플랫폼 운영 상태를 확인하고 관리하세요</p>
                </div>
                <div class="hidden lg:block">
                    <div class="w-48 h-48 bg-gradient-to-br from-purple-400 to-blue-400 rounded-3xl flex items-center justify-center shadow-2xl">
                        <span class="text-7xl">⚙️</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Page Header -->
    <h1 class="text-4xl font-black text-gray-900 mb-2">강사 승인</h1>
    <p class="text-gray-600 font-medium mb-8">강사 신청 목록을 확인하고 승인/반려합니다</p>

    <!-- 2 Column Layout -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

        <!-- Left: Application List -->
        <div>
            <h2 class="text-xl font-black text-gray-900 mb-4">신청 목록 (<span id="app-count">0</span>)</h2>
            <div id="app-list" class="space-y-4"></div>
        </div>

        <!-- Right: Application Detail -->
        <div>
            <!-- 선택 전 -->
            <div id="detail-empty" class="bg-white border-2 border-gray-200 rounded-2xl p-8 text-center sticky top-24">
                <div class="w-24 h-24 bg-gray-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-file-lines text-4xl text-gray-400"></i>
                </div>
                <p class="text-gray-500 text-sm">신청을 선택하면 상세 정보가 표시됩니다</p>
            </div>

            <!-- 선택 후 -->
            <div id="detail-panel" class="hidden bg-white border-2 border-gray-200 rounded-2xl p-8 sticky top-24">
                <h2 class="text-2xl font-black text-gray-900 mb-6">신청 상세</h2>
                <div class="space-y-6 mb-8">
                    <div>
                        <label class="text-sm font-bold text-gray-600 mb-2 block">제목</label>
                        <p id="d-title" class="text-gray-900 font-medium"></p>
                    </div>
                    <div>
                        <label class="text-sm font-bold text-gray-600 mb-2 block">신청자</label>
                        <p id="d-applicant" class="text-gray-900 font-medium"></p>
                    </div>
                    <div>
                        <label class="text-sm font-bold text-gray-600 mb-2 block">분야</label>
                        <p id="d-category" class="text-gray-900 font-medium"></p>
                    </div>
                    <div>
                        <label class="text-sm font-bold text-gray-600 mb-2 block">소개</label>
                        <p id="d-introduction" class="text-gray-700 leading-relaxed"></p>
                    </div>
                    <div>
                        <label class="text-sm font-bold text-gray-600 mb-2 block">경력</label>
                        <p id="d-career" class="text-gray-700 leading-relaxed"></p>
                    </div>
                    <div>
                        <label class="text-sm font-bold text-gray-600 mb-2 block">증빙 자료</label>
                        <div class="flex items-center gap-2 p-3 bg-gray-50 rounded-lg">
                            <i class="fa-solid fa-file text-gray-600"></i>
                            <a id="d-proof" href="#" target="_blank" class="text-sm text-blue-600 font-medium hover:underline">파일 보기</a>
                        </div>
                    </div>
                    <div>
                        <label class="text-sm font-bold text-gray-600 mb-2 block">신청일</label>
                        <p id="d-date" class="text-gray-900 font-medium"></p>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button id="approve-btn" onclick="handleApprove()"
                            class="flex-1 px-6 py-3 bg-gradient-to-r from-blue-600 to-green-600 text-white rounded-xl hover:shadow-xl transition-all font-bold flex items-center justify-center gap-2">
                        <i class="fa-solid fa-circle-check"></i> 승인
                    </button>
                    <button onclick="openReject()"
                            class="flex-1 px-6 py-3 border-2 border-red-300 text-red-600 rounded-xl hover:bg-red-50 transition-all font-bold flex items-center justify-center gap-2">
                        <i class="fa-solid fa-circle-xmark"></i> 반려
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Reject Modal -->
<div id="reject-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-8 max-w-md w-full mx-4 shadow-xl">
        <h3 class="text-2xl font-black text-gray-900 mb-4">반려 사유 입력</h3>
        <p class="text-sm text-gray-600 mb-4">반려 사유를 입력해주세요</p>
        <textarea id="reject-reason" rows="4" placeholder="반려 사유를 입력하세요"
                  class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none resize-none font-medium"></textarea>
        <div class="flex gap-3 mt-6">
            <button onclick="confirmReject()" class="flex-1 px-6 py-3 bg-red-600 text-white rounded-xl hover:bg-red-700 font-bold">반려</button>
            <button onclick="closeReject()" class="flex-1 px-6 py-3 border-2 border-gray-300 rounded-xl hover:bg-gray-50 font-bold text-gray-700">취소</button>
        </div>
    </div>
</div>

<!-- Confirm Modal -->
<div id="confirm-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-8 max-w-sm w-full mx-4 border-2 border-gray-200 shadow-xl">
        <p id="confirm-message" class="text-gray-900 font-semibold text-center mb-6"></p>
        <div class="flex gap-3">
            <button onclick="closeConfirm()" class="flex-1 px-4 py-2 border-2 border-gray-200 rounded-xl text-gray-700 font-bold hover:bg-gray-50">취소</button>
            <button id="confirm-ok-btn" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700">확인</button>
        </div>
    </div>
</div>

<!-- Alert Modal -->
<div id="alert-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-8 max-w-sm w-full mx-4 border-2 border-gray-200 shadow-xl">
        <p id="alert-message" class="text-gray-900 font-semibold text-center mb-6"></p>
        <button onclick="closeAlert()" class="w-full px-4 py-2 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700">확인</button>
    </div>
</div>

<script>
    let allData = [];
    let selectedApprovalId = null;

    function loadData() {
        fetch('/api/admin/course-approvals?type=INSTRUCTOR_REGISTER')
            .then(res => res.json())
            .then(data => { allData = data; renderList(); })
            .catch(err => console.error('조회 실패:', err));
    }

    function renderList() {
        const list = document.getElementById('app-list');
        document.getElementById('app-count').textContent = allData.length;
        list.innerHTML = '';

        if (allData.length === 0) {
            list.innerHTML = `
                <div class="text-center py-16 bg-white border-2 border-gray-200 rounded-2xl">
                    <div class="w-24 h-24 bg-gray-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                        <i class="fa-solid fa-file-lines text-4xl text-gray-400"></i>
                    </div>
                    <p class="text-gray-500 text-sm">대기중인 신청이 없습니다</p>
                </div>`;
            return;
        }

        allData.forEach(app => {
            const date = app.createdAt ? app.createdAt.substring(0, 10) : '-';
            const isSelected = app.approvalId === selectedApprovalId;
            const div = document.createElement('div');
            div.className = `p-6 border-2 rounded-2xl cursor-pointer transition-all hover:shadow-lg ${isSelected ? 'border-blue-500 bg-blue-50' : 'border-gray-200 bg-white hover:border-blue-300'}`;
            div.onclick = () => selectApplication(app.approvalId);
            div.innerHTML = `
                <div class="flex items-start justify-between mb-3">
                    <div>
                        <h3 class="text-lg font-black text-gray-900 mb-1">${app.title || '-'}</h3>
                        <p class="text-sm text-gray-600">${app.applicantName || '-'}</p>
                    </div>
                    <i class="fa-solid fa-file-lines text-blue-600"></i>
                </div>
                <div class="flex items-center gap-4 text-sm text-gray-600">
                    <span class="px-3 py-1 bg-gray-100 rounded-full font-medium">${app.categoryName || '-'}</span>
                    <span>${date}</span>
                </div>
            `;
            list.appendChild(div);
        });
    }

    function selectApplication(approvalId) {
        selectedApprovalId = approvalId;
        const app = allData.find(a => a.approvalId === approvalId);
        if (!app) return;

        const date = app.createdAt ? app.createdAt.substring(0, 10) : '-';
        document.getElementById('d-title').textContent = app.title || '-';
        document.getElementById('d-applicant').textContent = app.applicantName || '-';
        document.getElementById('d-category').textContent = app.categoryName || '-';
        document.getElementById('d-introduction').textContent = app.introduction || '-';
        document.getElementById('d-career').textContent = app.career || '-';
        document.getElementById('d-date').textContent = date;

        const proofLink = document.getElementById('d-proof');
        if (app.proofFileUrl) {
            proofLink.href = app.proofFileUrl;
            proofLink.textContent = '파일 보기';
        } else {
            proofLink.href = '#';
            proofLink.textContent = '없음';
        }

        document.getElementById('detail-empty').classList.add('hidden');
        document.getElementById('detail-panel').classList.remove('hidden');
        renderList();
    }

    // 승인
    function handleApprove() {
        showConfirm('강사 신청을 승인하시겠습니까?', () => {
            fetch(`/api/admin/course-approvals/${selectedApprovalId}/approve`, { method: 'PATCH' })
                .then(res => {
                    if (!res.ok) throw new Error('승인 실패');
                    closeConfirm();
                    showAlert('강사 신청이 승인되었습니다');
                })
                .catch(() => { closeConfirm(); showAlert('승인 중 오류가 발생했습니다.'); });
        });
    }

    // 반려
    function openReject() {
        document.getElementById('reject-reason').value = '';
        document.getElementById('reject-modal').classList.remove('hidden');
    }
    function closeReject() { document.getElementById('reject-modal').classList.add('hidden'); }

    function confirmReject() {
        const reason = document.getElementById('reject-reason').value.trim();
        if (!reason) { showAlert('반려 사유를 입력해주세요'); return; }
        fetch(`/api/admin/course-approvals/${selectedApprovalId}/reject`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ rejectReason: reason })
        })
        .then(res => {
            if (!res.ok) throw new Error('반려 실패');
            closeReject();
            showAlert('강사 신청이 반려되었습니다');
        })
        .catch(() => { closeReject(); showAlert('반려 중 오류가 발생했습니다.'); });
    }

    // Confirm Modal
    let confirmCallback = null;
    function showConfirm(msg, onConfirm) {
        document.getElementById('confirm-message').textContent = msg;
        confirmCallback = onConfirm;
        document.getElementById('confirm-modal').classList.remove('hidden');
        document.getElementById('confirm-ok-btn').onclick = () => { if (confirmCallback) confirmCallback(); };
    }
    function closeConfirm() { document.getElementById('confirm-modal').classList.add('hidden'); confirmCallback = null; }

    // Alert Modal
    function showAlert(msg) {
        document.getElementById('alert-message').textContent = msg;
        document.getElementById('alert-modal').classList.remove('hidden');
    }
    function closeAlert() {
        document.getElementById('alert-modal').classList.add('hidden');
        selectedApprovalId = null;
        document.getElementById('detail-empty').classList.remove('hidden');
        document.getElementById('detail-panel').classList.add('hidden');
        loadData();
    }

    // Header
    function toggleAdminMenu() { document.getElementById('adminMenu').classList.toggle('hidden'); }
    function toggleMemberMenu() { document.getElementById('memberSubMenu').classList.toggle('hidden'); }
    function toggleCourseMenu() { document.getElementById('courseSubMenu').classList.toggle('hidden'); }
    document.addEventListener('click', e => {
        if (!document.getElementById('adminMenuWrapper').contains(e.target)) {
            document.getElementById('adminMenu').classList.add('hidden');
        }
    });

    document.addEventListener('DOMContentLoaded', loadData);
</script>

</body>
</html>
