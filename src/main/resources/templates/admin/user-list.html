<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="min-h-screen bg-gray-50">

<div th:replace="fragments/adminHeader :: adminHeader"></div>

<div class="mx-auto flex max-w-7xl gap-8 px-6 py-10">
    <aside class="w-56 shrink-0">
        <div class="rounded-2xl border-2 border-gray-200 bg-white p-4">
            <p class="mb-1 px-3 py-2 text-sm font-black text-gray-900">회원 관리</p>
            <nav class="space-y-1">
                <a th:href="@{/admin/user-management}"
                   class="flex items-center gap-3 rounded-xl bg-purple-50 px-3 py-2.5 text-sm font-bold text-purple-700">
                    <i class="fa-solid fa-users w-4 text-purple-500"></i>
                    회원 조회
                </a>
                <a th:href="@{/admin/instructor-approval}"
                   class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-50">
                    <i class="fa-solid fa-chalkboard-teacher w-4 text-gray-400"></i>
                    강사 승인
                </a>
                <a th:href="@{/admin/blacklist}"
                   class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-50">
                    <i class="fa-solid fa-ban w-4 text-gray-400"></i>
                    블랙리스트 관리
                </a>
            </nav>
        </div>
    </aside>

    <main class="flex-1">
        <div class="mb-12">
            <button onclick="history.back()"
                    class="mb-4 flex items-center gap-2 rounded-xl border-2 border-gray-200 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100">
                <i class="fa-solid fa-arrow-left text-sm"></i>
                뒤로가기
            </button>

            <div class="relative mb-8 overflow-hidden">
                <div class="rounded-3xl border-2 border-gray-200 bg-gradient-to-br from-purple-50 via-white to-blue-50 p-12 shadow-lg">
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="mb-6 inline-flex items-center gap-2 rounded-full border-2 border-gray-200 bg-white px-4 py-2 shadow-sm">
                                <div class="h-2.5 w-2.5 rounded-full bg-purple-500"></div>
                                <span class="text-sm font-bold text-gray-700">관리자 화면</span>
                            </div>
                            <h1 class="mb-4 text-4xl font-black leading-tight text-gray-900">
                                회원 상태를 확인하고<br />
                                <span class="text-purple-600">관리</span>해보세요
                            </h1>
                            <p class="text-xl font-semibold text-gray-700">
                                플랫폼에 가입한 회원 정보를 한눈에 관리합니다
                            </p>
                        </div>
                        <div class="hidden lg:block">
                            <div class="flex h-48 w-48 items-center justify-center rounded-3xl bg-gradient-to-br from-purple-400 to-blue-400 shadow-2xl">
                                <i class="fa-solid fa-users text-7xl text-white"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <h2 class="mb-2 text-4xl font-black text-gray-900">회원 관리</h2>
            <p class="font-medium text-gray-600">플랫폼에 가입한 회원을 조회하고 상태를 관리합니다</p>
        </div>

        <div class="mb-10 grid grid-cols-3 gap-6">
            <div class="rounded-2xl border-2 border-gray-200 bg-white p-6 shadow-sm">
                <p class="mb-1 text-sm font-bold text-gray-500">전체 회원</p>
                <p class="text-3xl font-black text-gray-900" th:text="${totalCount}">0</p>
            </div>
            <div class="rounded-2xl border-2 border-gray-200 bg-white p-6 shadow-sm">
                <p class="mb-1 text-sm font-bold text-gray-500">활성 회원</p>
                <p class="text-3xl font-black text-green-600" th:text="${activeCount}">0</p>
            </div>
            <div class="rounded-2xl border-2 border-gray-200 bg-white p-6 shadow-sm">
                <p class="mb-1 text-sm font-bold text-gray-500">비활성 회원</p>
                <p class="text-3xl font-black text-red-500" th:text="${inactiveCount}">0</p>
            </div>
        </div>

        <div class="mb-6 rounded-2xl border-2 border-gray-200 bg-white p-6 shadow-sm">
            <div class="flex gap-3">
                <input type="text"
                       id="search-input"
                       placeholder="이름 또는 닉네임으로 검색"
                       class="flex-1 rounded-xl border-2 border-gray-200 px-4 py-2 text-sm focus:border-blue-400 focus:outline-none"
                       oninput="applySearch()" />
            </div>
        </div>

        <div class="overflow-x-auto overflow-hidden rounded-2xl border-2 border-gray-200 bg-white shadow-sm">
            <table class="min-w-max w-full text-sm">
                <thead class="border-b-2 border-gray-200 bg-gray-50">
                <tr>
                    <th class="px-4 py-3 text-left font-bold text-gray-600">No</th>
                    <th class="px-4 py-3 text-left font-bold text-gray-600">아이디</th>
                    <th class="px-4 py-3 text-left font-bold text-gray-600">이름</th>
                    <th class="px-4 py-3 text-left font-bold text-gray-600">전화번호</th>
                    <th class="px-4 py-3 text-left font-bold text-gray-600">생년월일</th>
                    <th class="px-4 py-3 text-left font-bold text-gray-600">닉네임</th>
                    <th class="px-4 py-3 text-left font-bold text-gray-600">역할</th>
                    <th class="px-4 py-3 text-left font-bold text-gray-600">가입일</th>
                    <th class="px-4 py-3 text-left font-bold text-gray-600">상태</th>
                    <th class="px-4 py-3 text-left font-bold text-gray-600">경고</th>
                    <th class="px-4 py-3 text-left font-bold text-gray-600">관리</th>
                </tr>
                </thead>
                <tbody id="user-tbody">
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="11" class="px-4 py-8 text-center text-gray-400">회원이 없습니다.</td>
                </tr>
                <tr th:each="user, stat : ${users}"
                    th:attr="data-name=${user.name}, data-nickname=${user.nickname}"
                    class="search-row border-b border-gray-100 transition-colors hover:bg-gray-50">
                    <td class="px-4 py-3 text-gray-500" th:text="${stat.count}">1</td>
                    <td class="px-4 py-3 font-medium text-gray-900" th:text="${user.username ?: '-'}">-</td>
                    <td class="px-4 py-3 text-gray-700" th:text="${user.name ?: '-'}">-</td>
                    <td class="whitespace-nowrap px-4 py-3 text-gray-600" th:text="${user.phone ?: '-'}">-</td>
                    <td class="whitespace-nowrap px-4 py-3 text-gray-600" th:text="${user.birthDate ?: '-'}">-</td>
                    <td class="whitespace-nowrap px-4 py-3 text-gray-600" th:text="${user.nickname ?: '-'}">-</td>
                    <td class="px-4 py-3">
                        <span th:if="${user.role.name() == 'INSTRUCTOR'}"
                              class="rounded-full bg-blue-100 px-2 py-1 text-xs font-bold text-blue-700">강사</span>
                        <span th:if="${user.role.name() == 'ADMIN'}"
                              class="rounded-full bg-purple-100 px-2 py-1 text-xs font-bold text-purple-700">관리자</span>
                        <span th:if="${user.role.name() == 'SUBSCRIBER'}"
                              class="rounded-full bg-green-100 px-2 py-1 text-xs font-bold text-green-700">구독자</span>
                        <span th:if="${user.role.name() == 'USER'}"
                              class="rounded-full bg-gray-100 px-2 py-1 text-xs font-bold text-gray-600">일반</span>
                        <span th:if="${user.role.name() == 'GUEST'}"
                              class="rounded-full bg-gray-100 px-2 py-1 text-xs font-bold text-gray-400">게스트</span>
                    </td>
                    <td class="px-4 py-3 text-gray-600" th:text="${user.createdDateLabel}">-</td>
                    <td class="px-4 py-3">
                        <span th:if="${user.status.name() == 'ACTIVE'}"
                              class="rounded-full bg-green-100 px-2 py-1 text-xs font-bold text-green-700">활성</span>
                        <span th:if="${user.status.name() == 'INACTIVE'}"
                              class="rounded-full bg-red-100 px-2 py-1 text-xs font-bold text-red-600">비활성</span>
                        <span th:if="${user.status.name() == 'BANNED'}"
                              class="rounded-full bg-red-200 px-2 py-1 text-xs font-bold text-red-700">블랙리스트</span>
                    </td>
                    <td class="px-4 py-3">
                        <span th:if="${user.warningCount > 0}"
                              class="rounded-full bg-yellow-100 px-2 py-1 text-xs font-bold text-yellow-700"
                              th:text="${user.warningCount} + '회'">0회</span>
                        <span th:unless="${user.warningCount > 0}" class="text-xs text-gray-400">없음</span>
                    </td>
                    <td class="px-4 py-3">
                        <div class="flex items-center gap-1">
                            <form th:if="${user.status.name() == 'ACTIVE'}"
                                  method="post"
                                  th:action="@{/admin/user-management/{id}/deactivate(id=${user.id})}">
                                <button type="submit"
                                        title="비활성화"
                                        class="flex h-8 w-8 items-center justify-center rounded-full bg-green-100 text-green-600 transition-colors hover:bg-red-100 hover:text-red-500">
                                    <i class="fa-solid fa-toggle-on text-sm"></i>
                                </button>
                            </form>

                            <form th:unless="${user.status.name() == 'ACTIVE'}"
                                  method="post"
                                  th:action="@{/admin/user-management/{id}/activate(id=${user.id})}">
                                <button type="submit"
                                        title="활성화"
                                        class="flex h-8 w-8 items-center justify-center rounded-full bg-gray-100 text-gray-400 transition-colors hover:bg-green-100 hover:text-green-600">
                                    <i class="fa-solid fa-toggle-off text-sm"></i>
                                </button>
                            </form>

                            <button th:if="${user.status.name() != 'BANNED'}"
                                    type="button"
                                    title="블랙리스트 등록"
                                    th:attr="data-uid=${user.id}, data-uname=${user.name}"
                                    onclick="openBlacklistModal(this.dataset.uid, this.dataset.uname)"
                                    class="flex h-8 w-8 items-center justify-center rounded-full bg-red-100 text-red-500 transition-colors hover:bg-red-200">
                                <i class="fa-solid fa-ban text-sm"></i>
                            </button>

                            <span th:if="${user.status.name() == 'BANNED'}"
                                  title="이미 블랙리스트로 등록된 회원입니다"
                                  class="flex h-8 w-8 cursor-not-allowed items-center justify-center rounded-full bg-gray-100 text-gray-400">
                                <i class="fa-solid fa-lock text-sm"></i>
                            </span>

                            <form method="post"
                                  th:action="@{/admin/user-management/{id}/reset-warning(id=${user.id})}">
                                <button type="submit"
                                        title="경고 초기화"
                                        class="flex h-8 w-8 items-center justify-center rounded-full bg-yellow-100 text-yellow-600 transition-colors hover:bg-yellow-200">
                                    <i class="fa-solid fa-triangle-exclamation text-sm"></i>
                                </button>
                            </form>

                            <form th:if="${user.status.name() == 'INACTIVE'}"
                                  method="post"
                                  th:action="@{/admin/user-management/{id}/delete(id=${user.id})}"
                                  onsubmit="return confirm('삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.')">
                                <button type="submit"
                                        title="회원 삭제"
                                        class="flex h-8 w-8 items-center justify-center rounded-full bg-gray-100 text-gray-400 transition-colors hover:bg-red-100 hover:text-red-500">
                                    <i class="fa-solid fa-trash text-sm"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<div id="blacklist-modal"
     class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50">
    <div class="w-full max-w-md rounded-2xl border-2 border-gray-200 bg-white p-8 shadow-2xl">
        <h3 class="mb-4 text-xl font-black text-gray-900">블랙리스트 등록</h3>
        <p class="mb-4 text-sm text-gray-600">
            <span id="blacklist-user-name" class="font-bold text-gray-900"></span> 회원을 블랙리스트에 등록합니다.
        </p>
        <form id="blacklist-form" method="post">
            <div class="mb-4">
                <label class="mb-2 block text-sm font-bold text-gray-700">등록 사유</label>
                <textarea name="reason"
                          rows="3"
                          placeholder="블랙리스트 등록 사유를 입력하세요"
                          class="w-full resize-none rounded-xl border-2 border-gray-200 px-4 py-2 text-sm focus:border-red-400 focus:outline-none"></textarea>
            </div>
            <div class="flex justify-end gap-3">
                <button type="button"
                        onclick="closeBlacklistModal()"
                        class="rounded-xl border-2 border-gray-200 px-6 py-2 text-sm font-bold text-gray-600 hover:bg-gray-50">
                    취소
                </button>
                <button type="submit"
                        class="rounded-xl bg-red-600 px-6 py-2 text-sm font-bold text-white hover:bg-red-700">
                    등록
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    function applySearch() {
        const keyword = document.getElementById('search-input').value.trim().toLowerCase();
        document.querySelectorAll('.search-row').forEach((row) => {
            const name = (row.dataset.name || '').toLowerCase();
            const nickname = (row.dataset.nickname || '').toLowerCase();
            row.style.display = !keyword || name.includes(keyword) || nickname.includes(keyword) ? '' : 'none';
        });
    }

    function openBlacklistModal(userId, userName) {
        document.getElementById('blacklist-user-name').textContent = userName;
        document.getElementById('blacklist-form').action = '/admin/user-management/' + userId + '/blacklist';
        document.getElementById('blacklist-modal').classList.remove('hidden');
        document.getElementById('blacklist-modal').classList.add('flex');
    }

    function closeBlacklistModal() {
        document.getElementById('blacklist-modal').classList.remove('flex');
        document.getElementById('blacklist-modal').classList.add('hidden');
    }

    const modal = document.getElementById('blacklist-modal');
    if (modal) {
        modal.addEventListener('click', function (event) {
            if (event.target === this) {
                closeBlacklistModal();
            }
        });
    }
</script>

</body>
</html>
