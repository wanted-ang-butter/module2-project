<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Header -->
<header class="border-b border-gray-200 bg-white/80 backdrop-blur-sm sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-4">
        <div class="flex items-center justify-between">
            <a th:href="@{/admin/dashboard}" class="flex items-center gap-3 group">
                <div class="w-10 h-10 bg-gradient-to-br from-purple-600 to-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-terminal text-white text-sm"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-gray-900">내일 <span class="text-gray-500 font-normal">Nae-il</span></h1>
                    <p class="text-[10px] font-semibold text-gray-500">관리자 패널</p>
                </div>
            </a>
            <nav class="flex items-center gap-2">
                <a th:href="@{/community/qna}" class="flex items-center gap-2 px-4 py-2 border-2 border-gray-200 rounded-xl text-gray-700 hover:border-blue-600 hover:bg-blue-50 transition-all font-medium text-sm">
                    <i class="fa-solid fa-comment text-sm"></i><span>커뮤니티</span>
                </a>
                <div class="relative" id="adminMenuWrapper">
                    <button onclick="toggleAdminMenu()" class="flex items-center gap-2 px-4 py-2 border-2 border-gray-200 rounded-xl text-gray-700 hover:border-blue-600 hover:bg-blue-50 transition-all font-medium text-sm">
                        <i class="fa-solid fa-shield text-sm"></i><span>관리</span><i class="fa-solid fa-chevron-down text-xs"></i>
                    </button>
                    <div id="adminMenu" class="hidden absolute left-0 mt-2 w-64 bg-white border-2 border-gray-200 rounded-xl shadow-xl z-50">
                        <div class="py-2">
                            <div>
                                <button onclick="toggleMemberMenu()" class="w-full flex items-center justify-between px-4 py-3 hover:bg-gray-50">
                                    <div class="flex items-center gap-3"><i class="fa-solid fa-users text-gray-600"></i><span class="text-sm font-bold">회원 관리</span></div>
                                    <i class="fa-solid fa-chevron-down text-xs text-gray-500"></i>
                                </button>
                                <div id="memberSubMenu" class="hidden px-4 pb-2">
                                    <a th:href="@{/admin/user-management}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">회원 조회</a>
                                    <a th:href="@{/admin/instructor-approval}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">강사 승인</a>
                                    <a th:href="@{/admin/blacklist}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">블랙리스트 관리</a>
                                </div>
                            </div>
                            <div class="border-t border-gray-100"></div>
                            <div>
                                <button onclick="toggleCourseMenu()" class="w-full flex items-center justify-between px-4 py-3 hover:bg-gray-50">
                                    <div class="flex items-center gap-3"><i class="fa-solid fa-book-open text-gray-600"></i><span class="text-sm font-bold">코스 관리</span></div>
                                    <i class="fa-solid fa-chevron-down text-xs text-gray-500"></i>
                                </button>
                                <div id="courseSubMenu" class="hidden px-4 pb-2">
                                    <a th:href="@{/admin/course-management/approval}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">코스 승인 관리</a>
                                    <a th:href="@{/admin/live-management}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">실시간 강의 승인 관리</a>
                                    <a th:href="@{/admin/category-management}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg">카테고리 관리</a>
                                </div>
                            </div>
                            <div class="border-t border-gray-100"></div>
                            <a th:href="@{/admin/settlement}" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50">
                                <i class="fa-solid fa-wallet text-gray-600"></i><span class="text-sm font-bold">정산 관리</span>
                            </a>
                        </div>
                    </div>
                </div>
                <a th:href="@{/auth/logout}" class="flex items-center gap-2 px-4 py-2 rounded-xl hover:bg-red-50 transition-all group">
                    <i class="fa-solid fa-right-from-bracket text-gray-600 group-hover:text-red-600 text-sm"></i>
                    <span class="font-medium text-gray-700 group-hover:text-red-600 text-sm">로그아웃</span>
                </a>
            </nav>
        </div>
    </div>
</header>

<div class="max-w-7xl mx-auto px-6 py-12">

    <div class="mb-12">

        <button onclick="history.back()" class="flex items-center gap-2 px-4 py-2 border-2 border-gray-200 rounded-xl text-gray-700 hover:bg-gray-100 font-medium text-sm mb-4"><i class="fa-solid fa-arrow-left text-sm"></i>뒤로가기</button>

        <!-- Admin Hero Banner -->
        <div class="relative overflow-hidden mb-8">
            <div class="relative bg-gradient-to-br from-purple-50 via-white to-blue-50 rounded-3xl p-12 border-2 border-gray-200 shadow-lg">
                <div class="flex items-center justify-between">
                    <div>
                        <div class="inline-flex items-center gap-2 px-4 py-2 bg-white border-2 border-gray-200 rounded-full mb-6 shadow-sm">
                            <div class="w-2.5 h-2.5 bg-purple-500 rounded-full"></div>
                            <span class="text-sm font-bold text-gray-700">시스템 정상</span>
                        </div>
                        <h2 class="text-4xl font-black text-gray-900 mb-4 leading-tight">
                            안녕하세요,<br />
                            <span class="text-purple-600">관리자</span>님
                        </h2>
                        <p class="text-xl text-gray-700 font-semibold">
                            플랫폼 운영 상태를 확인하고 관리하세요
                        </p>
                    </div>
                    <div class="hidden lg:block">
                        <div class="w-48 h-48 bg-gradient-to-br from-purple-400 to-blue-400 rounded-3xl flex items-center justify-center shadow-2xl">
                            <span class="text-white text-7xl">👥</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <h1 class="text-4xl font-black text-gray-900 mb-2">회원 관리</h1>
        <p class="text-gray-600 font-medium">플랫폼에 가입된 회원을 관리합니다</p>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-3 gap-6 mb-10">
        <div class="bg-white border-2 border-gray-200 rounded-2xl p-6 shadow-sm">
            <p class="text-sm font-bold text-gray-500 mb-1">전체 회원</p>
            <p class="text-3xl font-black text-gray-900" th:text="${totalCount}">0</p>
        </div>
        <div class="bg-white border-2 border-gray-200 rounded-2xl p-6 shadow-sm">
            <p class="text-sm font-bold text-gray-500 mb-1">활성 회원</p>
            <p class="text-3xl font-black text-green-600" th:text="${activeCount}">0</p>
        </div>
        <div class="bg-white border-2 border-gray-200 rounded-2xl p-6 shadow-sm">
            <p class="text-sm font-bold text-gray-500 mb-1">비활성 회원</p>
            <p class="text-3xl font-black text-red-500" th:text="${inactiveCount}">0</p>
        </div>
    </div>

    <!-- Search Bar -->
    <div class="bg-white border-2 border-gray-200 rounded-2xl p-6 mb-6 shadow-sm">
        <div class="flex gap-3">
            <input type="text" id="search-input" placeholder="이름 또는 닉네임으로 검색"
                   class="flex-1 px-4 py-2 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-blue-400 text-sm"
                   oninput="applySearch()" />
        </div>
    </div>

    <!-- User Table -->
    <div class="bg-white border-2 border-gray-200 rounded-2xl shadow-sm overflow-hidden">
        <table class="w-full text-sm">
            <thead class="bg-gray-50 border-b-2 border-gray-200">
                <tr>
                    <th class="px-4 py-3 text-left font-bold text-gray-600">No</th>
                    <th class="px-4 py-3 text-left font-bold text-gray-600">아이디</th>
                    <th class="px-4 py-3 text-left font-bold text-gray-600">본명</th>
                    <th class="px-4 py-3 text-left font-bold text-gray-600">전화번호</th>
                    <th class="px-4 py-3 text-left font-bold text-gray-600">생년월일</th>
                    <th class="px-4 py-3 text-left font-bold text-gray-600">닉네임</th>
                    <th class="px-4 py-3 text-left font-bold text-gray-600">상태</th>
                    <th class="px-4 py-3 text-left font-bold text-gray-600">경고</th>
                    <th class="px-4 py-3 text-left font-bold text-gray-600">관리</th>
                </tr>
            </thead>
            <tbody id="user-tbody">
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="9" class="px-4 py-8 text-center text-gray-400">회원이 없습니다.</td>
                </tr>
                <tr th:each="user, stat : ${users}"
                    th:attr="data-name=${user.name}, data-nickname=${user.nickname}"
                    class="border-b border-gray-100 hover:bg-gray-50 transition-colors search-row">
                    <td class="px-4 py-3 text-gray-500" th:text="${stat.count}"></td>
                    <td class="px-4 py-3 font-medium text-gray-900" th:text="${user.username ?: '-'}"></td>
                    <td class="px-4 py-3 text-gray-700" th:text="${user.name ?: '-'}"></td>
                    <td class="px-4 py-3 text-gray-600" th:text="${user.phone ?: '-'}"></td>
                    <td class="px-4 py-3 text-gray-600" th:text="${user.birthDate ?: '-'}"></td>
                    <td class="px-4 py-3 text-gray-600" th:text="${user.nickname ?: '-'}"></td>
                    <td class="px-4 py-3">
                        <span th:if="${user.status.name() == 'ACTIVE'}"
                              class="px-2 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold">활성</span>
                        <span th:unless="${user.status.name() == 'ACTIVE'}"
                              class="px-2 py-1 bg-red-100 text-red-600 rounded-full text-xs font-bold">비활성</span>
                    </td>
                    <td class="px-4 py-3">
                        <span th:if="${user.warningCount > 0}"
                              class="px-2 py-1 bg-yellow-100 text-yellow-700 rounded-full text-xs font-bold"
                              th:text="${user.warningCount} + '회'"></span>
                        <span th:unless="${user.warningCount > 0}" class="text-gray-400 text-xs">없음</span>
                    </td>
                    <td class="px-4 py-3">
                        <div class="flex gap-1 items-center">
                            <!-- 활성화/비활성화 -->
                            <form th:if="${user.status.name() == 'ACTIVE'}" method="post"
                                  th:action="@{/admin/user-management/{id}/deactivate(id=${user.id})}">
                                <button type="submit" title="비활성화"
                                        class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200 transition-colors">
                                    <i class="fa-solid fa-toggle-on text-sm"></i>
                                </button>
                            </form>
                            <form th:unless="${user.status.name() == 'ACTIVE'}" method="post"
                                  th:action="@{/admin/user-management/{id}/activate(id=${user.id})}">
                                <button type="submit" title="활성화"
                                        class="w-8 h-8 flex items-center justify-center rounded-full bg-green-100 text-green-600 hover:bg-green-200 transition-colors">
                                    <i class="fa-solid fa-toggle-off text-sm"></i>
                                </button>
                            </form>
                            <!-- 블랙리스트 -->
                            <button type="button" title="블랙리스트 추가"
                                    th:attr="data-uid=${user.id}, data-uname=${user.name}"
                                    onclick="openBlacklistModal(this.dataset.uid, this.dataset.uname)"
                                    class="w-8 h-8 flex items-center justify-center rounded-full bg-red-100 text-red-500 hover:bg-red-200 transition-colors">
                                <i class="fa-solid fa-ban text-sm"></i>
                            </button>
                            <!-- 경고 초기화 -->
                            <form method="post" th:action="@{/admin/user-management/{id}/reset-warning(id=${user.id})}">
                                <button type="submit" title="경고 초기화"
                                        class="w-8 h-8 flex items-center justify-center rounded-full bg-yellow-100 text-yellow-600 hover:bg-yellow-200 transition-colors">
                                    <i class="fa-solid fa-triangle-exclamation text-sm"></i>
                                </button>
                            </form>
                            <!-- 삭제 (비활성 회원만) -->
                            <form th:if="${user.status.name() == 'INACTIVE'}" method="post"
                                  th:action="@{/admin/user-management/{id}/delete(id=${user.id})}"
                                  onsubmit="return confirm('삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.')">
                                <button type="submit" title="회원 삭제"
                                        class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-400 hover:bg-red-100 hover:text-red-500 transition-colors">
                                    <i class="fa-solid fa-trash text-sm"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Blacklist Modal -->
<div id="blacklist-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" style="display:none">
    <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl border-2 border-gray-200">
        <h3 class="text-xl font-black text-gray-900 mb-4">블랙리스트 등록</h3>
        <p class="text-sm text-gray-600 mb-4">
            <span id="blacklist-user-name" class="font-bold text-gray-900"></span> 님을 블랙리스트에 등록합니다.
        </p>
        <form id="blacklist-form" method="post">
            <div class="mb-4">
                <label class="block text-sm font-bold text-gray-700 mb-2">등록 사유</label>
                <textarea name="reason" rows="3" placeholder="블랙리스트 등록 사유를 입력하세요"
                          class="w-full px-4 py-2 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-red-400 text-sm resize-none"></textarea>
            </div>
            <div class="flex justify-end gap-3">
                <button type="button" onclick="closeBlacklistModal()"
                        class="px-6 py-2 border-2 border-gray-200 rounded-xl font-bold text-gray-600 hover:bg-gray-50 text-sm">취소</button>
                <button type="submit"
                        class="px-6 py-2 bg-red-600 text-white rounded-xl font-bold hover:bg-red-700 text-sm">등록</button>
            </div>
        </form>
    </div>
</div>

<script>
    function toggleAdminMenu() { document.getElementById('adminMenu').classList.toggle('hidden'); }
    function toggleMemberMenu() { document.getElementById('memberSubMenu').classList.toggle('hidden'); }
    function toggleCourseMenu() { document.getElementById('courseSubMenu').classList.toggle('hidden'); }
    document.addEventListener('click', function(e) {
        if (!document.getElementById('adminMenuWrapper').contains(e.target))
            document.getElementById('adminMenu').classList.add('hidden');
    });

    function applySearch() {
        const keyword = document.getElementById('search-input').value.trim().toLowerCase();
        document.querySelectorAll('.search-row').forEach(tr => {
            const name = (tr.dataset.name || '').toLowerCase();
            const nickname = (tr.dataset.nickname || '').toLowerCase();
            tr.style.display = (!keyword || name.includes(keyword) || nickname.includes(keyword)) ? '' : 'none';
        });
    }

    function openBlacklistModal(userId, userName) {
        document.getElementById('blacklist-user-name').textContent = userName;
        document.getElementById('blacklist-form').action = '/admin/user-management/' + userId + '/blacklist';
        document.getElementById('blacklist-modal').style.display = 'flex';
    }
    function closeBlacklistModal() {
        document.getElementById('blacklist-modal').style.display = 'none';
    }
    var modal = document.getElementById('blacklist-modal');
    if (modal) {
        modal.addEventListener('click', function(e) {
            if (e.target === this) this.style.display = 'none';
        });
    }
</script>

</body>
</html>
